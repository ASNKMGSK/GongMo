                <button
                  className="run-btn"
                  data-testid="run-btn"
                  disabled={running || !transcript.trim() || !awsGate.ready}
                  onClick={runEvaluation}
                  style={{ flex: "1 1 0", minWidth: 0 }}
                  title={
                    !awsGate.ready
                      ? `AWS RAG 준비 안됨: ${awsGate.reason || "확인 중"}`
                      : !transcript.trim()
                        ? "Transcript 입력 필요"
                        : ""
                  }
                >
                  {running ? "Evaluating..." : awsGate.ready ? "Run Evaluation" : "🔒 AWS RAG 대기 중"}
                </button>
                {running && (
                  <button
                    className="run-btn"
                    data-testid="abort-btn"
                    onClick={() => single.abort()}
                    style={{ background: "#ef4444", flex: "0 0 80px", padding: "0 10px", whiteSpace: "nowrap" }}
                    title="파이프라인 중단"
                  >
                    ■ 중지
                  </button>
                )}
              </div>
            </>
          )}
        </div>

        {/* Center area */}
        <div className="center-area">
          <ProgressBar nodeStates={nodeStates} />

          <div className="tabs-bar center-tabs-bar" data-testid="center-tabs">
            <button className={`tab-btn ${centerTab === "pipeline" ? "active" : ""} ${isRunning && centerTab !== "pipeline" ? "running" : ""}`}
                    data-testid="center-tab-pipeline"
                    onClick={() => setCenterTab("pipeline")}>
              파이프라인
              {isRunning && <span className="running-dot" title="실행 중"></span>}
            </button>
            <button className={`tab-btn ${centerTab === "results" ? "active" : ""} ${tabFlash.results ? "flash" : ""}`}
                    data-testid="center-tab-results"
                    onClick={() => setCenterTab("results")}>
              평가 결과
              {result?.report?.summary?.grade ? (
                <span className="tab-badge" key={result.report.summary.grade}>{result.report.summary.grade}</span>
              ) : streamingItems.length > 0 ? (
                <span className="tab-count" key={streamingItems.length}>{streamingItems.length}/18</span>
              ) : null}
            </button>
            <button className={`tab-btn ${centerTab === "logs" ? "active" : ""} ${tabFlash.logs ? "flash" : ""}`}
                    data-testid="center-tab-logs"
                    onClick={() => setCenterTab("logs")}>
              에이전트 로그
              {logs.length > 0 && <span className="tab-count" key={logs.length}>{logs.length}</span>}
            </button>
            <button className={`tab-btn ${centerTab === "traces" ? "active" : ""} ${tabFlash.traces ? "flash" : ""}`}
                    data-testid="center-tab-traces"
                    onClick={() => setCenterTab("traces")}>
              트레이스
              {traces.length > 0 && <span className="tab-count" key={traces.length}>{traces.length}</span>}
            </button>
            <button className={`tab-btn ${centerTab === "rawlogs" ? "active" : ""} ${tabFlash.rawlogs ? "flash" : ""}`}
                    data-testid="center-tab-rawlogs"
                    onClick={() => setCenterTab("rawlogs")}>
              로그 (상세)
              {rawLogs.length > 0 && <span className="tab-count" key={rawLogs.length}>{rawLogs.length}</span>}
            </button>
            {/* 비활성화(숨김) — 탭 컴포넌트·state·API 호출은 보존. 재활성화 시 style 제거 */}
            <button className={`tab-btn ${centerTab === "compare" ? "active" : ""}`}
                    data-testid="center-tab-compare"
                    onClick={() => setCenterTab("compare")}
                    title="Qwen3-8B vs Bedrock Sonnet 4.6 동시 실행 비교"
                    style={{display:"none"}}>
              모델 비교
            </button>
            <button className={`tab-btn ${centerTab === "matrix" ? "active" : ""}`}
                    data-testid="center-tab-matrix"
                    onClick={() => setCenterTab("matrix")}
                    title="전체 상담 데이터 배치 실행 → STT 평가표 양식 매트릭스"
                    style={{display:"none"}}>
              📊 평가표 매트릭스
            </button>
            <button className={`tab-btn ${centerTab === "rag-admin" ? "active" : ""}`}
                    data-testid="center-tab-rag-admin"
                    onClick={() => setCenterTab("rag-admin")}
                    title="AOSS RAG 인덱스 상태 조회 + 부트스트랩 빌드">
              🔧 RAG Admin
            </button>
            <button className={`tab-btn ${centerTab === "review-queue" ? "active" : ""}`}
                    data-testid="center-tab-review-queue"
                    onClick={() => setCenterTab("review-queue")}
                    title="사람 검수가 필요한 항목 큐 (force_t3 / 저신뢰 항목)">
              검토 큐
            </button>
          </div>

          <div
            className="graph-container"
            data-testid="graph-container"
            style={{ display: centerTab === "pipeline" ? "block" : "none" }}
          >
            <ReactFlowPipeline
              awsGateState={awsGate.loading ? 'loading' : (awsGate.ready ? 'ready' : 'blocked')}
              awsGateReason={awsGate.reason}
              nodeStates={nodeStates}
              nodeTimings={nodeTimings}
              nodeScores={nodeScores}
              edgeStates={edgeStates}
              onNodeClick={(nodeId) => setSelectedNode({ backend: llmBackend, nodeId })}
              phaseAHighlight={phaseAHighlight}
              phaseB1Highlight={phaseB1Highlight}
              phaseB2Highlight={phaseB2Highlight}
              result={result}
              streamingItems={streamingItems}
              tenantId={tenantId}
            />
          </div>

          {centerTab !== "pipeline" && centerTab !== "compare" && centerTab !== "matrix" && centerTab !== "rag-admin" && (
            <div className="center-panel-content" data-testid="center-panel-content">
              <ResultsContent tab={centerTab} result={result} streamingItems={streamingItems} logs={logs} traces={traces} rawLogs={rawLogs} serverUrl={serverUrl} csvState={csvState} setCsvState={setCsvState} llmBackend={llmBackend} consultationId={consultationId} pushToast={pushAppToast} />
            </div>
          )}

          <div
            className="center-panel-content"
            style={{ padding: 8, display: centerTab === "compare" ? "flex" : "none", overflow: "auto" }}
            data-testid="center-panel-compare"
          >
            <div className="compare-mode-banner">
              비교 모드 — 좌측 LLM Backend / Run 버튼은 숨김 처리됩니다. 상단 [▶ Run Both] 로 양쪽 동시 실행하세요.
            </div>
            <CompareTab
              serverUrl={serverUrl}
              transcript={transcript}
              transcriptFileName={uploadedFileName}
              csvState={csvState}
              setCsvState={setCsvState}
            />
          </div>

          <div
            className="center-panel-content"
            style={{ padding: 8, display: centerTab === "matrix" ? "flex" : "none", overflow: "auto" }}
            data-testid="center-panel-matrix"
          >
            <MatrixTab
              serverUrl={serverUrl}
              csvState={csvState}
              setCsvState={setCsvState}
            />
          </div>

          <div
            className="center-panel-content"
            style={{ display: centerTab === "rag-admin" ? "flex" : "none", overflow: "auto" }}
            data-testid="center-panel-rag-admin"
          >
            <RagAdminPanel serverUrl={serverUrl} />
          </div>
        </div>
      </div>

      {/* 전역 NodeDrawer 는 단일 탭 전용. compare/matrix 탭은 자체 drawer 소유. */}
      {centerTab !== "compare" && centerTab !== "matrix" && (
        <NodeDrawer
          nodeId={selectedNode && typeof selectedNode === "object" ? selectedNode.nodeId : selectedNode}
          backend={selectedNode && typeof selectedNode === "object" ? selectedNode.backend : llmBackend}
          nodeStates={nodeStates}
          nodeTimings={nodeTimings}
          nodeScores={nodeScores}
          result={result}
          streamingItems={streamingItems}
          nodeErrors={nodeErrors}
          tenantId={tenantId}
          serverUrl={serverUrl}
          awsSharedState={awsGate}
          gtScores={gtScores}
          personaMode={personaMode}
          onClose={() => setSelectedNode(null)}
        />
      )}

      {/* App 레벨 토스트 스택 — HITL 저장 알림 */}
      {appToasts.length > 0 && (
        <div className="mx-toast-stack">
          {appToasts.map(t => (
            <div key={t.id} className={`mx-toast kind-${t.kind || 'success'}`}>
              <div className="mx-t-body">
                <div className="mx-t-title">{t.title}</div>
                {t.message && <div className="mx-t-msg">{t.message}</div>}
              </div>
              <button className="mx-t-close" onClick={() => dismissAppToast(t.id)} title="닫기">×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Mount ──────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
