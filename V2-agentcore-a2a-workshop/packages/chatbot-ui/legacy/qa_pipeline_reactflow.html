      )}
    </div>
  );
}

/* ── 매트릭스 탭: 배치 실행 + 18행 STT 평가표 ─────────────── */
async function readTranscriptFile(file) {
  try {
    const text = await file.text();
    if (!text.includes("\uFFFD")) return text;
  } catch {}
  const buf = await file.arrayBuffer();
  try { return new TextDecoder("euc-kr").decode(buf); }
  catch { return new TextDecoder("utf-8", { fatal: false }).decode(buf); }
}

function MatrixTab({ serverUrl, csvState, setCsvState }) {
  const [leftModelValue,  setLeftModelValue]  = useState(MODEL_LEFT_DEFAULT);
  const [rightModelValue, setRightModelValue] = useState(MODEL_RIGHT_DEFAULT);
  const leftSel  = resolveModelSelection(leftModelValue);
  const rightSel = resolveModelSelection(rightModelValue);

  const leftRun  = usePipelineRun({ backend: leftSel.backend,  serverUrl, syncFallback: false });
  const rightRun = usePipelineRun({ backend: rightSel.backend, serverUrl, syncFallback: false });

  const [leftSubTab,  setLeftSubTab]  = useState("pipeline");
  const [rightSubTab, setRightSubTab] = useState("pipeline");
  const [matrixSelectedNode, setMatrixSelectedNode] = useState(null);

  // 배치 — 모델별 독립 인덱스 (left/right 각자 자기 속도로 진행)
  const [batchFiles, setBatchFiles]     = useState([]);   // [{name, transcript}]
  const [leftIdx,  setLeftIdx]  = useState(-1);           // -1: 대기. 좌측 모델이 지금 처리 중인 파일 index
  const [rightIdx, setRightIdx] = useState(-1);           // -1: 대기. 우측 모델이 지금 처리 중인 파일 index
  const [batchResults, setBatchResults] = useState({});   // {fileName: {left, right}}
  const [selectedFileName, setSelectedFileName] = useState("");
  const fileInputRef = useRef(null);
  // 레거시 호환 (UI 일부에서 batchIdx 참조) — 둘 중 진행 중인 인덱스의 min(아직 덜 끝난 쪽)
  const batchIdx = (leftIdx < 0 && rightIdx < 0)
    ? -1
    : Math.min(leftIdx < 0 ? Infinity : leftIdx, rightIdx < 0 ? Infinity : rightIdx);
  const setBatchIdx = (v) => { setLeftIdx(v); setRightIdx(v); };  // 레거시 훅용

  // 정답 xlsx (수동 QA)
  const [answerWorkbook, setAnswerWorkbook] = useState(null);   // SheetJS workbook (파싱용)
  const [answerBuffer, setAnswerBuffer]     = useState(null);   // 원본 ArrayBuffer (ExcelJS 다운로드용 — 서식 보존)
  const [answerFileName, setAnswerFileName] = useState("");
  const [answerMap, setAnswerMap]           = useState({});     // {txtFileName: parsedSheet}
  const [answerUnmatched, setAnswerUnmatched] = useState([]);   // 매칭 안 된 transcript 파일명
  const [autoSave, setAutoSave]             = useState(true);   // 파일 완료마다 xlsx 자동 저장
  const answerFileInputRef = useRef(null);
  const autoSavedRef = useRef(new Set()); // 이미 자동 저장된 파일명
  const saveDirHandleRef = useRef(null);    // FileSystemDirectoryHandle — 사용자가 선택한 저장 루트 디렉토리
  const [saveDirName, setSaveDirName] = useState(""); // 표시용 폴더명
  const saveSeqRef = useRef(0);             // 파일 생성 시마다 증가하는 시퀀스 번호 (파일명 prefix)

  // 토스트 알림 (자동 저장 등)
  const [toasts, setToasts] = useState([]); // [{id, kind, title, message}]
  const toastIdRef = useRef(0);
  const pushToast = useCallback((t) => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev.slice(-4), { id, ...t }]); // 최대 5개 유지
    setTimeout(() => {
      setToasts(prev => prev.filter(x => x.id !== id));
    }, 5500);
  }, []);
  const dismissToast = useCallback((id) => {
    setToasts(prev => prev.filter(x => x.id !== id));
  }, []);

  const onAnswerFileSelect = useCallback(async (ev) => {
    const file = ev.target.files?.[0];
    ev.target.value = "";
    if (!file) return;
    if (!window.XLSX) return;
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: "array" });
      setAnswerWorkbook(wb);
      setAnswerBuffer(buf);  // 원본 바이너리 보관 (ExcelJS 서식 보존 다운로드용)
      setAnswerFileName(file.name);
    } catch (err) {
      console.error("answer xlsx read failed:", err);
    }
  }, []);

  const clearAnswer = useCallback(() => {
    setAnswerWorkbook(null);
    setAnswerBuffer(null);
    setAnswerFileName("");
    setAnswerMap({});
    setAnswerUnmatched([]);
  }, []);

  // answer xlsx 또는 batchFiles 변경 시 매칭 재계산
  useEffect(() => {
    if (!answerWorkbook) { setAnswerMap({}); setAnswerUnmatched([]); return; }
    const map = {};
    const unmatched = [];
    batchFiles.forEach(f => {
      const m = f.name.match(/^(\d{4,})[_\s\-]/);
      const id = m ? m[1] : null;
      let matched = null;
      if (id) {
        for (const sn of answerWorkbook.SheetNames) {
          if (new RegExp(`(^|\\D)${id}(\\D|$)`).test(sn)) { matched = sn; break; }
          const ws = answerWorkbook.Sheets[sn];
          const b3 = ws && ws.B3;
          if (b3 != null && String(b3.v).trim() === id) { matched = sn; break; }
        }
      }
      if (matched) {
        try {
          map[f.name] = parseManualEvalSheet(answerWorkbook.Sheets[matched], matched);
        } catch (err) {
          console.warn("sheet parse failed:", matched, err);
          unmatched.push(f.name);
        }
      } else {
        unmatched.push(f.name);
      }
    });
    setAnswerMap(map);
    setAnswerUnmatched(unmatched);
  }, [answerWorkbook, batchFiles]);

  const leftLabel  = leftSel.backend  === "sagemaker" ? "Qwen3-8B" : modelLabelFor(leftSel.bedrock_model_id);
  const rightLabel = rightSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(rightSel.bedrock_model_id);

  const onFilesSelected = useCallback(async (ev) => {
    const files = Array.from(ev.target.files || []);
    ev.target.value = "";
    if (!files.length) return;
    const loaded = [];
    for (const f of files) {
      const text = await readTranscriptFile(f);
      loaded.push({ name: f.name, transcript: text });
    }
    // 동일 파일명은 추가 업로드 시 최신 내용으로 교체 (중복 누적 방지)
    setBatchFiles(prev => {
      const byName = new Map(prev.map(f => [f.name, f]));
      let replaced = 0;
      let added = 0;
      for (const f of loaded) {
        if (byName.has(f.name)) replaced++;
        else added++;
        byName.set(f.name, f);
      }
      if (replaced > 0) {
        pushToast({
          kind: "info",
          title: "파일 업로드",
          message: `신규 ${added}개 추가 · 중복 ${replaced}개는 최신 내용으로 교체`,
        });
      }
      return Array.from(byName.values());
    });
  }, [pushToast]);

  const clearBatch = useCallback(() => {
    if (batchIdx >= 0) return;
    setBatchFiles([]);
    setBatchResults({});
    setSelectedFileName("");
    currentFileRef.current = null;
  }, [batchIdx]);

  const removeBatchFile = useCallback((name) => {
    // 실행 중인 파일은 보호 — 좌/우 어느 쪽이든 현재 처리 중이면 제거 금지
    const leftProcessing  = leftIdx  >= 0 && batchFiles[leftIdx]?.name  === name;
    const rightProcessing = rightIdx >= 0 && batchFiles[rightIdx]?.name === name;
    if (leftProcessing || rightProcessing) return;
    setBatchFiles(prev => prev.filter(f => f.name !== name));
    setBatchResults(prev => { const c = {...prev}; delete c[name]; return c; });
    // `${name}::${modelLabel}` 형태 키 모두 제거
    for (const k of Array.from(autoSavedRef.current)) {
      if (k === name || k.startsWith(`${name}::`)) autoSavedRef.current.delete(k);
    }
    if (selectedFileName === name) setSelectedFileName("");
  }, [leftIdx, rightIdx, batchFiles, selectedFileName]);

  // 완료된 파일들만 일괄 제거
  const removeCompletedFiles = useCallback(() => {
    if (batchIdx >= 0) return;
    const doneNames = Object.keys(batchResults);
    if (!doneNames.length) return;
    setBatchFiles(prev => prev.filter(f => !doneNames.includes(f.name)));
    setBatchResults({});
    autoSavedRef.current = new Set();
    setSelectedFileName("");
  }, [batchIdx, batchResults]);

  // 이미 xlsx 에 들어 있는 모델 결과로 batchResults 에 주입할 synthetic patch 계산
  // 반환: { patch: {modelLabel: syntheticResult}, skipLeft: bool, skipRight: bool }
  const computeSkipPatch = useCallback((fileName) => {
    const ans = answerMap[fileName];
    const mr  = ans?.modelResults || {};
    const patch = {};
    let skipLeft = false, skipRight = false;
    if (mr[leftLabel]) {
      const s = buildSyntheticResultFromModelResult(mr[leftLabel]);
      if (s) { patch[leftLabel]  = s; skipLeft  = true; }
    }
    if (mr[rightLabel]) {
      const s = buildSyntheticResultFromModelResult(mr[rightLabel]);
      if (s) { patch[rightLabel] = s; skipRight = true; }
    }
    return { patch, skipLeft, skipRight };
  }, [answerMap, leftLabel, rightLabel]);

  // 단일 모델(side='left'|'right')에 대해 idx 인덱스 파일부터 다음으로 진행 시도.
  // - xlsx 정답에 이미 결과가 있으면 synthetic 주입 후 다음 파일 찾기 (재귀)
  // - 실행 가능한 파일을 찾으면 해당 run.start 호출하고 새 idx 반환
  // - 끝까지 실행할 파일이 없으면 -1 반환 (완료)
  const advanceSide = useCallback((side, startIdx) => {
    const run = side === "left" ? leftRun : rightRun;
    const sel = side === "left" ? leftSel  : rightSel;
    const label = side === "left" ? leftLabel : rightLabel;

    let idx = startIdx;
    while (idx < batchFiles.length) {
      const f = batchFiles[idx];
      const mr = answerMap[f.name]?.modelResults || {};
      if (mr[label]) {
        // 이미 xlsx 에 결과 있음 → synthetic 주입하고 다음 파일로
        const s = buildSyntheticResultFromModelResult(mr[label]);
        if (s) {
          setBatchResults(prev => ({ ...prev, [f.name]: { ...(prev[f.name] || {}), [label]: s } }));
          autoSavedRef.current.add(`${f.name}::${label}`);
        }
        idx++;
        continue;
      }
      // 실제 LLM 실행
      run.start({ transcript: f.transcript, llmBackend: sel.backend, bedrockModelId: sel.bedrock_model_id });
      return idx;
    }
    return -1;  // 완료
  }, [leftRun, rightRun, leftSel, rightSel, leftLabel, rightLabel, batchFiles, answerMap]);

  const startBatch = useCallback(() => {
    if (!batchFiles.length || leftIdx >= 0 || rightIdx >= 0) return;
    // 초기화: 기존 answerMap 에 이미 모델 결과가 있는 파일들은 미리 batchResults 에 주입
    // ⚠️ 기존 batchResults 는 보존(병합) — 덮어쓰면 라벨 불일치 파일 / 메모리에만 있던 결과 사라짐
    const preResults = {};
    batchFiles.forEach(f => {
      const mr = answerMap[f.name]?.modelResults || {};
      const entry = {};
      if (mr[leftLabel]) {
        const s = buildSyntheticResultFromModelResult(mr[leftLabel]);
        if (s) entry[leftLabel] = s;
      }
      if (mr[rightLabel]) {
        const s = buildSyntheticResultFromModelResult(mr[rightLabel]);
        if (s) entry[rightLabel] = s;
      }
      if (Object.keys(entry).length) preResults[f.name] = entry;
    });
    // 병합: 기존 batchResults 의 (파일, 모델) 결과는 유지하고 preResults 를 위에 얹기.
    // 같은 (파일, 모델) 키가 양쪽에 있으면 preResults(Excel synthetic) 우선 — 사용자가 새 Excel 로 갱신했을 가능성.
    setBatchResults(prev => {
      const merged = { ...prev };
      Object.entries(preResults).forEach(([fname, entry]) => {
        merged[fname] = { ...(merged[fname] || {}), ...entry };
      });
      return merged;
    });
    setSelectedFileName("");
    // 자동 저장 중복 방지 — 미리 주입된 (파일, 모델) 조합 각각 마크 (기존 마크는 유지)
    Object.entries(preResults).forEach(([fname, entry]) => {
      Object.keys(entry).forEach(modelLabel => autoSavedRef.current.add(`${fname}::${modelLabel}`));
    });
    // 좌/우 각자 첫 실행
    const newLeft  = advanceSide("left",  0);
    const newRight = advanceSide("right", 0);
    setLeftIdx(newLeft);
    setRightIdx(newRight);
  }, [batchFiles, leftIdx, rightIdx, leftLabel, rightLabel, answerMap, advanceSide]);

  const abortBatch = useCallback(() => {
    leftRun.abort();
    rightRun.abort();
    setLeftIdx(-1);
    setRightIdx(-1);
  }, [leftRun, rightRun]);

  // 좌측 완료 감지: 결과 저장 → leftIdx 를 다음 파일로 진행
  useEffect(() => {
    if (leftIdx < 0) return;
    if (leftRun.isRunning) return;
    const cur = batchFiles[leftIdx];
    if (!cur) return;
    const existing = batchResults[cur.name] || {};
    // 결과 저장 (한 번만)
    if (leftRun.result && existing[leftLabel] === undefined) {
      setBatchResults(prev => ({ ...prev, [cur.name]: { ...(prev[cur.name] || {}), [leftLabel]: leftRun.result } }));
      if (!selectedFileName) setSelectedFileName(cur.name);
      return;  // 저장은 끝. 다음 렌더에서 existing[leftLabel] 이 set 되어 advance 로 이어짐
    }
    // 저장 완료된 상태 or 에러로 result=null → 다음 파일로 전진
    if (existing[leftLabel] !== undefined || leftRun.result === null) {
      const nextIdx = advanceSide("left", leftIdx + 1);
      setLeftIdx(nextIdx);
    }
  }, [leftRun.isRunning, leftRun.result, leftIdx, batchFiles, batchResults, leftLabel, selectedFileName, advanceSide]);

  // 우측 완료 감지: 결과 저장 → rightIdx 를 다음 파일로 진행
  useEffect(() => {
    if (rightIdx < 0) return;
    if (rightRun.isRunning) return;
    const cur = batchFiles[rightIdx];
    if (!cur) return;
    const existing = batchResults[cur.name] || {};
    if (rightRun.result && existing[rightLabel] === undefined) {
      setBatchResults(prev => ({ ...prev, [cur.name]: { ...(prev[cur.name] || {}), [rightLabel]: rightRun.result } }));
      if (!selectedFileName) setSelectedFileName(cur.name);
      return;
    }
    if (existing[rightLabel] !== undefined || rightRun.result === null) {
      const nextIdx = advanceSide("right", rightIdx + 1);
      setRightIdx(nextIdx);
    }
  }, [rightRun.isRunning, rightRun.result, rightIdx, batchFiles, batchResults, rightLabel, selectedFileName, advanceSide]);

  // 정답만 있어도 첫 파일 자동 선택 (사용자 수동 선택이 없을 때만)
  useEffect(() => {
    if (selectedFileName) return;
    if (batchIdx >= 0) return; // 실행 중엔 자동 처리
    const firstWithAnswer = batchFiles.find(f => answerMap[f.name]);
    if (firstWithAnswer) setSelectedFileName(firstWithAnswer.name);
  }, [batchFiles, answerMap, selectedFileName, batchIdx]);

  // 현재 뷰 대상
  const viewName = selectedFileName || (batchIdx >= 0 ? batchFiles[batchIdx]?.name : "") || "";
  const isRunningCurrent = batchIdx >= 0 && batchFiles[batchIdx]?.name === viewName;
  const savedView = batchResults[viewName] || {};
  const viewLeftResult  = savedView[leftLabel]  ?? (isRunningCurrent ? leftRun.result  : null);
  const viewRightResult = savedView[rightLabel] ?? (isRunningCurrent ? rightRun.result : null);

  const viewAnswer = answerMap[viewName] || null;
  const viewModels = [];
  if (viewAnswer)      viewModels.push({ name: "수동 QA",  type: "manual", data: viewAnswer.rows });
  if (viewLeftResult)  viewModels.push({ name: leftLabel,  type: "ai",     data: viewLeftResult });
  if (viewRightResult) viewModels.push({ name: rightLabel, type: "ai",     data: viewRightResult });

  const viewRows = viewModels.length ? buildMatrixRows(viewModels) : [];
  const viewModelNames = viewModels.map(m => m.name);
  const viewTotals = viewRows.length ? computeMatrixTotals(viewRows, viewModelNames) : {};

  // 기본 저장 폴더 이름 (사용자 지정: 바탕화면/QA평가표 테스트)
  const DEFAULT_SAVE_DIR_NAME = "QA평가표 테스트";

  // IndexedDB 에 FileSystemDirectoryHandle 영구 저장 (새로고침/재방문 후에도 같은 폴더 사용)
  const _openIdb = useCallback(() => new Promise((resolve, reject) => {
    const req = indexedDB.open("qa-matrix-fs", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("handles");
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  }), []);
  const _idbGet = useCallback(async (key) => {
    try {
      const db = await _openIdb();
      return await new Promise((res, rej) => {
        const tx = db.transaction("handles", "readonly").objectStore("handles").get(key);
        tx.onsuccess = () => res(tx.result);
        tx.onerror = () => rej(tx.error);
      });
    } catch { return null; }
  }, [_openIdb]);
  const _idbSet = useCallback(async (key, val) => {
    try {
      const db = await _openIdb();
      await new Promise((res, rej) => {
        const tx = db.transaction("handles", "readwrite").objectStore("handles").put(val, key);
        tx.onsuccess = () => res();
        tx.onerror = () => rej(tx.error);
      });
    } catch { /* best-effort */ }
  }, [_openIdb]);

  // 마운트 시 기존에 저장된 핸들 자동 복원 — 권한이 살아있으면 picker 없이 바로 사용
  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (!window.showDirectoryPicker) return;
      const handle = await _idbGet("saveDir");
      if (cancelled || !handle) return;
      try {
        let perm = "granted";
        if (handle.queryPermission) perm = await handle.queryPermission({ mode: "readwrite" });
        // granted 인 경우에만 즉시 사용 (prompt 는 사용자 제스처 때 요청)
        if (perm === "granted") {
          saveDirHandleRef.current = handle;
          setSaveDirName(handle.name || DEFAULT_SAVE_DIR_NAME);
        } else {
          // 권한이 재요청 필요 상태여도 핸들은 보관 (버튼 눌렀을 때 request 로 승격)
          saveDirHandleRef.current = handle;
          setSaveDirName(`${handle.name} (권한 재승인 필요)`);
        }
      } catch { /* no-op */ }
    })();
    return () => { cancelled = true; };
  }, [_idbGet]);

  // 사용자가 저장 루트 폴더를 선택 — 기본 위치를 바탕화면으로 힌트. 한 번 선택하면 IDB 에 영구 저장.
  const pickSaveDirectory = useCallback(async () => {
    if (!window.showDirectoryPicker) {
      pushToast({ kind: "error", title: "폴더 저장 미지원", message: "이 브라우저는 폴더 직접 지정 기능을 지원하지 않아요. 크롬/엣지 사용을 권장합니다." });
      return;
    }
    try {
      // startIn: "desktop" → 피커가 바탕화면에서 열림 (Chromium 116+). id 는 마지막 위치 기억.
      const handle = await window.showDirectoryPicker({
        mode: "readwrite",
        id: "qa-matrix-save-dir",
        startIn: "desktop",
      });
      saveDirHandleRef.current = handle;
      setSaveDirName(handle.name || DEFAULT_SAVE_DIR_NAME);
      _idbSet("saveDir", handle);
      const hint = handle.name === DEFAULT_SAVE_DIR_NAME
        ? `${handle.name} 아래에 날짜별 폴더를 만들어 자동 저장합니다.`
        : `${handle.name} 선택됨 · (추천: 바탕화면/${DEFAULT_SAVE_DIR_NAME})`;
      pushToast({ kind: "success", title: "저장 폴더 지정 완료", message: hint });
    } catch (err) {
      if (err?.name !== "AbortError") {
        console.error("pickSaveDirectory failed:", err);
        pushToast({ kind: "error", title: "폴더 지정 실패", message: String(err.message || err) });
      }
    }
  }, [pushToast, _idbSet]);

  // 저장 경로: ① 백엔드 /save-xlsx (서버가 고정 루트 `바탕화면/QA평가표 테스트` 에 직접 기록)
  //           ② FSA 핸들 (사용자가 picker 로 선택한 폴더)
  //           ③ anchor download (브라우저 기본 다운로드 폴더)
  const writeXlsxViaFsOrDownload = useCallback(async (buf, subFolder, fileName) => {
    // ① 백엔드 업로드 — FastAPI 가 로컬 머신이므로 절대경로로 저장 가능
    try {
      const blob = buf instanceof Blob ? buf : new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const fd = new FormData();
      fd.append("file", blob, fileName);
      fd.append("filename", fileName);
      fd.append("subfolder", subFolder);
      const res = await fetch("/save-xlsx", { method: "POST", body: fd });
      if (res.ok) {
        const data = await res.json().catch(() => ({}));
        return { ok: true, path: data.path || `${subFolder}/${fileName}`, via: "backend" };
      }
      const errText = await res.text().catch(() => `HTTP ${res.status}`);
      console.warn("/save-xlsx failed, falling back:", res.status, errText);
    } catch (err) {
      console.warn("/save-xlsx unreachable, falling back:", err);
    }

    // ② FSA 핸들 (백엔드 실패 또는 호스트 분리 배포 시)
    const dirHandle = saveDirHandleRef.current;
    if (dirHandle) {
      try {
        if (dirHandle.queryPermission) {
          let perm = await dirHandle.queryPermission({ mode: "readwrite" });
          if (perm !== "granted" && dirHandle.requestPermission) {
            perm = await dirHandle.requestPermission({ mode: "readwrite" });
          }
          if (perm !== "granted") throw new Error("폴더 쓰기 권한이 거부되었습니다.");
        }
        const sub = await dirHandle.getDirectoryHandle(subFolder, { create: true });
        const fileHandle = await sub.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(buf);
        await writable.close();
        return { ok: true, path: `${dirHandle.name}/${subFolder}/${fileName}`, via: "fsa" };
      } catch (err) {
        console.error("FSA write failed, falling back to download:", err);
      }
    }

    // ③ 폴백: anchor download
    const blob = buf instanceof Blob ? buf : new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${subFolder}/${fileName}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    return { ok: true, path: `${subFolder}/${fileName}`, via: "download" };
  }, []);

  const downloadMatrixXlsx = useCallback(async (opts = {}) => {
    if (!window.XLSX) return;

    // 날짜별 서브폴더 — 사용자가 지정한 루트 폴더 아래 또는 다운로드 폴더 아래.
    const _d = new Date();
    const _dateStr = `${_d.getFullYear()}-${String(_d.getMonth() + 1).padStart(2, "0")}-${String(_d.getDate()).padStart(2, "0")}`;
    const subFolder = `QA_AI_평가_${_dateStr}`;

    // === 경로 1: 원본 xlsx 업로드 + ExcelJS 로드됨 → 원본 바이너리 열어 append (서식·병합·수식 전부 보존) ===
    if (answerBuffer && window.ExcelJS) {
      try {
        const ExcelJS = window.ExcelJS;
        const wb = new ExcelJS.Workbook();
        await wb.xlsx.load(answerBuffer);
        let appendedCount = 0;
        for (const fname of Object.keys(batchResults)) {
          const ans = answerMap[fname];
          if (!ans) continue;
          const ws = wb.getWorksheet(ans.sheetName);
          if (!ws) continue;
          const res = batchResults[fname] || {};
          const aiMods = [];
          // ⭐ Excel 에서 스킵으로 주입된 synthetic 결과 (__fromAnswerXlsx) 는 쓰지 않음
          // — 이미 Excel 에 있는 결과는 절대 건드리지 않고, 새로 LLM 돌린 것만 저장
          if (res[leftLabel] && !res[leftLabel].__fromAnswerXlsx) {
            aiMods.push({ name: leftLabel, result: res[leftLabel] });
          }
          if (res[rightLabel] && !res[rightLabel].__fromAnswerXlsx) {
            aiMods.push({ name: rightLabel, result: res[rightLabel] });
          }
          if (!aiMods.length) continue;
          appendModelColumnsWithExcelJS(ws, aiMods);
          appendedCount++;
        }
        if (!appendedCount) return;
        const outBuf = await wb.xlsx.writeBuffer();
        const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
        const baseName = (answerFileName || "qa_answer").replace(/\.xlsx?$/i, "");
        const seq = String(++saveSeqRef.current).padStart(3, "0");
        const dlName = opts.autoSave
          ? `${seq}_${baseName}_with_ai_${ts}_${appendedCount}건.xlsx`
          : `${seq}_${baseName}_with_ai_${ts}.xlsx`;
        await writeXlsxViaFsOrDownload(outBuf, subFolder, dlName);
        return;
      } catch (err) {
        console.error("ExcelJS download failed, falling back to AOA:", err);
      }
    }

    // === 경로 2: 원본 xlsx 없음 → AOA 방식으로 새 파일 생성 (fallback) ===
    const fileNames = Array.from(new Set([...Object.keys(batchResults), ...Object.keys(answerMap)]));
    if (!fileNames.length) return;
    const wb = window.XLSX.utils.book_new();
    fileNames.forEach((fname) => {
      const res = batchResults[fname] || {};
      const ans = answerMap[fname] || null;
      // AI 모델 리스트 (수동 QA는 좌측 "점수/비고" 고정 컬럼으로 들어가므로 모델 목록에서 제외)
      const aiMods = [];
      // ⭐ Excel 에서 스킵으로 주입된 synthetic 결과 (__fromAnswerXlsx) 는 쓰지 않음
      if (res[leftLabel] && !res[leftLabel].__fromAnswerXlsx) {
        aiMods.push({ name: leftLabel, type: "ai", data: res[leftLabel] });
      }
      if (res[rightLabel] && !res[rightLabel].__fromAnswerXlsx) {
        aiMods.push({ name: rightLabel, type: "ai", data: res[rightLabel] });
      }
      if (!aiMods.length && !ans) return;
      const manualForBuild = ans ? [{ name: "__manual__", type: "manual", data: ans.rows }] : [];
      const aggRows = buildMatrixRows([...manualForBuild, ...aiMods]);
      const aiNames = aiMods.map(m => m.name);
      const tots = computeMatrixTotals(aggRows, ["__manual__", ...aiNames]);

      // 원본 xlsx 포맷: [대분류 | 평가항목 | 평가 기준 | 배점 | 점수 | 비고] + 모델별 [점수 | 이유] × N
      const header1 = ["대분류", "평가항목", "평가 기준 (세부사항)", "배점", "점수", "비고"];
      const header2 = ["", "", "", "", "", ""];
      aiNames.forEach(n => { header1.push(n, ""); header2.push("점수", "이유"); });
      const body = aggRows.map(r => {
        const manualRow = ans ? (ans.rows.find(x => x.no === r.no) || {}) : {};
        const line = [
          r.category,
          r.item,
          manualRow.criterion || "",
          r.max_score,
          manualRow.qa_score ?? "",
          manualRow.qa_evidence || "",
        ];
        aiNames.forEach(n => {
          const m = r.models[n] || {};
          line.push(m.score == null ? "" : m.score, m.evidence || "");
        });
        return line;
      });
      // 총점 행: 원본과 동일하게 "총점" 레이블
      const footer = ["총점", "", "", 100, ans && tots["__manual__"] != null ? tots["__manual__"] : "", ""];
      aiNames.forEach(n => { footer.push(tots[n] ?? "", ""); });

      // 상단에 상담ID / 타이틀 행 2줄 추가 (원본 스타일 유지)
      const idMatchHeader = fname.match(/^(\d+)/);
      const consultationId = ans?.sheetId || (idMatchHeader ? idMatchHeader[1] : "");
      const titleRow = ["STT 전사 데이터 기반 상담 품질 평가표 (통합)", "", "", "", "", "", ...aiNames.flatMap(() => ["", ""])];
      const idRow    = ["상담ID", consultationId, "", "", "", "", ...aiNames.flatMap(() => ["", ""])];
      const blankRow = Array(6 + aiNames.length * 2).fill("");

      const aoa = [titleRow, idRow, blankRow, header1, header2, ...body, blankRow, footer];
      const ws = window.XLSX.utils.aoa_to_sheet(aoa);

      // 병합: 타이틀 전체 너비, 공통 헤더 rowspan, 모델 그룹 colspan
      const totalCols = 6 + aiNames.length * 2;
      ws["!merges"] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: totalCols - 1 } }, // 타이틀
        // 공통 헤더(행 3) rowspan 2 — index 3,4
        { s: { r: 3, c: 0 }, e: { r: 4, c: 0 } },
        { s: { r: 3, c: 1 }, e: { r: 4, c: 1 } },
        { s: { r: 3, c: 2 }, e: { r: 4, c: 2 } },
        { s: { r: 3, c: 3 }, e: { r: 4, c: 3 } },
        { s: { r: 3, c: 4 }, e: { r: 4, c: 4 } },
        { s: { r: 3, c: 5 }, e: { r: 4, c: 5 } },
      ];
      aiNames.forEach((_, i) => {
        const col = 6 + i * 2;
        ws["!merges"].push({ s: { r: 3, c: col }, e: { r: 3, c: col + 1 } });
      });
      ws["!cols"] = [
        { wch: 14 }, { wch: 18 }, { wch: 50 }, { wch: 6 }, { wch: 6 }, { wch: 14 },
        ...aiNames.flatMap(() => [{ wch: 8 }, { wch: 50 }]),
      ];
      const idMatch = fname.match(/^(\d+)/);
      const sheetName = (idMatch ? idMatch[1] : fname).slice(0, 28);
      window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
    const count = fileNames.length;
    const seq = String(++saveSeqRef.current).padStart(3, "0");
    const fileName = opts.autoSave
      ? `${seq}_qa_matrix_auto_${ts}_${count}건.xlsx`
      : `${seq}_qa_matrix_${ts}.xlsx`;
    // SheetJS → ArrayBuffer 로 변환 후 FSA 또는 anchor 로 기록
    const outBuf = window.XLSX.write(wb, { type: "array", bookType: "xlsx" });
    await writeXlsxViaFsOrDownload(outBuf, subFolder, fileName);
  }, [batchResults, answerMap, leftLabel, rightLabel, answerBuffer, answerFileName, writeXlsxViaFsOrDownload]);

  // 모델 결과가 새로 들어올 때마다 자동 저장 (양쪽 대기 없이 들어온 결과 즉시 누적)
  // 자동저장 키는 `${fname}::${modelLabel}` — 동일 (파일, 모델) 조합 중복 저장 방지.
  // 한 파일에 두 모델 결과가 모두 들어오면 저장이 2번 일어나고, 각각 시퀀스 번호가 붙어
  // 과거/최근 파일을 구분할 수 있음.
  useEffect(() => {
    if (!autoSave) return;
    for (const fname of Object.keys(batchResults)) {
      const r = batchResults[fname] || {};
      for (const modelLabel of [leftLabel, rightLabel]) {
        if (r[modelLabel] === undefined) continue;
        const key = `${fname}::${modelLabel}`;
        if (autoSavedRef.current.has(key)) continue;
        autoSavedRef.current.add(key);
        const cumCount = autoSavedRef.current.size;
        downloadMatrixXlsx({ autoSave: true });
        const idMatch = fname.match(/^(\d+)/);
        const idShort = idMatch ? idMatch[1] : fname.slice(0, 20);
        pushToast({
          kind: "success",
          title: "💾 LLM 평가 포함 엑셀 저장됨",
          message: `상담 ${idShort} · ${modelLabel} 완료 · 누적 저장 ${cumCount}회\n(파일명 앞 번호로 구분)`,
        });
        return; // 한 렌더당 한 번만
      }
    }
  }, [batchResults, autoSave, leftLabel, rightLabel, downloadMatrixXlsx, pushToast, batchFiles.length]);

  const runForSelected = !matrixSelectedNode ? null
    : matrixSelectedNode.column === "left" ? leftRun : rightRun;
  const selForSelected = !matrixSelectedNode ? null
    : matrixSelectedNode.column === "left" ? leftSel : rightSel;

  const isBatchRunning = batchIdx >= 0;
  const processed = Object.keys(batchResults).length;

  return (
    <div className="compare-root" data-testid="matrix-root" style={{display:'flex',flexDirection:'column',gap:12,overflow:'auto',padding:'8px 4px'}}>
      {/* 상단 컨트롤 */}
      <div style={{padding:'12px 16px',background:'linear-gradient(135deg,#eff6ff,#ede9fe)',border:'1px solid #c7d2fe',borderRadius:8,display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:15,fontWeight:700,color:'#1e3a8a'}}>📊 평가표 매트릭스 (배치)</span>
          <span style={{fontSize:11,color:'#475569'}}>transcript 여러 파일 업로드 → 모델 2개 순차 실행 → STT 평가표 양식으로 결과 집계</span>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'#475569',fontWeight:600}}>좌측:</span>
          <select value={leftModelValue} onChange={e => setLeftModelValue(e.target.value)} disabled={isBatchRunning} style={{fontSize:12,padding:'4px 8px',borderRadius:4,border:'1px solid #c7d2fe'}}>
            {Object.entries(MODEL_GROUPS).map(([g, opts]) => (
              <optgroup key={g} label={g}>{opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</optgroup>
            ))}
          </select>
          <span style={{fontSize:12,color:'#475569',fontWeight:600,marginLeft:8}}>우측:</span>
          <select value={rightModelValue} onChange={e => setRightModelValue(e.target.value)} disabled={isBatchRunning} style={{fontSize:12,padding:'4px 8px',borderRadius:4,border:'1px solid #c7d2fe'}}>
            {Object.entries(MODEL_GROUPS).map(([g, opts]) => (
              <optgroup key={g} label={g}>{opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</optgroup>
            ))}
          </select>

          <input ref={fileInputRef} type="file" multiple accept=".txt,.json,.md" style={{display:'none'}} onChange={onFilesSelected} />
          <input ref={answerFileInputRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={onAnswerFileSelect} />
          <button type="button" onClick={() => fileInputRef.current?.click()} disabled={isBatchRunning} style={{marginLeft:'auto',padding:'6px 12px',borderRadius:6,border:'1px dashed #6366f1',background:'#fff',color:'#4338ca',fontSize:12,fontWeight:600,cursor:isBatchRunning?'not-allowed':'pointer'}}>
            📎 상담 전사 (여러 개)
          </button>
          <button type="button" onClick={() => answerFileInputRef.current?.click()} disabled={isBatchRunning} style={{padding:'6px 12px',borderRadius:6,border:'1px dashed #15803d',background:'#fff',color:'#15803d',fontSize:12,fontWeight:600,cursor:isBatchRunning?'not-allowed':'pointer'}}>
            📊 정답 xlsx 첨부
          </button>
          {!isBatchRunning && batchFiles.length > 0 && (
            <button type="button" onClick={clearBatch} style={{padding:'6px 10px',borderRadius:6,border:'1px solid #d1d5db',background:'#fff',color:'#6b7280',fontSize:11,cursor:'pointer'}}>
              전체 비우기
            </button>
          )}
          {!isBatchRunning && Object.keys(batchResults).length > 0 && (
            <button
              type="button"
              onClick={removeCompletedFiles}
              title="완료된 파일만 리스트에서 제거 (미실행 파일은 유지)"
              style={{padding:'6px 10px',borderRadius:6,border:'1px solid #d1d5db',background:'#fff',color:'#6b7280',fontSize:11,cursor:'pointer'}}
            >
              ✓ 완료 파일 제거 ({Object.keys(batchResults).length})
            </button>
          )}
          {!isBatchRunning ? (
            <button type="button" onClick={startBatch} disabled={!batchFiles.length} style={{padding:'7px 16px',borderRadius:6,border:'none',background:batchFiles.length?'#4f46e5':'#c7d2fe',color:'#fff',fontSize:13,fontWeight:700,cursor:batchFiles.length?'pointer':'not-allowed'}}>
              ▶ Run Batch ({batchFiles.length})
            </button>
          ) : (
            <button type="button" onClick={abortBatch} style={{padding:'7px 16px',borderRadius:6,border:'none',background:'#ef4444',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              ■ Abort
            </button>
          )}
          {processed > 0 && (
            <button type="button" onClick={() => downloadMatrixXlsx()} style={{padding:'7px 12px',borderRadius:6,border:'1px solid #15803d',background:'#fff',color:'#15803d',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              📥 엑셀 다운로드 ({processed}개)
            </button>
          )}
          <label style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'#475569',cursor:'pointer',padding:'4px 8px',background:'#fff',borderRadius:4,border:'1px solid #cbd5e1'}} title="파일 하나 완료될 때마다 누적 xlsx 자동 저장 (폴더 지정 시 그 폴더, 아니면 다운로드 폴더)">
            <input type="checkbox" checked={autoSave} onChange={e => setAutoSave(e.target.checked)} style={{margin:0}} />
            <span>📥 자동 저장</span>
          </label>
          <button
            type="button"
            onClick={pickSaveDirectory}
            title={`기본 추천 경로: 바탕화면/QA평가표 테스트 · 피커가 바탕화면에서 열립니다. 한 번 선택하면 새로고침 후에도 기억됩니다 (크롬/엣지 전용)`}
            style={{padding:'4px 8px',borderRadius:4,border:'1px solid #cbd5e1',background: saveDirName ? '#ecfdf5' : '#fef3c7', color:'#475569',fontSize:11,fontWeight:600,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4}}
          >
            📁 {saveDirName ? `저장 위치: ${saveDirName}` : "저장 폴더: 바탕화면/QA평가표 테스트 선택"}
          </button>
        </div>

        {/* 진행 상태 — 파일 있으면 항상 표시. 모델별 독립 라인 */}
        {batchFiles.length > 0 && (() => {
          // 모델별 완료 카운트
          const leftDone = batchFiles.filter(f => batchResults[f.name]?.[leftLabel]  !== undefined).length;
          const rightDone = batchFiles.filter(f => batchResults[f.name]?.[rightLabel] !== undefined).length;
          const renderModelLine = (label, running, doneCount, color, sideIdx) => {
            // side별 현재 처리 중 파일 (sideIdx >= 0 이면 그 파일명)
            const curFileName = sideIdx >= 0 ? (batchFiles[sideIdx]?.name || "") : "";
            // 처리 중 파일 번호 (1-indexed)
            const processingNo = sideIdx >= 0 ? (sideIdx + 1) : Math.min(doneCount + 1, batchFiles.length);
            const allDone = doneCount === batchFiles.length && batchFiles.length > 0;
            // 숫자 표기: 실행 중이면 "처리중/총" (현재 파일 번호), 완료되면 "완료/총"
            const countLabel = running
              ? `🔄 ${processingNo}/${batchFiles.length}`
              : allDone
                ? `✓ ${doneCount}/${batchFiles.length}`
                : `${doneCount}/${batchFiles.length}`;
            return (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{minWidth:110,fontWeight:700,color:color,whiteSpace:'nowrap'}}>{label}</span>
                <div style={{flex:'1 1 200px',minWidth:180,height:10,background:'#334155',borderRadius:5,overflow:'hidden'}}>
                  <div style={{
                    height:'100%',
                    width:`${batchFiles.length ? (doneCount + (running ? 0.5 : 0)) / batchFiles.length * 100 : 0}%`,
                    background: running ? 'linear-gradient(90deg,#fbbf24,#f97316)' : `linear-gradient(90deg,${color},${color})`,
                    transition:'width 0.3s',
                  }}/>
                </div>
                <span style={{fontSize:12,color:running?'#fbbf24':'#e2e8f0',fontWeight:running?700:400,whiteSpace:'nowrap',minWidth:76,textAlign:'right'}}>
                  {countLabel}
                </span>
                <span style={{fontSize:11,color:running?'#fbbf24':'#94a3b8',fontWeight:500,maxWidth:320,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {running ? `⏳ ${curFileName}` : (allDone ? '✓ 완료' : '대기')}
                </span>
              </div>
            );
          };
          return (
            <div style={{display:'flex',flexDirection:'column',gap:6,padding:'10px 12px',background:'#1e293b',color:'#e2e8f0',borderRadius:6}}>
              <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
                <span style={{fontWeight:700,color:'#fff'}}>
                  {isBatchRunning
                    ? `📦 배치 실행 중 · 좌 ${leftIdx >= 0 ? leftIdx + 1 : "✓"}번째 · 우 ${rightIdx >= 0 ? rightIdx + 1 : "✓"}번째 / 총 ${batchFiles.length}건`
                    : (leftDone + rightDone > 0)
                      ? `📦 진행 · 좌 ${leftDone} · 우 ${rightDone} (전체 ${batchFiles.length}건)`
                      : `📎 대기 ${batchFiles.length}건 — Run Batch 를 눌러 시작`}
                </span>
                <span style={{marginLeft:'auto',fontSize:10,color:'#94a3b8',fontFamily:'monospace'}}>
                  L={leftIdx} · R={rightIdx}
                </span>
              </div>
              {renderModelLine(leftLabel,  leftRun.isRunning,  leftDone,  '#60a5fa', leftIdx)}
              {renderModelLine(rightLabel, rightRun.isRunning, rightDone, '#a78bfa', rightIdx)}
            </div>
          );
        })()}

        {/* 정답 xlsx 배지 + 매칭 상태 */}
        {answerFileName && (
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',fontSize:12,padding:'6px 10px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:6}}>
            <span style={{fontWeight:600,color:'#15803d'}}>📊 정답:</span>
            <span style={{color:'#1f2937'}}>{answerFileName}</span>
            <span style={{color:'#6b7280'}}>
              · 탭 {answerWorkbook?.SheetNames?.length ?? 0}개
              · 매칭 {Object.keys(answerMap).length}/{batchFiles.length}
              {answerUnmatched.length > 0 && ` · 미매칭 ${answerUnmatched.length}건`}
            </span>
            {!isBatchRunning && (
              <button type="button" onClick={clearAnswer} style={{marginLeft:'auto',border:'none',background:'transparent',color:'#15803d',cursor:'pointer',fontSize:14}}>×</button>
            )}
          </div>
        )}

        {/* 파일 리스트 */}
        {batchFiles.length > 0 && (
          <div style={{display:'flex',flexWrap:'wrap',gap:6,maxHeight:90,overflow:'auto',padding:'4px 2px'}}>
            {batchFiles.map((f, i) => {
              const res = batchResults[f.name] || {};
              const leftDoneF  = res[leftLabel]  !== undefined;
              const rightDoneF = res[rightLabel] !== undefined;
              const anyDone = leftDoneF || rightDoneF;
              const bothDone = leftDoneF && rightDoneF;
              const runningLeft  = leftRun.isRunning  && i === leftIdx;
              const runningRight = rightRun.isRunning && i === rightIdx;
              const running = runningLeft || runningRight;
              const isView = f.name === viewName;
              const hasAnswer = !!answerMap[f.name];
              // xlsx에 이미 들어있는 LLM 결과로 스킵 가능한 모델 탐지
              const mr = answerMap[f.name]?.modelResults || {};
              const skipLeftAvail  = !!mr[leftLabel];
              const skipRightAvail = !!mr[rightLabel];
              const anySkip = skipLeftAvail || skipRightAvail;
              const allSkip = skipLeftAvail && skipRightAvail;
              const clickable = anyDone || hasAnswer;
              return (
                <span
                  key={f.name}
                  onClick={() => clickable && setSelectedFileName(f.name)}
                  style={{
                    display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:500,
                    cursor:clickable?'pointer':'default',
                    background: running ? '#fde68a' : bothDone ? (isView ? '#4f46e5' : '#dcfce7') : anyDone ? '#fef9c3' : '#f1f5f9',
                    color: running ? '#78350f' : bothDone ? (isView ? '#fff' : '#15803d') : anyDone ? '#854d0e' : '#64748b',
                    border: isView ? '2px solid #312e81' : '1px solid transparent',
                  }}
                  title={
                    f.name +
                    (hasAnswer ? " (정답 매칭)" : "") +
                    (allSkip ? ` · 양쪽 xlsx 결과 사용 (스킵)` : anySkip ? ` · ${skipLeftAvail ? leftLabel : rightLabel} xlsx 결과 사용 (스킵)` : "") +
                    (leftDoneF ? ` · ${leftLabel} ✓` : "") +
                    (rightDoneF ? ` · ${rightLabel} ✓` : "")
                  }
                >
                  {running ? '⏳' : bothDone ? '✓' : anyDone ? '◐' : '•'} {f.name.slice(0, 30)}{f.name.length > 30 ? '...' : ''}
                  <span style={{fontSize:9,opacity:0.7,letterSpacing:1}}>
                    {leftDoneF ? 'L' : '·'}{rightDoneF ? 'R' : '·'}
                  </span>
                  {hasAnswer && <span style={{fontSize:10,opacity:0.85}}>📊</span>}
                  {anySkip && <span style={{fontSize:10,opacity:0.85}} title={allSkip ? "양쪽 모델 xlsx 결과 사용 — 파이프라인 스킵" : "일부 모델 xlsx 결과 사용 — 해당 모델 스킵"}>💾</span>}
                  {!running && (
                    <button
                      onClick={(e) => { e.stopPropagation(); removeBatchFile(f.name); }}
                      style={{
                        border:'none',background:'transparent',
                        color: isView ? '#fff' : (running ? '#78350f' : bothDone ? '#15803d' : anyDone ? '#854d0e' : '#94a3b8'),
                        cursor:'pointer',padding:'0 2px',fontSize:14,fontWeight:700,opacity:0.7,
                      }}
                      title="이 파일 제거"
                      onMouseEnter={(e) => e.currentTarget.style.opacity = '1'}
                      onMouseLeave={(e) => e.currentTarget.style.opacity = '0.7'}
                    >×</button>
                  )}
                </span>
              );
            })}
          </div>
        )}
      </div>

      {/* 2컬럼 파이프라인 */}
      <div className="compare-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,minHeight:440}}>
        <ColumnPane
          column="left"  run={leftRun}  sel={leftSel}
          modelValue={leftModelValue}  onModelChange={setLeftModelValue}
          subTab={leftSubTab}   setSubTab={setLeftSubTab}
          serverUrl={serverUrl} csvState={csvState} setCsvState={setCsvState}
          onSelectNode={(nodeId) => setMatrixSelectedNode({ column: "left", nodeId })}
        />
        <ColumnPane
          column="right" run={rightRun} sel={rightSel}
          modelValue={rightModelValue} onModelChange={setRightModelValue}
          subTab={rightSubTab}  setSubTab={setRightSubTab}
          serverUrl={serverUrl} csvState={csvState} setCsvState={setCsvState}
          onSelectNode={(nodeId) => setMatrixSelectedNode({ column: "right", nodeId })}
        />
      </div>

      {/* 매트릭스 결과 */}
      <div style={{padding:'12px 14px',background:'#fff',border:'1px solid #cbd5e1',borderRadius:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
          <span style={{fontSize:14,fontWeight:700,color:'#0f172a'}}>STT 평가표 매트릭스</span>
          {viewName && <span style={{fontSize:12,color:'#475569'}}>· 현재: <b>{viewName.slice(0, 60)}</b></span>}
          {processed > 1 && (
            <select value={selectedFileName} onChange={e => setSelectedFileName(e.target.value)} style={{marginLeft:'auto',fontSize:12,padding:'4px 8px',borderRadius:4,border:'1px solid #cbd5e1'}}>
              {Object.keys(batchResults).map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          )}
        </div>
        <ComparisonMatrixTable rows={viewRows} modelNames={viewModelNames} totals={viewTotals} />
      </div>

      {runForSelected && (
        <NodeDrawer
          nodeId={matrixSelectedNode.nodeId}
          backend={selForSelected.backend}
          modelLabel={selForSelected.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(selForSelected.bedrock_model_id)}
          nodeStates={runForSelected.nodeStates}
          nodeTimings={runForSelected.nodeTimings}
          nodeScores={runForSelected.nodeScores}
          result={runForSelected.result}
          streamingItems={runForSelected.streamingItems}
          nodeErrors={runForSelected.nodeErrors}
          tenantId={runForSelected.tenantId}
          serverUrl={serverUrl}
          onClose={() => setMatrixSelectedNode(null)}
        />
      )}

      {/* 토스트 알림 스택 (자동 저장 완료 등) */}
      {toasts.length > 0 && (
        <div className="mx-toast-stack">
          {toasts.map(t => (
            <div key={t.id} className={`mx-toast kind-${t.kind || 'success'}`}>
              <div className="mx-t-body">
                <div className="mx-t-title">{t.title}</div>
                {t.message && <div className="mx-t-msg">{t.message}</div>}
              </div>
              <button className="mx-t-close" onClick={() => dismissToast(t.id)} title="닫기">×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────── */

function App() {
  const [serverUrl, setServerUrl] = useState(() => {
    if (window.location.protocol.startsWith("http")) {
      return window.location.origin;
    }
    return "http://localhost:8081";
  });
  const [uploadedFileName, setUploadedFileName] = useState("");
  const [transcript, setTranscript] = useState("");
  // GT (ground truth) 점수 — JSON 첨부 시 id 필드 기반으로 xlsx 에서 조회.
  const [gtSampleId, setGtSampleId] = useState("");
  const [gtScores, setGtScores] = useState(null);  // {sample_id, total_score, items[]}
  const [gtError, setGtError] = useState("");
  const [gtPanelOpen, setGtPanelOpen] = useState(false);
  // Persona 모드 — "ensemble" (기본, Strict/Neutral/Loose 3명) | "single" (Neutral 1명)
  const [personaMode, setPersonaMode] = useState("ensemble");
  // LLM 백엔드: "bedrock" (Sonnet 4.6, 기본) 또는 "sagemaker" (Qwen3-8B vLLM)
  const [llmBackend, setLlmBackend] = useState("bedrock");
  const [serverStatus, setServerStatus] = useState("offline");

  // 단일 파이프라인 런 — gt_sample_id / persona_mode 를 extraBody 로 넘김
  // useMemo 로 안정화 — personaMode/gtSampleId 변경 시만 재생성 → useCallback dep 트리거 방지
  const singleExtraBody = useMemo(() => ({
    ...(gtSampleId ? { gt_sample_id: gtSampleId } : {}),
    persona_mode: personaMode,  // "single" | "ensemble"
  }), [gtSampleId, personaMode]);
  const single = usePipelineRun({
    backend: llmBackend, serverUrl, syncFallback: true,
    extraBody: singleExtraBody,
  });
  const {
    running, elapsed, errorAlert,
    nodeStates, nodeTimings, nodeScores, nodeErrors, edgeStates,
    result, streamingItems, logs, traces, rawLogs, tenantId, setTenantId,
    isRunning, phaseAHighlight, phaseB1Highlight, phaseB2Highlight,
    setErrorAlert,
  } = single;

  // tenant 자동 감지 표시 (JSON 필드 감지 성공 시 true → UI 배지 "자동감지")
  const [tenantAutoDetected, setTenantAutoDetected] = useState(false);

  // AWS RAG gate — tenant_config 의 모든 필수 AOSS 인덱스가 준비돼야 Run 허용
  const awsGate = useAwsRagGate(serverUrl, tenantId);

  const [centerTab, setCenterTab] = useState("pipeline");
  const [selectedNode, setSelectedNode] = useState(null);

  // App 레벨 토스트 — HITL 저장 성공/실패 알림용
  const [appToasts, setAppToasts] = useState([]);
  const appToastIdRef = useRef(0);
  const pushAppToast = useCallback((t) => {
    const id = ++appToastIdRef.current;
    setAppToasts(prev => [...prev.slice(-4), { id, ...t }]);
    setTimeout(() => {
      setAppToasts(prev => prev.filter(x => x.id !== id));
    }, 5500);
  }, []);
  const dismissAppToast = useCallback((id) => {
    setAppToasts(prev => prev.filter(x => x.id !== id));
  }, []);

  // consultation_id — gt_sample_id 가 최우선, 없으면 csvState.id, 없으면 result.consultation_id
  const consultationId = useMemo(() => {
    return gtSampleId
      || csvState?.id
      || result?.consultation_id
      || result?.report?.consultation_id
      || "";
  }, [gtSampleId, csvState, result]);

  // 자동 저장 — 평가 완료 시 결과 xlsx 를 백엔드 폴더에 저장
  const [autoSaveResult, setAutoSaveResult] = useState(true);
  const lastSavedResultRef = useRef(null);
  const [lastSavedPath, setLastSavedPath] = useState("");

  // CSV 호환 API 패널 상태 — App 으로 리프팅하여 탭 전환 시 유실되지 않게 유지
  const [csvState, setCsvState] = useState(() => {
    const pad = (n) => String(n).padStart(2, "0");
    const d = new Date();
    return {
      id: "TEST-001",
      callSeq: "SEQ-001",
      cdate: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`,
      uid: (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ("uid-" + Math.random().toString(36).slice(2, 10)),
      content:
        "상담사: 안녕하세요, 고객센터입니다. 무엇을 도와드릴까요?\n" +
        "고객: 최근 가입한 상품 내용을 확인하고 싶습니다.\n" +
        "상담사: 네, 본인 확인 후 상품 상세를 안내해 드리겠습니다.\n" +
        "고객: 네 감사합니다.\n" +
        "상담사: 상품명은 안심플랜 B이고, 월 납입금은 2만원, 보장 기간은 10년입니다. 중도 해지 시 위약금이 발생할 수 있음을 고지드립니다.\n" +
        "고객: 알겠습니다.\n" +
        "상담사: 추가 문의 없으시면 상담 종료하겠습니다. 감사합니다.",
      busy: false,
      result: null,
      error: null,
      checklistOpen: false,
    };
  });

  const [tabFlash, triggerFlash] = useTabFlash(["results", "logs", "traces", "rawlogs"]);

  const prevLogsLenRef = useRef(0);
  const prevTracesLenRef = useRef(0);
  const prevRawLogsLenRef = useRef(0);
  const prevStreamLenRef = useRef(0);
  const prevGradeRef = useRef(null);

  useEffect(() => {
    if (logs.length > prevLogsLenRef.current && centerTab !== 'logs') triggerFlash('logs');
    prevLogsLenRef.current = logs.length;
  }, [logs.length, centerTab, triggerFlash]);

  useEffect(() => {
    if (traces.length > prevTracesLenRef.current && centerTab !== 'traces') triggerFlash('traces');
    prevTracesLenRef.current = traces.length;
  }, [traces.length, centerTab, triggerFlash]);

  useEffect(() => {
    if (rawLogs.length > prevRawLogsLenRef.current && centerTab !== 'rawlogs') triggerFlash('rawlogs');
    prevRawLogsLenRef.current = rawLogs.length;
  }, [rawLogs.length, centerTab, triggerFlash]);

  useEffect(() => {
    if (streamingItems.length > prevStreamLenRef.current && centerTab !== 'results') triggerFlash('results');
    prevStreamLenRef.current = streamingItems.length;
  }, [streamingItems.length, centerTab, triggerFlash]);

  useEffect(() => {
    const g = result?.report?.summary?.grade || null;
    if (g && prevGradeRef.current !== g && centerTab !== 'results') triggerFlash('results');
    prevGradeRef.current = g;
  }, [result, centerTab, triggerFlash]);

  // 평가 완료 시 자동 저장 — 결과 1건당 1회만
  useEffect(() => {
    if (!autoSaveResult) return;
    if (!result || !result?.report?.summary?.grade) return;
    if (lastSavedResultRef.current === result) return;
    lastSavedResultRef.current = result;
    (async () => {
      try {
        const ret = exportResultsToXlsx(result, llmBackend, true);
        if (!ret) return;
        const { buf, fileName } = ret;
        const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const fd = new FormData();
        fd.append("file", blob, fileName);
        fd.append("filename", fileName);
        // 날짜별 하위 폴더로 정리
        const d = new Date();
        const yyyymmdd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        fd.append("subfolder", yyyymmdd);
        const res = await fetch(`${serverUrl}/save-xlsx`, { method: "POST", body: fd });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          setLastSavedPath(data.path || `${yyyymmdd}/${fileName}`);
        } else {
          console.warn("자동 저장 실패:", res.status, await res.text().catch(() => ""));
        }
      } catch (e) {
        console.warn("자동 저장 예외:", e);
      }
    })();
  }, [result, llmBackend, autoSaveResult, serverUrl]);

  const checkHealth = useCallback(async () => {
    try {
      const r = await fetch(`${serverUrl}/health`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) setServerStatus("online");
      else setServerStatus("offline");
    } catch {
      setServerStatus("offline");
    }
  }, [serverUrl]);

  useEffect(() => {
    checkHealth();
    const delay = serverStatus === "online" ? 30000 : 5000;
    const iv = setInterval(checkHealth, delay);
    return () => clearInterval(iv);
  }, [checkHealth, serverStatus]);

  useEffect(() => {
    if (!errorAlert) return;
    const t = setTimeout(() => setErrorAlert(null), 10000);
    return () => clearTimeout(t);
  }, [errorAlert, setErrorAlert]);

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setSelectedNode(null); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const runEvaluation = useCallback(() => {
    if (!transcript.trim()) return;
    return single.start({ transcript, llmBackend, tenantId });
  }, [single, transcript, llmBackend, tenantId]);

  return (
    <div>
      {errorAlert && (
        <div className={`error-banner ${errorAlert.type === "timeout" ? "error-banner--timeout" : ""}`}>
          <div className="error-banner__icon">{errorAlert.type === "timeout" ? "⏱" : "!"}</div>
          <div className="error-banner__body">
            <div className="error-banner__title">
              {errorAlert.type === "timeout"
                ? "시간 초과 — LLM 응답이 너무 오래 걸립니다"
                : "파이프라인 오류"}
            </div>
            <div className="error-banner__message">{errorAlert.message}</div>
          </div>
          <button
            className="error-banner__dismiss"
            onClick={() => setErrorAlert(null)}
            aria-label="닫기"
          >
            ×
          </button>
        </div>
      )}
      <div className="header">
        <div className="header-left">
          <div>
            <div className="header-title">QA Pipeline V2 Dashboard</div>
            <div className="header-subtitle">4-Layer · 8 Sub Agents · RAG 3종 · Multi-tenant · Confidence 4-signal · Tier T0-T3</div>
          </div>
        </div>
        <div className="header-right">
          {running && (
            <span className="elapsed-display">Elapsed: {fmtTime(elapsed)}</span>

          <span className={`status-badge ${serverStatus}`}>
            <span className={`status-dot ${serverStatus}`} />

          </span>
        </div>
      </div>

      <div className="main-layout">
        <div className="left-panel">
          <div className="panel-section">
            <div className="panel-label">Server URL</div>
            <input
              className="input-field"
              value={serverUrl}
              onChange={e => setServerUrl(e.target.value)}
              placeholder="http://localhost:8081"
            />
          </div>

          <div className="panel-section">
            <div className="panel-label" style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:8}}>
              <label style={{display:"inline-flex", alignItems:"center", gap:6, fontSize:11, color:"var(--text-primary)", cursor:"pointer"}}>
                <input type="checkbox" checked={autoSaveResult} onChange={e => setAutoSaveResult(e.target.checked)} />
                평가 결과 자동 저장
              </label>
            </div>
            <div style={{fontSize:10, color:"var(--text-secondary)", padding:"2px 0"}}>
              평가 완료 시 xlsx 를 <code>~/Desktop/QA평가결과/&lt;YYYY-MM-DD&gt;/</code> 폴더에 자동 저장합니다.
              <br/>
              경로 변경: 서버 환경변수 <code>QA_RESULT_SAVE_ROOT</code>
            </div>
            {lastSavedPath && (
              <div style={{fontSize:10, color:"#15803d", padding:"4px 6px", background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:4, marginTop:4, wordBreak:"break-all"}}>
                ✓ 마지막 저장: <code>{lastSavedPath}</code>
              </div>
            )}
          </div>

          <div className="panel-section">
            <div className="panel-label" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span>Transcript</span>
              <label htmlFor="transcript-file" style={{
                cursor:"pointer", fontSize:11, color:"var(--blue)",
                padding:"3px 10px", border:"1px solid var(--border)", borderRadius:4,
                background:"var(--active-bg)"
              }}>📎 파일 첨부</label>
              <input
                id="transcript-file"
                type="file"
                accept=".txt,.json,.md"
                style={{display:"none"}}
                onChange={e => {
                  const file = e.target.files && e.target.files[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    const text = ev.target.result;
                    if (file.name.toLowerCase().endsWith(".json")) {
                      try {
                        const obj = JSON.parse(text);
                        if (obj && typeof obj.transcript === "string") {
                          setTranscript(obj.transcript);
                        } else {
                          setTranscript(text);
                        }
                        // GT sample_id 추출 및 fetch — obj.id 우선, 없으면 파일명에서 숫자 6자리 추출
                        const fileIdMatch = (file.name || "").match(/(\d{6,})/);
                        const sid = (typeof obj?.id !== "undefined" && obj.id !== null)
                          ? String(obj.id)
                          : (fileIdMatch ? fileIdMatch[1] : "");
                        if (sid) {
                          setGtSampleId(sid);
                          setGtError("");
                          setGtScores(null);
                          fetch(`${serverUrl}/v2/gt-scores?sample_id=${encodeURIComponent(sid)}`)
                            .then(r => r.json().then(j => ({ ok: r.ok, body: j })))
                            .then(({ ok, body }) => {
                              if (ok && body && body.items) {
                                setGtScores(body);
                              } else {
                                setGtError(body?.error || "GT lookup 실패");
                              }
                            })
                            .catch(e => setGtError(String(e)));
                        } else {
                          setGtSampleId("");
                          setGtScores(null);
                          setGtError("");
                        }
                        // tenant 자동 감지: SITE_CD (qa_samples) / tenant_id / tenant / meta.* 순
                        const rawDetected =
                          (typeof obj?.SITE_CD === "string" && obj.SITE_CD) ||
                          (typeof obj?.site_cd === "string" && obj.site_cd) ||
                          (typeof obj?.tenant_id === "string" && obj.tenant_id) ||
                          (typeof obj?.tenant === "string" && obj.tenant) ||
                          (typeof obj?.meta?.tenant_id === "string" && obj.meta.tenant_id) ||
                          (typeof obj?.metadata?.tenant_id === "string" && obj.metadata.tenant_id) ||
                          null;
                        // SITE_CD 원값을 tenant_id 로 매핑 (현재는 1:1, 알 수 없는 값은 그대로 통과)
                        const TENANT_MAP = { kolon: "kolon", cartgolf: "cartgolf", generic: "generic" };
                        const detected = rawDetected
                          ? (TENANT_MAP[rawDetected.toLowerCase()] || rawDetected.toLowerCase())
                          : null;
                        if (detected) {
                          setTenantId(detected);
                          setTenantAutoDetected(true);
                        } else {
                          setTenantAutoDetected(false);
                        }
                      } catch {
                        setTranscript(text);
                        setTenantAutoDetected(false);
                      }
                    } else {
                      setTranscript(text);
                      setTenantAutoDetected(false);
                    }
                    setUploadedFileName(file.name);
                  };
                  reader.readAsText(file, "UTF-8");
                  e.target.value = "";
                }}
              />
            </div>
            {uploadedFileName && (
              <div style={{
                fontSize: 11, color: "var(--text-secondary)",
                marginBottom: 6, padding: "4px 8px",
                background: "var(--active-bg)", borderRadius: 4,
                display:"flex", justifyContent:"space-between", alignItems:"center"
              }}>
                <span>📄 {uploadedFileName}</span>
                <button
                  onClick={() => {
                    setTranscript(""); setUploadedFileName(""); setTenantAutoDetected(false);
                    setGtSampleId(""); setGtScores(null); setGtError("");
                  }}
                  style={{background:"none", border:"none", color:"var(--text-secondary)", cursor:"pointer", fontSize:12}}
                >✕</button>
              </div>
            )}
            {gtSampleId && (
              <div style={{ marginBottom: 6 }}>
                <div
                  onClick={() => gtScores && setGtPanelOpen(v => !v)}
                  style={{
                    fontSize: 11, padding: "4px 8px",
                    borderRadius: gtPanelOpen && gtScores ? "4px 4px 0 0" : 4,
                    background: gtScores ? "rgba(34,197,94,0.08)" : gtError ? "rgba(239,68,68,0.08)" : "rgba(148,163,184,0.08)",
                    color: gtScores ? "#166534" : gtError ? "#991b1b" : "var(--text-secondary)",
                    display:"flex", justifyContent:"space-between", alignItems:"center",
                    cursor: gtScores ? "pointer" : "default",
                    userSelect: "none",
                  }}>
                  <span>
                    {gtScores
                      ? `${gtPanelOpen ? '▾' : '▸'} 수기 QA 정답 · 상담ID ${gtSampleId} · 총점 ${gtScores.total_score}/100 · 17항목`
                      : gtError
                        ? `⚠ 수기 QA 정답 조회 실패 (id=${gtSampleId}): ${gtError}`
                        : `⏳ 수기 QA 정답 조회 중 (id=${gtSampleId})…`}
                  </span>
                  {gtScores && (
                    <span style={{fontSize:9, color:'#166534', opacity:0.7}}>
                      {gtScores.sheet_name}
                    </span>
                  )}
                </div>
                {gtPanelOpen && gtScores && Array.isArray(gtScores.items) && (
                  <div style={{
                    border: "1px solid rgba(34,197,94,0.25)",
                    borderTop: "none", borderRadius: "0 0 4px 4px",
                    background: "white", padding: "6px 8px",
                    maxHeight: 320, overflowY: "auto",
                  }}>
                    {(() => {
                      const byCat = {};
                      gtScores.items.forEach(it => {
                        const c = it.category || "기타";
                        if (!byCat[c]) byCat[c] = [];
                        byCat[c].push(it);
                      });
                      return Object.entries(byCat).map(([cat, catItems]) => {
                        const catTotal = catItems.reduce((s, it) => s + (Number(it.score) || 0), 0);
                        const catMax = catItems.reduce((s, it) => s + (Number(it.max_score) || 0), 0);
                        return (
                          <div key={cat} style={{ marginBottom: 6 }}>
                            <div style={{
                              fontSize:10, fontWeight:800, color:'#1f2937',
                              display:'flex', justifyContent:'space-between',
                              padding:'3px 4px', background:'#f3f4f6',
                              borderRadius:3, marginBottom:3,
                            }}>
                              <span>{cat.replace(/\n/g, ' ')}</span>
                              <span style={{color:'#4b5563', fontWeight:700}}>
                                {catTotal} / {catMax}
                              </span>
                            </div>
                            {catItems.map(it => (
                              <div key={it.item_number} style={{
                                fontSize:10, padding:'3px 4px 3px 8px',
                                display:'grid',
                                gridTemplateColumns: '1fr auto',
                                gap: 6,
                                borderBottom:'1px solid #f3f4f6',
                              }}>
                                <div>
                                  <span style={{fontWeight:700, color:'#4b5563'}}>
                                    #{it.item_number}
                                  </span>
                                  <span style={{marginLeft:4, color:'#1f2937'}}>
                                    {(it.item_name || '').replace(/\n/g, ' ')}
                                  </span>
                                  {it.note && (
                                    <div style={{
                                      fontSize:9, color:'#6b7280', marginTop:2,
                                      whiteSpace:'pre-wrap', lineHeight:1.4,
                                      maxHeight: 60, overflow:'hidden',
                                    }}>
                                      {String(it.note).slice(0, 220)}
                                      {String(it.note).length > 220 ? '…' : ''}
                                    </div>
                                  )}
                                </div>
                                <div style={{
                                  fontWeight:800, color:'#059669',
                                  whiteSpace:'nowrap', alignSelf:'start',
                                }}>
                                  {it.score ?? '?'} / {it.max_score ?? '?'}
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      });
                    })()}
                  </div>
                )}
              </div>
            )}
            <textarea
              className="textarea-field"
              value={transcript}
              onChange={e => { setTranscript(e.target.value); if (uploadedFileName) setUploadedFileName(""); }}
              placeholder="상담 내용을 직접 입력하거나 상단 '파일 첨부' 버튼으로 .txt / .json 파일을 업로드하세요..."
              rows={10}
            />
          </div>

              <span>Tenant</span>
              {tenantAutoDetected && (
                <span style={{
                  fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:10,
                  background:"#dcfce7", color:"#166534",
                }} title="JSON 파일의 tenant_id / tenant 필드에서 자동 감지됨">
                  🔎 자동감지
                </span>
              )}
            </div>
            <select

              onChange={e => { setTenantId(e.target.value); setTenantAutoDetected(false); }}

              title="평가 시 사용할 테넌트 — JSON 업로드 시 tenant_id 필드가 있으면 자동 선택됨"
            >

              <option value="kolon">kolon (코오롱)</option>
              <option value="cartgolf">cartgolf (카트골프)</option>
            </select>
          </div>

            <div className="panel-label">Sample Data</div>

              <button className="sample-btn" onClick={() => setTranscript(SAMPLES.return)} title="85턴 · 중립">

              <button className="sample-btn" onClick={() => setTranscript(SAMPLES.as)} title="105턴 · 부정">
                A/S 요청

          {centerTab !== "compare" && centerTab !== "matrix" && (

              <div className="llm-backend-toggle">
                <button
                  className={`llm-backend-btn test-only ${llmBackend === "sagemaker" ? "active" : ""}`}

                  onClick={() => setLlmBackend("sagemaker")}

                >
                  <div className="llm-backend-name">Qwen3-8B</div>
                  <div className="llm-backend-desc">SageMaker vLLM</div>
                  <div className="llm-backend-test-badge">테스트용</div>
                </button>
                <button
                  className={`llm-backend-btn ${llmBackend === "bedrock" ? "active" : ""}`}
                  disabled={running}
                  onClick={() => setLlmBackend("bedrock")}
                  title="Bedrock Claude Sonnet 4.6 (기본값 · 고품질)"
                >
                  <div className="llm-backend-name">Sonnet 4.6</div>
                  <div className="llm-backend-desc">Bedrock</div>
                </button>
              </div>
            </div>
          )}

          {centerTab !== "compare" && centerTab !== "matrix" && (
            <div className="panel-section">
              <div className="panel-label">Persona Mode</div>
              <div className="llm-backend-toggle">
                <button
                  className={`llm-backend-btn ${personaMode === "single" ? "active" : ""}`}
                  disabled={running}
                  onClick={() => setPersonaMode("single")}
                  title="Neutral 1명만 호출 — 빠름 (LLM 호출 1/3 수준)"
                  style={{ flex: 1 }}
                >
                  <div className="llm-backend-name">Single</div>
                  <div className="llm-backend-desc">Neutral 1명 · 빠름</div>
                </button>
                <button
                  className={`llm-backend-btn ${personaMode === "ensemble" ? "active" : ""}`}
                  disabled={running}
                  onClick={() => setPersonaMode("ensemble")}
                  title="Strict / Neutral / Loose 3명 병렬 + 필요 시 판사 (기본 · 고품질)"
                  style={{ flex: 1 }}
                >
                  <div className="llm-backend-name">Ensemble</div>
                  <div className="llm-backend-desc">3 평가자 + 판사</div>
                </button>
              </div>
            </div>
          )}

          {centerTab !== "compare" && centerTab !== "matrix" && (
            <>

              <div className="panel-section" style={{
                padding: "8px 12px",
                background: awsGate.loading ? "#e0e7ff" : awsGate.ready ? "#dcfce7" : "#fef3c7",
                borderLeft: `3px solid ${awsGate.loading ? "#6366f1" : awsGate.ready ? "#10b981" : "#f59e0b"}`,
                borderRadius: 4, margin: "0 20px",
              }} title={awsGate.reason || ""}>
                <div style={{
                  fontSize: 11, fontWeight: 700,
                  color: awsGate.loading ? "#3730a3" : awsGate.ready ? "#166534" : "#92400e",
                }}>
                  {awsGate.loading
                    ? "⏳ AWS RAG 상태 확인 중..."
                    : awsGate.ready
                      ? `✓ AWS RAG 연동 완료 (tenant=${tenantId})`
                      : `⚠ AWS RAG 미연동 — Run 차단`}
                </div>
                {!awsGate.ready && !awsGate.loading && awsGate.reason && (
                  <div style={{ fontSize: 10.5, color: "#92400e", marginTop: 3 }}>
                    {awsGate.reason}
                  </div>
                )}
                {!awsGate.ready && !awsGate.loading && (
                  <div style={{ fontSize: 10, color: "#78350f", marginTop: 3 }}>
                    tenant_config 노드 클릭 → AWS 연결 상태 확인 · 필요 시 bootstrap 재실행
                  </div>
