/* ── Progress Bar ──────────────────────────────────────────── */

/* V2 Progress bar 진행도 측정 대상 노드. Layer1 → 8 Sub Agents → Layer3 → Layer4 순.
   RAG / tenant_config 는 외부 주입이라 진행도에서 제외. */
const AGENT_NODES = ['layer1',
  'greeting','listening_comm','language','needs',
  'explanation','proactiveness','work_accuracy','privacy',
  'orchestrator_v2','confidence','tier_router','evidence_refiner','report_generator'];

const ProgressBar = React.memo(function ProgressBar({ nodeStates }) {
  const total = AGENT_NODES.length;
  const done = AGENT_NODES.filter(n => nodeStates[n] === 'done').length;
  const active = AGENT_NODES.filter(n => nodeStates[n] === 'active').length;
  const pct = Math.round((done / total) * 100);

  return (
    <div className="progress-bar-container" data-testid="progress-bar" data-progress-pct={pct}>
      <div className="progress-bar-track">
        <div className="progress-bar-fill" style={{ width: pct + '%' }}></div>
      </div>
      <div className="progress-text">
        <span>{done}/{total} 노드 완료{active > 0 ? ` (${active}개 실행 중)` : ''}</span>
        <span>{pct}%</span>
      </div>
    </div>
  );
});

/* ── React Flow Pipeline Graph ────────────────────────────── */

function ReactFlowPipeline({ nodeStates, nodeTimings, nodeScores, edgeStates, onNodeClick,
                             phaseAHighlight, phaseB1Highlight, phaseB2Highlight, result, streamingItems, tenantId,
                             awsGateState, awsGateReason }) {
  /* If React Flow UMD failed to load, show a fallback message */
  if (!ReactFlowComponent || !useNodesState) {
    return (
      <div style={{padding: 40, textAlign: 'center', color: 'var(--text-secondary)'}}>
        React Flow 라이브러리 로드 실패 — 네트워크를 확인해 주세요.
      </div>
    );
  }

  /* Tooltip state — positioned in fixed-viewport coordinates using the
     node's DOM bounding rect (RF renders each node as a DOM element with
     data-id, so this escapes the zoom/pan transform cleanly). */
  const [tooltip, setTooltip] = useState({ visible: false, x: 0, y: 0, nodeId: null });
  const handleNodeHover = useCallback((e, nodeId) => {
    const el = e.currentTarget.closest('.react-flow__node') || e.currentTarget;
    const rect = el.getBoundingClientRect();
    setTooltip({ visible: true, x: rect.left + rect.width / 2, y: rect.top - 8, nodeId });
  }, []);
  const handleNodeLeave = useCallback(() => {
    setTooltip(prev => ({ ...prev, visible: false }));
  }, []);

  /* Ripple state: map of nodeId -> timestamp. Triggered when a node
     transitions to 'done'. Cleared 700ms later so the animation can replay. */
  const prevStatesRef = useRef({});
  const [ripples, setRipples] = useState({});
  const rippleTimerRef = useRef(null);
  useEffect(() => {
    const prev = prevStatesRef.current;
    const newly = {};
    Object.entries(nodeStates).forEach(([id, state]) => {
      if (state === 'done' && prev[id] !== 'done') {
        newly[id] = Date.now();
      }
    });
    if (Object.keys(newly).length) {
      setRipples(r => ({ ...r, ...newly }));
      if (rippleTimerRef.current) clearTimeout(rippleTimerRef.current);
      rippleTimerRef.current = setTimeout(() => {
        setRipples({});
        rippleTimerRef.current = null;
      }, 700);
    }
    prevStatesRef.current = { ...nodeStates };
    return () => { if (rippleTimerRef.current) clearTimeout(rippleTimerRef.current); };
  }, [nodeStates]);

  /* Tenant 변경 감지 — tenantId 가 바뀌면 tenant_config 노드에 ripple 트리거 */
  const prevTenantRef = useRef(tenantId);
  const tenantTimerRef = useRef(null);
  useEffect(() => {
    if (prevTenantRef.current === tenantId) return;
    prevTenantRef.current = tenantId;
    setRipples(r => ({ ...r, tenant_config: Date.now() }));
    if (tenantTimerRef.current) clearTimeout(tenantTimerRef.current);
    tenantTimerRef.current = setTimeout(() => {
      setRipples(r => { const { tenant_config: _omit, ...rest } = r; return rest; });
      tenantTimerRef.current = null;
    }, 900);
    return () => { if (tenantTimerRef.current) clearTimeout(tenantTimerRef.current); };
  }, [tenantId]);

  const initialEdges = useMemo(() => {
    return EDGES.map((e, i) => {
      const ek = `${e.from}->${e.to}`;
      return {
        id: ek,
        source: e.from,
        target: e.to,
        label: e.label,
        type: 'bus',
        data: { busIn: !!e.busIn },
        animated: false,
        className: 'edge-pending',
        markerEnd: {
          type: MarkerType ? MarkerType.ArrowClosed : 'arrowclosed',
          color: 'var(--edge-pending)', width: 14, height: 14,
        },
        labelStyle: { fontSize: 10, fill: 'var(--text-secondary)', fontWeight: 500 },
        labelBgStyle: { fill: 'var(--bg)', fillOpacity: 0.92 },
        labelBgPadding: [6, 3],
        labelBgBorderRadius: 4,
      };
    });
  }, []);

  /* Build initial nodes: pipeline nodes laid out by dagre, then phase groups
     computed from pipeline bbox and inserted FIRST for z-order (behind). */
  const initialNodes = useMemo(() => {
    const pipelineNodesRaw = Object.keys(NODE_DEFS).map(id => {
      const def = NODE_DEFS[id];
      const rfType = def.type === 'junction' ? 'junction' : 'pipelineNode';
      return {
        id,
        type: rfType,
        position: { x: 0, y: 0 },
        data: {
          state: 'pending',
          onHover: handleNodeHover,
          onLeave: handleNodeLeave,
        },
        draggable: false,
        zIndex: 2,
        style: { width: def.w, height: def.h },
      };
    });
    const pipelineNodes = getLayoutedElements(pipelineNodesRaw, initialEdges, 'LR');

    const phaseNodes = PHASE_GROUPS.map(g => {
      const b = computeGroupBounds(g.members, pipelineNodes);
      if (!b) return null;
      return {
        id: g.id,
        type: 'phaseGroup',
        position: { x: b.x, y: b.y },
        data: { label: g.label, w: b.width, h: b.height, phaseClass: g.phaseClass, highlight: false },
        draggable: false,
        selectable: false,
        zIndex: 0,
        style: { width: b.width, height: b.height },
      };
    }).filter(Boolean);

    return [...phaseNodes, ...pipelineNodes];
  }, [handleNodeHover, handleNodeLeave, initialEdges]);

  const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes);
  const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges);

  /* RAG hits + Confidence per Sub Agent — final result 우선, 스트리밍 중엔 streamingItems fallback */
  const ragHitsByAgent = useMemo(
    () => aggregateRagHitsByAgent(result, streamingItems),
    [result, streamingItems]
  );
  const confidenceByAgent = useMemo(
    () => aggregateConfidenceByAgent(result, streamingItems),
    [result, streamingItems]
  );
  const personaByAgent = useMemo(
    () => aggregatePersonaByAgent(result, streamingItems),
    [result, streamingItems]
  );

  /* Sync nodeStates -> React Flow nodes
     V2 Layer 그룹 ID: __layer1 / __layer2_a / __layer2_b / __layer3 / __layer4
     phaseA/B1/B2 Highlight 플래그는 V2 에서 LAYER2/3/4 highlight 로 매핑 (하위 호환 alias). */
  useEffect(() => {
    setNodes(curr => curr.map(n => {
      if (n.type === 'phaseGroup') {
        const highlight =
          (n.id === '__layer1' && phaseB1Highlight) ||          // L1 은 B1 플래그 재활용
          (n.id === '__layer2_a' && phaseAHighlight) ||         // L2 Group A (Phase A alias)
          (n.id === '__layer2_b' && phaseAHighlight) ||         // L2 Group B (Phase A alias)
          (n.id === '__layer3' && phaseB1Highlight) ||          // L3 (Phase B1 alias)
          (n.id === '__layer4' && (phaseB2Highlight || phaseB1Highlight)); // L4 (Phase C alias)
        if (n.data.highlight === highlight) return n;
        return { ...n, data: { ...n.data, highlight } };
      }
      const state = nodeStates[n.id] || 'pending';
      const elapsed = nodeTimings[n.id];
      const actualScore = nodeScores[n.id];
      const rippleTrigger = ripples[n.id];
      const ragHits = ragHitsByAgent[n.id];
      const confidence = confidenceByAgent[n.id];
      const persona = personaByAgent[n.id];
      // tenant_config 노드 — tenantId 동적 표시 + 평가 시작 시 자동 done 상태
      const tenantBadge = (n.id === 'tenant_config') ? tenantId : undefined;
      const gateStateForNode = (n.id === 'tenant_config') ? awsGateState : undefined;
      const gateReasonForNode = (n.id === 'tenant_config') ? awsGateReason : undefined;
      if (n.data.state === state && n.data.elapsed === elapsed && n.data.actualScore === actualScore && n.data.rippleTrigger === rippleTrigger && n.data.ragHits === ragHits && n.data.confidence === confidence && n.data.persona === persona && n.data.tenantBadge === tenantBadge && n.data.awsGateState === gateStateForNode && n.data.awsGateReason === gateReasonForNode) {
        return n;
      }
      return { ...n, data: { ...n.data, state, elapsed, actualScore, rippleTrigger, ragHits, confidence, persona, tenantBadge, awsGateState: gateStateForNode, awsGateReason: gateReasonForNode } };
    }));
  }, [nodeStates, nodeTimings, nodeScores, ripples, phaseAHighlight, phaseB1Highlight, phaseB2Highlight, ragHitsByAgent, confidenceByAgent, personaByAgent, tenantId, awsGateState, awsGateReason, setNodes]);

  /* Sync edgeStates -> React Flow edges */
  useEffect(() => {
    setEdges(curr => curr.map(e => {
      const ek = e.id;
      const state = edgeStates[ek] || 'pending';
      const className = `edge-${state}`;
      const animated = state === 'active';
      const strokeColor = state === 'active' ? 'var(--edge-active)'
                        : state === 'done' ? 'var(--edge-done)'
                        : state === 'aborted' ? 'var(--edge-aborted)'
                        : state === 'skipped' ? '#d4d0c8'
                        : 'var(--edge-pending)';
      if (e.className === className && e.animated === animated) return e;
      return {
        ...e,
        className,
        animated,
        markerEnd: { ...e.markerEnd, color: strokeColor },
      };
    }));
  }, [edgeStates, setEdges]);

  const handleNodeClick = useCallback((_, node) => {
    if (node.type === 'phaseGroup') return;
    if (onNodeClick) onNodeClick(node.id);
  }, [onNodeClick]);

  return (
    <>
    {tooltip.visible && tooltip.nodeId && NODE_DEFS[tooltip.nodeId] && (
      <div className="node-tooltip visible" style={{
        left: tooltip.x, top: tooltip.y, transform: 'translate(-50%, -100%)'
      }}>
        <div className="tt-title">{NODE_DEFS[tooltip.nodeId].label}</div>
        <div className="tt-detail">
          {NODE_DEFS[tooltip.nodeId].sub}{NODE_DEFS[tooltip.nodeId].sub ? <br/> : null}
          상태: {nodeStates[tooltip.nodeId] || 'pending'}
          {NODE_DEFS[tooltip.nodeId].score ? <span><br/>배점: {NODE_DEFS[tooltip.nodeId].score}점</span> : null}
        </div>
      </div>
    )}
    <ReactFlowComponent
      nodes={nodes}
      edges={edges}
      onNodesChange={onNodesChange}
      onEdgesChange={onEdgesChange}
      onNodeClick={handleNodeClick}
      nodeTypes={nodeTypes}
      edgeTypes={edgeTypes}
      fitView
      fitViewOptions={{ padding: 0.2 }}
      minZoom={0.3}
      maxZoom={2.5}
      proOptions={{ hideAttribution: true }}
      nodesDraggable={false}
      nodesConnectable={false}
      elementsSelectable={true}
    >
      <Background variant="dots" gap={16} size={1} color="#d5cfc5" />
      <Controls showInteractive={false} />
      <MiniMap
        nodeColor={(n) => {
          if (n.type === 'phaseGroup') return 'transparent';
          const s = n.data?.state;
          if (s === 'done') return '#22c55e';
          if (s === 'active') return '#3b82f6';
          if (s === 'error') return '#ef4444';
          if (s === 'aborted') return '#f59e0b';
          if (s === 'skipped') return '#d4d0c8';
          return '#d5cfc5';
        }}
        maskColor="rgba(245,242,236,0.6)"
        pannable
        zoomable
      />
    </ReactFlowComponent>
    </>
  );
}

/* ── usePipelineRun 훅 ───────────────────────────────────────
   파이프라인 실행 1회에 대응하는 state 컨테이너.
   - App 에서 1회 호출 → 단일 탭
   - CompareTab 에서 2회 호출 → 좌/우 독립 인스턴스 */
function usePipelineRun({ backend, serverUrl, endpoint = "/evaluate/stream", syncFallback = true, extraBody = null }) {
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [errorAlert, setErrorAlert] = useState(null);

  const [nodeStates, setNodeStates]   = useState({});
  const [nodeTimings, setNodeTimings] = useState({});
  const [nodeScores, setNodeScores]   = useState({});
  const [nodeErrors, setNodeErrors]   = useState({});
  const [edgeStates, setEdgeStates]   = useState({});
  const [result, setResult] = useState(null);
  const [streamingItems, setStreamingItems] = useState([]);
  const [logs, setLogs] = useState([]);
  const [traces, setTraces] = useState([]);
  const [rawLogs, setRawLogs] = useState([]);
  const [tenantId, setTenantId] = useState("generic");

  const abortRef = useRef(null);
  const startTimeRef = useRef(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (running) {
      startTimeRef.current = Date.now();
      timerRef.current = setInterval(() => {
        setElapsed((Date.now() - startTimeRef.current) / 1000);
      }, 250);
    } else if (timerRef.current) {
      clearInterval(timerRef.current);
      timerRef.current = null;
    }
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [running]);

  const addLog = useCallback((msg, type) => {
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
    setLogs(prev => [...prev, { time: t, msg, type }]);
  }, []);

  const setEdge = useCallback((from, to, state) => {
    setEdgeStates(prev => ({ ...prev, [edgeKey(from, to)]: state }));
  }, []);

  const activateEdgesTo = useCallback((nodeId) => {
    setEdgeStates(prev => {
      const next = { ...prev };
      EDGES.forEach(e => {
        const ek = edgeKey(e.from, e.to);
        if (e.to === nodeId && next[ek] !== "skipped") next[ek] = "active";
      });
      return next;
    });
  }, []);

  const activateEdgesFrom = useCallback((nodeId) => {
    setEdgeStates(prev => {
      const next = { ...prev };
      EDGES.forEach(e => {
        const ek = edgeKey(e.from, e.to);
        if (e.from === nodeId && next[ek] !== "skipped") next[ek] = "active";
      });
      return next;
    });
  }, []);

  const completeEdgesTo = useCallback((nodeId) => {
    setEdgeStates(prev => {
      const next = { ...prev };
      EDGES.forEach(e => {
        const ek = edgeKey(e.from, e.to);
        if (e.to === nodeId && next[ek] !== "skipped") next[ek] = "done";
      });
      return next;
    });
  }, []);

  const activatePhaseGroup = useCallback((phaseNodes) => {
    setNodeStates(prev => {
      /* 2026-04-21 수정: 이전엔 orchestrator_v2 를 unconditionally active 로 설정해서
         Layer 2 (phase_a) 활성화 시에도 Layer 3 노드가 같이 active 로 표시되는 오류 발생.
         이제 phaseNodes 에 포함된 노드만 active — LAYER3_NODES=["orchestrator_v2"] 가
         명시적으로 전달됐을 때만 Layer 3 활성화. */
      const next = { ...prev };
      phaseNodes.forEach(n => {
        if (next[n] !== "done" && next[n] !== "skipped") next[n] = "active";
      });
      return next;
    });
    setEdgeStates(prev => {
      const next = { ...prev };
      phaseNodes.forEach(n => {
        EDGES.forEach(e => {
          const ek = edgeKey(e.from, e.to);
          if (e.to === n && next[ek] !== "done" && next[ek] !== "skipped") next[ek] = "active";
        });
      });
      return next;
    });
  }, []);

  const reset = useCallback(() => {
    const initNodes = {};
    Object.keys(NODE_DEFS).forEach(k => {
      initNodes[k] = "pending";
    });
    setNodeStates(initNodes);
    setNodeTimings({});
    setNodeScores({});
    setNodeErrors({});
    const initEdges = {};
    EDGES.forEach(e => {
      const ek = edgeKey(e.from, e.to);
      initEdges[ek] = "pending";
    });
    setEdgeStates(initEdges);
    setResult(null);
    setStreamingItems([]);
    setLogs([]);
    setTraces([]);
    setRawLogs([]);
    setErrorAlert(null);
    setElapsed(0);
  }, []);

  const abort = useCallback(() => {
    if (abortRef.current) {
      try { abortRef.current.abort(); } catch {}
      abortRef.current = null;
    }
    setRunning(false);
    setNodeStates(prev => {
      const next = { ...prev };
      Object.keys(next).forEach(k => { if (next[k] === "active") next[k] = "aborted"; });
      return next;
    });
    setEdgeStates(prev => {
      const next = { ...prev };
      Object.keys(next).forEach(k => { if (next[k] === "active") next[k] = "aborted"; });
      return next;
    });
    addLog("Pipeline aborted by user", "warn");
  }, [addLog]);

  const start = useCallback(async ({ transcript, llmBackend, bedrockModelId, tenantId: reqTenantId }) => {
    const useBackend = llmBackend || backend;
    const useTenant = reqTenantId || tenantId || "generic";
    if (!transcript || !transcript.trim()) return { ok: false, reason: "empty_transcript" };

    reset();
    setRunning(true);
    addLog(`Pipeline started [${useBackend}${bedrockModelId ? ` · ${bedrockModelId}` : ""}]`, "info");
    /* V2: 파이프라인 시작 시 input_data done, Layer 1 active. */
    setNodeStates(prev => ({ ...prev, input_data: "done", layer1: "active" }));
    activateEdgesFrom("input_data");

    const ctrl = new AbortController();
    abortRef.current = ctrl;

    const setters = {
      setNodeStates, setNodeTimings, setNodeScores, setNodeErrors,
      setEdgeStates, setResult, setStreamingItems,
      setLogs, setTraces, setRawLogs, setErrorAlert, setRunning,
      addLog, setEdge, activateEdgesTo, completeEdgesTo, activatePhaseGroup,
      setTenantId,
    };

    // 요청 body — bedrock_model_id 는 backend==="bedrock" + 값 존재 시만 첨부
    const reqBody = { transcript: transcript.trim(), llm_backend: useBackend, tenant_id: useTenant };
    if (useBackend === "bedrock" && bedrockModelId) {
      reqBody.bedrock_model_id = bedrockModelId;
    }
    // extraBody (예: gt_sample_id) 병합 — 훅 caller 가 동적으로 주입
    if (extraBody && typeof extraBody === "object") {
      Object.assign(reqBody, extraBody);
    }

    try {
      const response = await fetch(`${serverUrl}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(reqBody),
        signal: ctrl.signal,
      });
      if (!response.ok) throw new Error(`Server returned ${response.status}`);

      await parseSSEStream(response, {
        signal: ctrl.signal,
        onEvent: (evt) => {
          const lastElapsed = (Date.now() - (startTimeRef.current || Date.now())) / 1000;
          applySSEEvent(setters, evt, lastElapsed);
        },
      });

      setRunning(false);
      abortRef.current = null;
      return { ok: true };

    } catch (err) {
      if (err.name === "AbortError" || ctrl.signal.aborted) {
        addLog("Pipeline aborted", "warn");
        setRunning(false);
        abortRef.current = null;
        return { ok: false, reason: "aborted" };
      }
      addLog(`Connection error: ${err.message}`, "error");
      setRunning(false);
      abortRef.current = null;

      // 단일 탭 회귀 방지용 sync fallback — 기존 /evaluate 경로 유지
      if (syncFallback) {
        try {
          addLog("Trying sync fallback...", "warn");
          const r = await fetch(`${serverUrl}/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(reqBody),
          });
          if (r.ok) {
            const data = await r.json();
            setResult(data);
            const gateFail = data.status === "validation_failed" || (!data.report && (data.verification || data.score_validation));
            if (gateFail) addLog("Sync fallback: Layer 3 Gate 실패 — Layer 4 건너뜀", "error");
            else addLog("Sync evaluation completed", "success");
            setNodeStates(prev => {
              const next = { ...prev };
              const preserve = new Set(["skipped"]);
              Object.keys(NODE_DEFS).forEach(k => { if (!preserve.has(next[k])) next[k] = "done"; });
              if (gateFail) {
                const vData = data.verification?.verification || data.verification || {};
                const svData = data.score_validation?.validation || data.score_validation || {};
                if (vData.is_consistent === false || svData.passed === false) next.orchestrator_v2 = "error";
                next.confidence = "skipped";
                next.tier_router = "skipped";
                next.evidence_refiner = "skipped";
                next.report_generator = "gate-failed";
                next.gt_comparison = "skipped";
                next.gt_evidence_comparison = "skipped";
                next.qa_output = "skipped";
              }
              return next;
            });
            setEdgeStates(prev => {
              const next = { ...prev };
              EDGES.forEach(e => { const ek = edgeKey(e.from, e.to); if (next[ek] !== "skipped") next[ek] = "done"; });
              if (gateFail) {
                next[edgeKey("orchestrator_v2", "confidence")]          = "skipped";
                next[edgeKey("confidence",      "tier_router")]         = "skipped";
                next[edgeKey("tier_router",     "evidence_refiner")]    = "skipped";
                next[edgeKey("evidence_refiner","report_generator")]    = "skipped";
                next[edgeKey("report_generator","gt_comparison")]       = "skipped";
                next[edgeKey("gt_comparison",   "gt_evidence_comparison")] = "skipped";
                next[edgeKey("gt_evidence_comparison", "qa_output")]    = "skipped";
              }
              return next;
            });
            return { ok: true, fallback: true };
          }
        } catch (e2) {
          addLog(`Sync fallback also failed: ${e2.message}`, "error");
        }
      } else {
        setErrorAlert({
          type: "error",
          message: err.message || "파이프라인 실행 중 오류가 발생했습니다.",
          timestamp: Date.now(),
        });
      }
      return { ok: false, reason: err.message };
    }
  }, [backend, serverUrl, endpoint, syncFallback, reset, addLog, setEdge, activateEdgesTo, completeEdgesTo, activateEdgesFrom, activatePhaseGroup, tenantId, extraBody]);

  const isRunning = running || Object.values(nodeStates).some(sv => sv === 'active');
  const phaseAHighlight  = useMemo(() => PHASE_A_NODES .some(n => nodeStates[n] === "active" || nodeStates[n] === "done"), [nodeStates]);
  const phaseB1Highlight = useMemo(() => PHASE_B1_NODES.some(n => nodeStates[n] === "active" || nodeStates[n] === "done"), [nodeStates]);
  const phaseB2Highlight = useMemo(() => PHASE_B2_NODES.some(n => nodeStates[n] === "active" || nodeStates[n] === "done"), [nodeStates]);

  return {
    backend, serverUrl, endpoint,
    running, elapsed, errorAlert,
    nodeStates, nodeTimings, nodeScores, nodeErrors, edgeStates,
    result, streamingItems, logs, traces, rawLogs, tenantId, setTenantId,
    isRunning, phaseAHighlight, phaseB1Highlight, phaseB2Highlight,
    setErrorAlert,
    reset, abort, start,
  };
}

  const g = {};
  MODEL_OPTIONS.forEach(o => { (g[o.group] = g[o.group] || []).push(o); });
  return g;
})();

// value → {backend, bedrock_model_id} 분해. sagemaker 는 bedrock_model_id=null.
function resolveModelSelection(value) {
  if (value === "sagemaker") return { backend: "sagemaker", bedrock_model_id: null };
  return { backend: "bedrock", bedrock_model_id: value };
}

// value → 라벨. 예: "us.anthropic.claude-haiku-4-5-20251001" → "Haiku 4.5"
function modelLabelFor(value) {
  const opt = MODEL_OPTIONS.find(o => o.value === value);
  return opt ? opt.label : value;
}

const COMPARE_SUBTABS = [
  { key: "pipeline", label: "파이프라인" },
  { key: "results",  label: "평가 결과" },
  { key: "logs",     label: "에이전트 로그" },
  { key: "traces",   label: "트레이스" },
  { key: "rawlogs",  label: "로그 (상세)" },
];

function SubTabStrip({ value, onChange, backend, column, run, tabFlash }) {
  const colId = column || backend || "single";
  const flash = tabFlash || {};
  const badgeFor = (key) => {
    if (!run) return null;
    if (key === "pipeline") {
      return run.isRunning ? <span className="running-dot" title="실행 중"></span> : null;
    }
    if (key === "results") {
      if (run.result?.report?.summary?.grade) {
        return <span className="tab-badge" key={run.result.report.summary.grade}>{run.result.report.summary.grade}</span>;
      }
      if (run.streamingItems.length > 0) {
        return <span className="tab-count" key={run.streamingItems.length}>{run.streamingItems.length}/18</span>;
      }
      return null;
    }
    if (key === "logs" && run.logs.length > 0) return <span className="tab-count" key={run.logs.length}>{run.logs.length}</span>;
    if (key === "traces" && run.traces.length > 0) return <span className="tab-count" key={run.traces.length}>{run.traces.length}</span>;
    if (key === "rawlogs" && run.rawLogs.length > 0) return <span className="tab-count" key={run.rawLogs.length}>{run.rawLogs.length}</span>;
    return null;
  };
  return (
    <div className="tabs-bar" data-testid={`compare-subtabs-${colId}`}>
      {COMPARE_SUBTABS.map(t => (
        <button
          key={t.key}
          className={`tab-btn ${value === t.key ? "active" : ""} ${flash[t.key] ? "flash" : ""}`}
          data-testid={`compare-subtab-${colId}-${t.key}`}
          onClick={() => onChange(t.key)}
        >
          {t.label}
          {badgeFor(t.key)}
        </button>
      ))}
    </div>
  );
}

function CompareHeader({ leftRun, rightRun, leftSel, rightSel, onRunBoth, onRunLeft, onRunRight, onAbortBoth, transcriptReady }) {
  const bothRunning = leftRun.isRunning && rightRun.isRunning;
  const anyRunning  = leftRun.isRunning || rightRun.isRunning;
  const leftLabel  = leftSel.backend  === "sagemaker" ? "Qwen3-8B" : modelLabelFor(leftSel.bedrock_model_id);
  const rightLabel = rightSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(rightSel.bedrock_model_id);
  const badgeFor = (run, sel, column) => {
    let dotCls = "";
    let statusTxt = "idle";
    if (run.isRunning) { dotCls = "running"; statusTxt = "running"; }
    else if (run.errorAlert) { dotCls = "error"; statusTxt = "error"; }
    else if (run.result) { dotCls = "done"; statusTxt = "done"; }
    const label = sel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(sel.bedrock_model_id);
    return (
      <span
        className="compare-badge"
        data-backend={sel.backend}
        data-column={column}
        data-testid={`compare-badge-${column}`}
        data-status={statusTxt}
        title={run.errorAlert?.message || ""}
      >
        <span className={`dot ${dotCls}`} />
        <b>{label}</b>
        <span>{statusTxt}</span>
        <span>{fmtTime(run.elapsed || 0)}</span>
      </span>
    );
  };
  return (
    <div className="compare-header" data-testid="compare-header">
      <button
        className="compare-run-btn"
        data-testid="compare-run-both"
        disabled={!transcriptReady || bothRunning}
        onClick={onRunBoth}
      >
        {bothRunning ? "Running..." : "▶ Run Both"}
      </button>
      <button
        className="compare-run-btn"
        data-testid="compare-run-left"
        disabled={!transcriptReady || leftRun.isRunning}
        onClick={onRunLeft}
        style={{ background: "#3b82f6", fontSize: 12, padding: "6px 10px" }}
      >
        {leftRun.isRunning ? "Running..." : `▶ ${leftLabel}`}
      </button>
      <button
        className="compare-run-btn"
        data-testid="compare-run-right"
        disabled={!transcriptReady || rightRun.isRunning}
        onClick={onRunRight}
        style={{ background: "#10b981", fontSize: 12, padding: "6px 10px" }}
      >
        {rightRun.isRunning ? "Running..." : `▶ ${rightLabel}`}
      </button>
      {anyRunning && (
        <button
          className="compare-run-btn"
          data-testid="compare-abort-both"
          style={{ background: "#ef4444" }}
          onClick={onAbortBoth}
        >
          ■ Abort
        </button>
      )}
      {badgeFor(leftRun,  leftSel,  "left")}
      {badgeFor(rightRun, rightSel, "right")}
    </div>
  );
}

function ColumnPane({ column, run, sel, modelValue, onModelChange, subTab, setSubTab, serverUrl, csvState, setCsvState, onSelectNode }) {
  const modelLabel = sel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(sel.bedrock_model_id);
  const suffix = sel.backend === "sagemaker" ? "SageMaker" : "Bedrock";

  const [tabFlash, triggerFlash] = useTabFlash(["results", "logs", "traces", "rawlogs"]);

  const prevLogsRef = useRef(0);
  const prevTracesRef = useRef(0);
  const prevRawLogsRef = useRef(0);
  const prevStreamRef = useRef(0);

  useEffect(() => {
    if (run.logs.length > prevLogsRef.current && subTab !== "logs") triggerFlash("logs");
    prevLogsRef.current = run.logs.length;
  }, [run.logs.length, subTab, triggerFlash]);
  useEffect(() => {
    if (run.traces.length > prevTracesRef.current && subTab !== "traces") triggerFlash("traces");
    prevTracesRef.current = run.traces.length;
  }, [run.traces.length, subTab, triggerFlash]);
  useEffect(() => {
    if (run.rawLogs.length > prevRawLogsRef.current && subTab !== "rawlogs") triggerFlash("rawlogs");
    prevRawLogsRef.current = run.rawLogs.length;
  }, [run.rawLogs.length, subTab, triggerFlash]);
  useEffect(() => {
    if (run.streamingItems.length > prevStreamRef.current && subTab !== "results") triggerFlash("results");
    prevStreamRef.current = run.streamingItems.length;
  }, [run.streamingItems.length, subTab, triggerFlash]);

  return (
    <div className="compare-col" data-backend={sel.backend} data-column={column} data-testid={`compare-col-${column}`}>
      <div className="col-header" style={{ gap: 8, flexWrap: "wrap" }}>
        <span><b>{modelLabel} ({suffix})</b></span>
        <select
          className="compare-model-select"
          data-testid={`compare-model-select-${column}`}
          value={modelValue}
          onChange={e => onModelChange(e.target.value)}
          disabled={run.isRunning}
          title="모델 선택"
          style={{ fontSize: 11, padding: "2px 6px" }}
        >
          {Object.entries(MODEL_GROUPS).map(([gname, opts]) => (
            <optgroup key={gname} label={gname}>
              {opts.map(o => (
                <option key={o.value} value={o.value}>{o.label}</option>
              ))}
            </optgroup>
          ))}
        </select>
        <span style={{ marginLeft: "auto" }}>경과 {fmtTime(run.elapsed || 0)}{run.isRunning ? " · 실행 중" : ""}</span>
      </div>
      <div className="col-body">
        <SubTabStrip value={subTab} onChange={setSubTab} backend={sel.backend} column={column} run={run} tabFlash={tabFlash} />
        <ProgressBar nodeStates={run.nodeStates} />
        {/* 5개 서브뷰를 모두 마운트하고 display 토글 — ReactFlow viewport 유지 */}
        <div
          className="graph-container"
          data-testid={`compare-graph-${column}`}
          style={{ display: subTab === "pipeline" ? "block" : "none" }}
        >
          <ReactFlowPipeline
            key={column}
            nodeStates={run.nodeStates}
            nodeTimings={run.nodeTimings}
            nodeScores={run.nodeScores}
            edgeStates={run.edgeStates}
            onNodeClick={onSelectNode}
            phaseAHighlight={run.phaseAHighlight}
            phaseB1Highlight={run.phaseB1Highlight}
            phaseB2Highlight={run.phaseB2Highlight}
            result={run.result}
            streamingItems={run.streamingItems}
            tenantId={run.tenantId}
          />
        </div>
        {subTab !== "pipeline" && (
          <div className="center-panel-content" data-testid={`compare-panel-${column}`}>
            <ResultsContent
              tab={subTab}
              result={run.result}
              streamingItems={run.streamingItems}
              logs={run.logs}
              traces={run.traces}
              rawLogs={run.rawLogs}
              serverUrl={serverUrl}
              csvState={csvState}
              setCsvState={setCsvState}
              llmBackend={sel.backend}
            />
          </div>
        )}
      </div>
    </div>
  );
}

function ManualComparisonTable({ data }) {
  const { rows, modelNames, summary } = data;
  if (!rows?.length) {
    return (
      <div style={{marginTop:12,padding:14,background:'#fff',border:'1px solid #bbf7d0',borderRadius:6,fontSize:13,color:'#6b7280'}}>
        비교할 항목을 추출하지 못했습니다. 입력 데이터를 확인해 주세요.
      </div>
    );
  }
  const verdictStyle = (v) => {
    if (v === "✅" || v === "일치") return { bg: '#dcfce7', color: '#15803d' };
    if (v === "⚠️" || v === "부분차이") return { bg: '#fef3c7', color: '#a16207' };
    if (v === "❌" || v === "불일치") return { bg: '#fee2e2', color: '#b91c1c' };
    return { bg: '#f3f4f6', color: '#6b7280' };
  };
  const fmtScore = (v) => (v === null || v === undefined || v === "") ? "—" : v;
  return (
    <div style={{marginTop:12}}>
      {summary && (summary.manual_total != null || Object.keys(summary.model_totals || {}).length > 0) && (
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
          {summary.manual_total != null && (
            <div style={{padding:'6px 12px',background:'#fff',border:'1px solid #bbf7d0',borderRadius:6,fontSize:12}}>
              <strong style={{color:'#15803d'}}>QA 총점</strong> {summary.manual_total}점
            </div>

                  textAlign:'center',
                  background:colorForModelStrong(i),
                  color: i % 2 === 0 ? '#1e40af' : '#5b21b6',
                  fontWeight:700,
                  whiteSpace:'nowrap',
                }}

          </tr>
          <tr>
            {modelNames.map((n, i) => (
              <React.Fragment key={n}>

            return (

                <td style={{padding:'6px 8px',whiteSpace:'nowrap',color:'#475569',fontWeight: catChange ? 600 : 400,borderRight:'1px solid #f1f5f9'}}>

                  const scoreColor = ratio == null ? '#94a3b8'

                    : ratio >= 0.6 ? '#d97706'

                  return (
                    <React.Fragment key={n}>
                      <td style={{padding:'6px',textAlign:'center',background:colorForModel(i),fontWeight:700,color:scoreColor}}>

        <tfoot style={{position:'sticky',bottom:0,background:'#f1f5f9',zIndex:2}}>
          <tr style={{borderTop:'2px solid #0f172a'}}>
            <td colSpan={3} style={{padding:'10px 8px',textAlign:'right',fontWeight:700,color:'#0f172a',borderRight:'1px solid #cbd5e1'}}>총점</td>
            <td style={{padding:'10px 6px',textAlign:'center',fontWeight:700,color:'#0f172a',borderRight:'2px solid #0f172a'}}>100</td>

              <React.Fragment key={n}>
                <td style={{padding:'10px 6px',textAlign:'center',background:colorForModelStrong(i),fontWeight:800,fontSize:14,color:i % 2 === 0 ? '#1e40af' : '#5b21b6'}}>

                <td
                  style={{
                    padding:'10px',
                    background:colorForModelStrong(i),
                    color:'#475569',fontSize:11,
                    borderRight:i === modelNames.length - 1 ? 'none' : '2px solid #0f172a',
                  }}
                >
                  {typeof totals?.[n] === "number" ? `${((totals[n]/100)*100).toFixed(0)}점` : "—"}
                </td>
              </React.Fragment>
            ))}
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

function CompareTab({ serverUrl, transcript, transcriptFileName, csvState, setCsvState }) {
  // 컬럼별 모델 선택 — value 는 "sagemaker" 또는 bedrock model_id
  const [leftModelValue,  setLeftModelValue]  = useState(MODEL_LEFT_DEFAULT);
  const [rightModelValue, setRightModelValue] = useState(MODEL_RIGHT_DEFAULT);
  const leftSel  = resolveModelSelection(leftModelValue);
  const rightSel = resolveModelSelection(rightModelValue);

  // 훅 인스턴스 2개 — backend prop 은 start 호출 시 오버라이드되므로 초기값으로만 쓰임.
  // "column" 식별자로 run.column 을 drawer 라우팅에 사용 (backend 가 런타임에 바뀌므로).
  const leftRun  = usePipelineRun({ backend: leftSel.backend,  serverUrl, syncFallback: false });
  const rightRun = usePipelineRun({ backend: rightSel.backend, serverUrl, syncFallback: false });

  const [leftSubTab,  setLeftSubTab]  = useState("pipeline");
  const [rightSubTab, setRightSubTab] = useState("pipeline");
  // 비교 탭 전용 drawer — {column:"left"|"right", nodeId} | null.
  const [compareSelectedNode, setCompareSelectedNode] = useState(null);

  const [judgeResult, setJudgeResult] = useState(null);
  const [judgeLoading, setJudgeLoading] = useState(false);

  const [manualEvalText, setManualEvalText] = useState("");
  const [manualComparison, setManualComparison] = useState(null); // {summary, rows, model_names}
  const [manualError, setManualError] = useState("");
  const [manualLoading, setManualLoading] = useState(false);
  const [manualFileName, setManualFileName] = useState("");
  // 결정적 파싱된 수동 평가표: {sheetName, sheetId, rows[], total} | null
  const [manualStructured, setManualStructured] = useState(null);
  // ID 자동 매칭 실패 시 탭 선택 UI용: {sheetNames, wb, targetId} | null
  const [manualSheetPicker, setManualSheetPicker] = useState(null);
  const manualFileInputRef = useRef(null);

  const onManualFileSelect = useCallback(async (ev) => {
    const file = ev.target.files?.[0];
    ev.target.value = ""; // 동일 파일 재선택 허용
    if (!file) return;
    const name = file.name;
    const lower = name.toLowerCase();
    setManualError("");
    try {
      if (lower.endsWith(".xlsx") || lower.endsWith(".xls")) {
        if (!window.XLSX) throw new Error("엑셀 라이브러리 로드 실패");
        const buf = await file.arrayBuffer();
        const wb = window.XLSX.read(buf, { type: "array" });

        // transcript ID 추출: 업로드된 transcript 파일명 → 본문 순
        let targetId = null;
        if (transcriptFileName) {
          const m = transcriptFileName.match(/^(\d{4,})[_\s\-]/);
          if (m) targetId = m[1];
        }
        if (!targetId && transcript) {
          const m = transcript.match(/상담\s*ID\s*[:：]\s*(\d{4,})/) || transcript.match(/\bID\s*[:：]\s*(\d{4,})/);
          if (m) targetId = m[1];
        }

        // 매칭 탭 찾기: (a) sheet name 내 ID 일치, (b) R3 B열 값 일치
        let matchedName = null;
        if (targetId) {
          for (const sName of wb.SheetNames) {
            if (new RegExp(`(^|\\D)${targetId}(\\D|$)`).test(sName)) { matchedName = sName; break; }
            const ws = wb.Sheets[sName];
            const b3 = ws && ws["B3"];
            if (b3 != null && String(b3.v).trim() === targetId) { matchedName = sName; break; }
          }
        } else if (wb.SheetNames.length === 1) {
          // ID 못 찾았지만 탭이 1개뿐이면 그걸로
          matchedName = wb.SheetNames[0];
        }

        if (!matchedName) {
          // 자동 매칭 실패 → 탭 선택 UI로 fallback (에러 대신)
          setManualSheetPicker({ sheetNames: wb.SheetNames, wb, targetId });
          setManualStructured(null);
          setManualEvalText("");
          setManualFileName(name);
          setManualError("");
          return;
        }

        const structured = parseManualEvalSheet(wb.Sheets[matchedName], matchedName);
        setManualStructured(structured);
        setManualEvalText(buildManualPreview(structured));
        setManualSheetPicker(null);
      } else if (lower.endsWith(".json")) {
        const text = await file.text();
        try {
          const obj = JSON.parse(text);
          setManualEvalText(JSON.stringify(obj, null, 2));
        } catch {
          setManualEvalText(text);
        }
        setManualStructured(null);
        setManualSheetPicker(null);
      } else {
        // .csv / .txt / 기타 텍스트 — UTF-8 우선, 실패 시 EUC-KR/CP949
        let text;
        try {
          text = await file.text();
          if (text.includes("\uFFFD")) throw new Error("utf8-fallback");
        } catch {
          const buf = await file.arrayBuffer();
          try {
            text = new TextDecoder("euc-kr").decode(buf);
          } catch {
            text = new TextDecoder("utf-8", { fatal: false }).decode(buf);
          }
        }
        setManualEvalText(text);
        setManualStructured(null);
        setManualSheetPicker(null);
      }
      setManualFileName(name);
    } catch (err) {
      setManualError("파일 읽기 실패: " + err.message);
    }
  }, [transcript, transcriptFileName]);

  const clearManualFile = useCallback(() => {
    setManualFileName("");
    setManualEvalText("");
    setManualStructured(null);
    setManualSheetPicker(null);
    setManualError("");
  }, []);

  const handleManualSheetPick = useCallback((sheetName) => {
    if (!manualSheetPicker || !sheetName) return;
    const ws = manualSheetPicker.wb.Sheets[sheetName];
    if (!ws) return;
    try {
      const structured = parseManualEvalSheet(ws, sheetName);
      setManualStructured(structured);
      setManualEvalText(buildManualPreview(structured));
      setManualSheetPicker(null);
      setManualError("");
    } catch (err) {
      setManualError("탭 파싱 실패: " + err.message);
    }
  }, [manualSheetPicker]);
  const hasAnyResult = !!(leftRun.result || rightRun.result);
  const runManualCompare = useCallback(async () => {
    if (manualLoading) return;
    if (!manualStructured && !manualEvalText.trim()) return;
    const models = [];
    const leftLabel = leftSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(leftSel.bedrock_model_id);
    const rightLabel = rightSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(rightSel.bedrock_model_id);
    if (leftRun.result) models.push({ name: leftLabel, result: leftRun.result });
    if (rightRun.result) models.push({ name: rightLabel, result: rightRun.result });
    if (models.length === 0) return;
    setManualLoading(true);
    setManualComparison(null);
    setManualError("");
    try {
      const body = { models, transcript: transcript || "" };
      if (manualStructured) {
        body.manual_rows = manualStructured.rows;
        body.manual_total = manualStructured.total;
        body.manual_evaluation = ""; // structured 우선, 텍스트 생략
      } else {
        body.manual_evaluation = manualEvalText;
      }
      const res = await fetch(serverUrl + "/analyze-manual-compare", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.status !== "success" || !Array.isArray(data.rows)) {
        throw new Error(data.message || "응답 포맷 오류");
      }
      setManualComparison({
        summary: data.summary || {},
        rows: data.rows,
        modelNames: data.model_names || models.map(m => m.name),
      });
    } catch (err) {
      setManualError("분석 요청 실패: " + err.message);
    } finally {
      setManualLoading(false);
    }
  }, [leftRun.result, rightRun.result, leftSel, rightSel, manualEvalText, manualStructured, manualLoading, serverUrl, transcript]);

  const downloadManualXlsx = useCallback(() => {
    if (!manualComparison || !window.XLSX) return;
    const { rows, modelNames, summary } = manualComparison;
    const headers = ["#", "대분류", "평가항목", "배점", "QA 점수", "QA 근거"];
    modelNames.forEach((n) => {
      headers.push(`${n} 점수`, `${n} 근거`, `${n} 판정`);
    });
    headers.push("차이 요약", "최종 판정");
    const body = rows.map((r, i) => {
      const row = [
        r.no ?? i + 1,
        r.category ?? "",
        r.item ?? "",
        r.max_score ?? "",
        r.qa_score ?? "",
        r.qa_evidence ?? "",
      ];
      modelNames.forEach((_, idx) => {
        const k = idx + 1;
        row.push(r[`model${k}_score`] ?? "", r[`model${k}_evidence`] ?? "", r[`model${k}_verdict`] ?? "");
      });
      row.push(r.diff_summary ?? "", r.final_verdict ?? "");
      return row;
    });
    const totalsRow = ["", "", "총점", "", summary?.manual_total ?? ""];
    totalsRow.push(""); // QA 근거 빈칸
    modelNames.forEach((n) => {
      totalsRow.push(summary?.model_totals?.[n] ?? "", "", "");
    });
    totalsRow.push("", "");
    body.push([]);
    body.push(totalsRow);
    const ws = window.XLSX.utils.aoa_to_sheet([headers, ...body]);
    // 열너비 힌트
    ws["!cols"] = headers.map((h) => ({ wch: h.includes("근거") ? 36 : h.includes("항목") ? 18 : 12 }));
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, "QA Comparison");
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
    window.XLSX.writeFile(wb, `qa_comparison_${ts}.xlsx`);
  }, [manualComparison]);

  const runJudge = useCallback(async () => {
    if (!leftRun.result || !rightRun.result || judgeLoading) return;
    setJudgeLoading(true);
    setJudgeResult(null);
    const leftLabel  = leftSel.backend  === "sagemaker" ? "Qwen3-8B" : modelLabelFor(leftSel.bedrock_model_id);
    const rightLabel = rightSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(rightSel.bedrock_model_id);
    try {
      const res = await fetch(serverUrl + "/analyze-compare", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          left_result: leftRun.result,
          right_result: rightRun.result,
          left_model: leftLabel,
          right_model: rightLabel,
          transcript: transcript,
        }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      setJudgeResult(data.analysis || data.result || JSON.stringify(data));
    } catch (err) {
      setJudgeResult("분석 요청 실패: " + err.message);
    } finally {
      setJudgeLoading(false);
    }
  }, [leftRun.result, rightRun.result, leftSel, rightSel, judgeLoading, serverUrl]);

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setCompareSelectedNode(null); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const runLeft = useCallback(async () => {
    if (!transcript.trim()) return;
    setJudgeResult(null);
    await leftRun.start({ transcript, llmBackend: leftSel.backend, bedrockModelId: leftSel.bedrock_model_id });
  }, [leftRun, leftSel.backend, leftSel.bedrock_model_id, transcript]);

  const runRight = useCallback(async () => {
    if (!transcript.trim()) return;
    setJudgeResult(null);
    await rightRun.start({ transcript, llmBackend: rightSel.backend, bedrockModelId: rightSel.bedrock_model_id });
  }, [rightRun, rightSel.backend, rightSel.bedrock_model_id, transcript]);

  const runBoth = useCallback(async () => {
    if (!transcript.trim()) return;
    setJudgeResult(null);
    await Promise.all([
      leftRun.start({ transcript, llmBackend: leftSel.backend, bedrockModelId: leftSel.bedrock_model_id }),
      rightRun.start({ transcript, llmBackend: rightSel.backend, bedrockModelId: rightSel.bedrock_model_id }),
    ]);
  }, [leftRun, rightRun, leftSel.backend, leftSel.bedrock_model_id, rightSel.backend, rightSel.bedrock_model_id, transcript]);

  const abortBoth = useCallback(() => {
    leftRun.abort();
    rightRun.abort();
  }, [leftRun, rightRun]);

  // 의도: 탭 전환 시 진행 중 fetch 계속 — 명시적 중단은 Abort 버튼.

  // column → 훅 인스턴스 맵.
  const runForSelected = !compareSelectedNode ? null
    : compareSelectedNode.column === "left" ? leftRun : rightRun;
  const selForSelected = !compareSelectedNode ? null
    : compareSelectedNode.column === "left" ? leftSel : rightSel;

  return (
    <div className="compare-root" data-testid="compare-root">
      <CompareHeader
        leftRun={leftRun}
        rightRun={rightRun}
        leftSel={leftSel}
        rightSel={rightSel}
        onRunBoth={runBoth}
        onRunLeft={runLeft}
        onRunRight={runRight}
        onAbortBoth={abortBoth}
        transcriptReady={!!transcript.trim()}
      />
      <div className="compare-grid">
        <ColumnPane
          column="left"
          run={leftRun}
          sel={leftSel}
          modelValue={leftModelValue}
          onModelChange={setLeftModelValue}
          subTab={leftSubTab}
          setSubTab={setLeftSubTab}
          serverUrl={serverUrl}
          csvState={csvState}
          setCsvState={setCsvState}
          onSelectNode={(nodeId) => setCompareSelectedNode({ column: "left", nodeId })}
        />
        <ColumnPane
          column="right"
          run={rightRun}
          sel={rightSel}
          modelValue={rightModelValue}
          onModelChange={setRightModelValue}
          subTab={rightSubTab}
          setSubTab={setRightSubTab}
          serverUrl={serverUrl}
          csvState={csvState}
          setCsvState={setCsvState}
          onSelectNode={(nodeId) => setCompareSelectedNode({ column: "right", nodeId })}
        />
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,flexShrink:0}}>
        <div className="judge-panel" style={{maxWidth:'none',marginBottom:0}}>
          <div className="judge-header">
            <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
              <span style={{fontSize:16, fontWeight:700, color:"#5b21b6"}}>Sonnet 4.6 Judge Analysis</span>
              <span style={{fontSize:12, color:"var(--text-secondary)"}}>
                {leftRun.isRunning || rightRun.isRunning
                  ? "평가 진행 중..."
                  : (!leftRun.isRunning && leftRun.result && !rightRun.isRunning && rightRun.result)
                    ? "양쪽 결과 준비 완료 — 분석을 시작하세요"
                    : "양쪽 모델 평가가 완료되면 비교 분석할 수 있습니다"}
              </span>
            </div>
            <button
              className={"judge-btn" + (judgeLoading ? " loading" : "")}
              disabled={judgeLoading || leftRun.isRunning || rightRun.isRunning || !leftRun.result || !rightRun.result}
              onClick={runJudge}
            >
              {judgeLoading ? "분석 중..." : "Sonnet Judge 분석"}
            </button>
          </div>
          {judgeResult && (
            <div className="judge-report" dangerouslySetInnerHTML={{__html: sanitizeHtml(marked.parse(judgeResult))}} />
          )}
        </div>

        <div style={{
          padding:'16px 20px', borderRadius:8,
          background:'linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%)',
          border:'1px solid #86efac',
        }}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:16,fontWeight:700,color:'#15803d'}}>수동 평가표 비교</span>
              <span style={{fontSize:12,color:'var(--text-secondary)'}}>
                {manualLoading ? '분석 중...'
                  : leftRun.isRunning || rightRun.isRunning ? '평가 진행 중...'
                  : hasAnyResult
                    ? `비교 대상: ${[leftRun.result && (leftSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(leftSel.bedrock_model_id)), rightRun.result && (rightSel.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(rightSel.bedrock_model_id))].filter(Boolean).join(" + ")}`
                    : '모델 평가를 먼저 실행하세요'}

            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              {manualComparison && (
                <button
                  onClick={downloadManualXlsx}
                  style={{
                    padding:'8px 14px',borderRadius:6,border:'1px solid #15803d',
                    background:'#fff',color:'#15803d',fontSize:12,fontWeight:600,
                    cursor:'pointer',whiteSpace:'nowrap',
                  }}
                  title="비교표를 엑셀 파일(.xlsx)로 다운로드"
                >
                  📥 엑셀 다운로드
                </button>
              )}
              <button
                disabled={manualLoading || (!manualStructured && !manualEvalText.trim()) || !hasAnyResult || leftRun.isRunning || rightRun.isRunning}
                onClick={runManualCompare}
                style={{
                  padding:'8px 20px',borderRadius:6,border:'none',
                  background:(manualLoading || (!manualStructured && !manualEvalText.trim()) || !hasAnyResult) ? '#86efac' : '#16a34a',
                  color:'#fff',fontSize:13,fontWeight:600,
                  cursor:(manualLoading || (!manualStructured && !manualEvalText.trim()) || !hasAnyResult) ? 'not-allowed' : 'pointer',
                  opacity:(manualLoading || (!manualStructured && !manualEvalText.trim()) || !hasAnyResult) ? 0.5 : 1,
                  whiteSpace:'nowrap',transition:'background 0.2s',
                }}
              >
                {manualLoading ? '분석 중...' : '비교 분석 실행'}

            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
            <input
              ref={manualFileInputRef}
              type="file"

              style={{display:'none'}}

            <button
              type="button"
              onClick={() => manualFileInputRef.current?.click()}
              style={{
                padding:'6px 12px',borderRadius:6,border:'1px dashed #16a34a',
                background:'#fff',color:'#15803d',fontSize:12,fontWeight:600,

            {manualFileName && (
              <span style={{
                display:'inline-flex',alignItems:'center',gap:6,

                    color:'#15803d',fontSize:14,padding:0,lineHeight:1,

          </div>
          {manualSheetPicker && (
            <div style={{
              marginBottom:8,padding:'10px 12px',borderRadius:6,
              background:'#fffbeb',border:'1px solid #fcd34d',
              display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',
            }}>
              <span style={{fontSize:12,color:'#92400e',fontWeight:500}}>
                💡 {manualSheetPicker.targetId
                  ? `ID "${manualSheetPicker.targetId}" 자동 매칭 실패 — 탭을 직접 선택하세요:`
                  : "transcript 파일명에서 ID 추출 불가 — 사용할 탭을 선택하세요:"}
              </span>
              <select
                defaultValue=""
                onChange={(e) => handleManualSheetPick(e.target.value)}

                }}

                <option value="" disabled>— 탭 선택 ({manualSheetPicker.sheetNames.length}개) —</option>
                {manualSheetPicker.sheetNames.map(n => (
                  <option key={n} value={n}>{n}</option>
                ))}
              </select>
            </div>
          )}
          <textarea
            value={manualEvalText}
            onChange={(e) => {
              setManualEvalText(e.target.value);
              if (manualFileName) setManualFileName("");
              if (manualStructured) setManualStructured(null);
            }}
            placeholder="QA 프로그램에서 추출한 배점·근거를 여기에 붙여넣으세요 (CSV / JSON / 표 / 평문 자유 포맷)"
            style={{
              width:'100%',minHeight:100,maxHeight:300,resize:'vertical',
              padding:12,borderRadius:6,border:'1px solid #bbf7d0',
              background:'#fff',fontFamily:'var(--font)',fontSize:12,
              lineHeight:1.6,outline:'none',boxSizing:'border-box',

            onFocus={(e) => e.target.style.borderColor = '#16a34a'}
            onBlur={(e) => e.target.style.borderColor = '#bbf7d0'}

          {manualError && (
            <div style={{marginTop:12,padding:12,background:'#fef2f2',border:'1px solid #fecaca',borderRadius:6,color:'#991b1b',fontSize:13}}>
              {manualError}
            </div>
          )}
          {manualComparison && <ManualComparisonTable data={manualComparison} />}
        </div>
      </div>

      {runForSelected && (
        <NodeDrawer
          nodeId={compareSelectedNode.nodeId}
          backend={selForSelected.backend}
          modelLabel={selForSelected.backend === "sagemaker" ? "Qwen3-8B" : modelLabelFor(selForSelected.bedrock_model_id)}
          nodeStates={runForSelected.nodeStates}
          nodeTimings={runForSelected.nodeTimings}
          nodeScores={runForSelected.nodeScores}
          result={runForSelected.result}
          streamingItems={runForSelected.streamingItems}
          nodeErrors={runForSelected.nodeErrors}
          tenantId={runForSelected.tenantId}
          serverUrl={serverUrl}
          onClose={() => setCompareSelectedNode(null)}
