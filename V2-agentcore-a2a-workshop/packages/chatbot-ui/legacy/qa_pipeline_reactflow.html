/* 에이전트 그룹 카드 — 에이전트 헤더 + 하위 항목들을 ItemCard 로 렌더 */
const AgentGroupCard = React.memo(function AgentGroupCard({
  agent, label, phase, itemsForAgent, deductions, strengths, improvements, coaching, defaultOpen,
  expandVersion, expandAllTarget,
}) {
  const [open, setOpen] = useState(defaultOpen);

  // 상위의 "모두 펼치기/접기" 버튼 클릭 시 동기화 (version 증가 시만 반응)
  useEffect(() => {
    if (expandVersion && expandVersion > 0 && typeof expandAllTarget === 'boolean') {
      setOpen(expandAllTarget);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [expandVersion]);

  const { totalScore, totalMax } = itemsForAgent.reduce(
    (acc, it) => ({
      totalScore: acc.totalScore + (it.score ?? 0),
      totalMax: acc.totalMax + (it.max_score ?? 0),
    }),
    { totalScore: 0, totalMax: 0 },
  );
  const scoreColor = totalScore >= totalMax
    ? 'var(--green)'
    : totalScore > 0 ? 'var(--amber)' : 'var(--red)';

  return (
    <div className="agent-group-card">
      <div className={`agent-group-header ${open ? '' : 'collapsed'}`} onClick={() => setOpen(!open)}>
        <div className="agent-group-left">
          <span className={`agent-group-phase-badge ${phase}`}>Phase {phase}</span>
          <span className="agent-group-title">{label}</span>
          <span className="agent-group-meta">{agent} · {itemsForAgent.length}개 항목</span>
        </div>
        <div className="agent-group-right">
          <span className="agent-group-score" style={{ color: scoreColor }}>
            {totalScore}/{totalMax}
          </span>
          <span className={`agent-group-chevron ${open ? 'open' : ''}`}>&#9654;</span>
        </div>
      </div>
      {open && (
        itemsForAgent.length === 0 ? (
          <div className="agent-group-empty">아직 평가 결과가 없습니다</div>
        ) : (
          <div className="agent-group-body">
            {itemsForAgent.map((it, i) => {
              const num = it.item_number;
              const { sc, mx, scoreColor, itemDeds, itemStr, itemImp, itemCoach, itemEv } = prepareItemProps(it, num, deductions, strengths, improvements, coaching);
              const hasDetail = itemDeds.length > 0 || itemStr.length > 0 || itemImp.length > 0 || itemCoach.length > 0 || itemEv.length > 0;
              return (
                <ItemCard key={i} num={num} name={it.item_name || ITEM_NAMES[num] || ''} score={sc} maxScore={mx}
                  scoreColor={scoreColor} borderColor={scoreColor}
                  deds={itemDeds} strs={itemStr} imps={itemImp} coaches={itemCoach} evidence={itemEv}
                  judgment={it.judgment} summary={it.summary}
                  personaVotes={it.persona_votes} personaMergePath={it.persona_merge_path}
                  personaMergeRule={it.persona_merge_rule} personaStepSpread={it.persona_step_spread}
                  judgeReasoning={it.judge_reasoning} mandatoryHumanReview={it.mandatory_human_review}
                  personaDetails={it.persona_details} personaLabelMap={it.persona_label_map}
                  error={it._error} defaultOpen={hasDetail && sc < mx}
                  expandVersion={expandVersion} expandAllTarget={expandAllTarget} />
              );
            })}
          </div>
        )
      )}
    </div>
  );
});

/* ── 평가결과(results) 탭 — 단일 실행 xlsx 내보내기 ─────────── */
// returnBuffer=true 면 다운로드 대신 {buf, fileName} 반환 (자동 저장용)
function exportResultsToXlsx(result, llmBackend, returnBuffer = false) {
  const rp = result?.report || result || {};
  const report = rp.report || rp;
  const sm = report.summary || rp.summary || {};
  const items = report.item_scores || [];
  const deductions = report.deductions || [];
  const strengths = report.strengths || [];
  const improvements = report.improvements || [];
  const coaching = report.coaching_points || [];

  const modelLabel = llmBackend === "sagemaker" ? "Qwen3-8B" : "Sonnet-4.6";
  const now = new Date();
  const tsFile = now.toISOString().replace(/[:]/g, "-").replace(/\..+$/, "");
  const fileName = `qa_result_${modelLabel}_${tsFile}.xlsx`;

  const totalScore = sm.total_score ?? 0;
  const maxScore = sm.max_score ?? 104;
  const grade = sm.grade || "-";

  // Sheet 1: 요약
  const summaryRows = [
    ["QA 평가 결과 리포트"],
    [],
    ["생성일시", now.toLocaleString("ko-KR")],
    ["LLM 백엔드", modelLabel],
    ["전사록 길이", result?.transcript_length ? String(result.transcript_length) + "자" : "-"],
    ["실행 시간", result?.elapsed_seconds ? result.elapsed_seconds.toFixed(1) + "초" : "-"],
    [],
    ["=== 총점 ==="],
    ["총점", totalScore + " / " + maxScore + "점"],
    ["등급", grade],
  ];
  const strGlobal = strengths.filter(s => !(s && s.reference_items && s.reference_items.length));
  if (strGlobal.length) {
    summaryRows.push([], ["=== 강점 (종합) ==="]);
    strGlobal.forEach(s => summaryRows.push([typeof s === "string" ? s : (s.description || JSON.stringify(s))]));
  }
  const impGlobal = improvements.filter(s => !(s && s.reference_items && s.reference_items.length));
  if (impGlobal.length) {
    summaryRows.push([], ["=== 개선점 (종합) ==="]);
    impGlobal.forEach(s => summaryRows.push([typeof s === "string" ? s : (s.description || JSON.stringify(s))]));
  }
  if (coaching.length) {
    summaryRows.push([], ["=== 코칭 포인트 ==="]);
    coaching.forEach(c => summaryRows.push(["[" + (c.priority || "") + "] " + (c.area || "") + ": " + (c.suggestion || c.description || "")]));
  }

  // Sheet 2: 항목별 상세 — 평가 결과 탭과 동일한 깊이 (judgment / 감점사유 / evidence / 3-Persona / RAG 인용 모두 포함)
  const itemHeader = [
    "#", "카테고리", "항목", "만점", "점수",
    "LLM 판정 사유 (judgment)",
    "감점 사유 (상세)",
    "근거 (evidence)",
    "RAG 인용",
    "3-Persona (품격 / 정확성 / 고객경험 / 합의)",
    "Confidence",
    "Tier / 검수 라우팅",
  ];
  const itemRows = [];
  const fmtEv = (ev) => {
    if (!ev || !ev.length) return "";
    return ev.map(e => {
      if (typeof e === "string") return e;
      const speaker = e.speaker || e.role || "";
      const turn = e.turn ?? e.turn_id ?? "";
      const t = e.text || e.quote || "";
      const prefix = (turn !== "" ? `[T${turn}] ` : "") + (speaker ? `${speaker}: ` : "");
      return prefix + t;
    }).join("\n");
  };
  const fmtRag = (rag) => {
    if (!rag || !rag.length) return "";
    return rag.map(r => {
      if (typeof r === "string") return r;
      const id = r.doc_id || r.id || r.chunk_id || "";
      const txt = r.text || r.snippet || r.title || JSON.stringify(r);
      return "[" + id + "] " + String(txt).slice(0, 200);
    }).join("\n");
  };
  const fmtPersona = (it) => {
    const p = it.persona || it.persona_meta || null;
    if (!p) return "";
    const ps = p.persona_outputs || p.persona_scores || {};
    const fmtV = (v) => v == null ? "—" : String(v);
    const merged = it.score ?? p.final_score;
    const path = p.merge_path || "—";
    const spread = p.step_spread != null ? `spread ${p.step_spread}` : "";
    const judgeNote = p.judge_used ? "  · 판사 호출됨" : "";
    return `품격 ${fmtV(ps.strict)}  ·  정확성 ${fmtV(ps.neutral)}  ·  고객경험 ${fmtV(ps.loose)}\n` +
           `→ 합의 ${fmtV(merged)}  (경로: ${path}${spread ? ", " + spread : ""}${judgeNote})`;
  };
  const fmtConf = (it) => {
    const c = it.confidence || null;
    if (!c) return "";
    if (typeof c === "number") return String(c);
    if (typeof c === "object") {
      const fc = c.final_confidence ?? c.composite ?? "";
      const sig = c.signals || {};
      const parts = [];
      if (fc !== "") parts.push(`final=${fc}`);
      Object.entries(sig).forEach(([k, v]) => parts.push(`${k}=${typeof v === "number" ? v.toFixed(2) : v}`));
      return parts.join(" · ");
    }
    return "";
  };
  const fmtTier = (it) => {
    const flags = it.priority_flags || it.routing_flags || [];
    if (Array.isArray(flags) && flags.length) {
      return flags.map(f => (f.code || f.type || "") + (f.severity ? ` (${f.severity})` : "")).join(", ");
    }
    return it.tier || it.tier_decision || "";
  };

  for (let n = 1; n <= 18; n++) {
    const it = items.find(x => x.item_number === n);
    if (!it) {
      itemRows.push([n, STT_CATEGORIES[n] || "", ITEM_NAMES[n] || ("항목 " + n), STT_MAX_SCORES[n] || 0, "-", "", "", "", "", "", "", ""]);
      continue;
    }
    const { sc, mx, itemDeds, itemEv } = prepareItemProps(it, n, deductions, strengths, improvements, coaching);
    const dedText = itemDeds.map(d => "- " + (d.reason || d.rule || d.description || "") + " (-" + (d.points_lost ?? d.points ?? 0) + "점)").join("\n");
    itemRows.push([
      n,
      STT_CATEGORIES[n] || it.category || "",
      ITEM_NAMES[n] || it.item_name || "",
      mx, sc,
      it.judgment || it.summary || "",
      dedText,
      fmtEv(itemEv),
      fmtRag(it.rag_citations || it.rag_hits || []),
      fmtPersona(it),
      fmtConf(it),
      fmtTier(it),
    ]);
  }

  // Sheet 3: AI vs 사람 점수 비교 (gt_comparison)
  const gtScore = result?.gt_comparison || null;
  const scoreCmpRows = [];
  if (gtScore && gtScore.enabled !== false) {
    scoreCmpRows.push(["=== AI vs 사람 QA 점수 비교 ==="]);
    scoreCmpRows.push(["상담 ID", gtScore.sample_id || "-"]);
    scoreCmpRows.push(["시트", gtScore.sheet_name || "-"]);
    scoreCmpRows.push(["AI 합계", gtScore.ai_total]);
    scoreCmpRows.push(["사람 QA 합계", gtScore.gt_total]);
    scoreCmpRows.push(["차이 (AI − 사람)", (gtScore.diff > 0 ? "+" : "") + gtScore.diff]);
    scoreCmpRows.push(["MAE", gtScore.mae]);
    scoreCmpRows.push(["RMSE", gtScore.rmse]);
    scoreCmpRows.push(["일치 / 불일치", `${gtScore.match_count} / ${gtScore.mismatch_count}`]);
    scoreCmpRows.push(["비교 항목 수", gtScore.compared_item_count]);
    scoreCmpRows.push(["산식 — MAE", "Σ|AI−사람| / 항목수"]);
    scoreCmpRows.push(["산식 — RMSE", "√(Σ(AI−사람)² / 항목수)"]);
    scoreCmpRows.push([]);
    scoreCmpRows.push(["#", "항목", "만점", "AI", "사람", "Δ", "비고"]);
    (gtScore.items || []).forEach(row => {
      scoreCmpRows.push([
        row.item_number,
        row.item_name || "",
        row.max_score ?? "",
        row.ai_score ?? "",
        row.gt_score ?? "",
        row.excluded ? "제외" : (row.diff == null ? "—" : (row.diff > 0 ? "+" : "") + row.diff),
        row.note || "",
      ]);
    });
  }

  // Sheet 4: AI vs 사람 근거 비교 LLM 판정 (gt_evidence_comparison)
  const gtEv = result?.gt_evidence_comparison || null;
  const evCmpRows = [];
  if (gtEv && gtEv.enabled !== false) {
    const sm2 = gtEv.summary || {};
    evCmpRows.push(["=== AI vs 사람 QA 근거 비교 (LLM 판정) ==="]);
    evCmpRows.push(["상담 ID", gtEv.sample_id || "-"]);
    evCmpRows.push(["총 비교", sm2.total ?? 0]);
    evCmpRows.push(["일치 (match)", sm2.match ?? 0]);
    evCmpRows.push(["부분일치 (partial)", sm2.partial ?? 0]);
    evCmpRows.push(["불일치 (mismatch)", sm2.mismatch ?? 0]);
    evCmpRows.push(["근거 부족 (insufficient)", sm2.insufficient ?? 0]);
    evCmpRows.push(["일치율", `${sm2.match_rate ?? 0}%`]);
    evCmpRows.push([]);
    evCmpRows.push(["#", "항목", "AI 점수", "사람 점수", "판정", "LLM 판단 근거", "사람 비고", "AI 근거 (evidence)", "AI 판정 요약"]);
    (gtEv.items || []).forEach(row => {
      const aiEv = (row.ai_evidence || []).join("\n");
      evCmpRows.push([
        row.item_number,
        row.item_name || "",
        row.ai_score ?? "",
        row.gt_score ?? "",
        row.verdict_label || row.verdict || "",
        row.reasoning || "",
        row.gt_note || "",
        aiEv,
        row.ai_judgment || "",
      ]);
    });
  }

  // Sheet 5: 검증 결과 (있을 때만)
  const verifSrc = (result?.verification?.verification) || (result?.verification) || null;
  const scoreValSrc = report.score_validation || (result?.score_validation?.validation) || (result?.score_validation) || null;
  const verifRows = [];
  if (verifSrc || scoreValSrc) {
    verifRows.push(["=== Phase C 검증 결과 ==="], []);
    if (verifSrc) {
      verifRows.push(["일관성 검증", verifSrc.is_consistent ? "통과" : "실패"]);
      (verifSrc.critical_issues || []).forEach(c => verifRows.push(["[CRITICAL]", c.description || "", c.evidence || ""]));
      (verifSrc.soft_warnings || []).forEach(w => verifRows.push(["[SOFT]", w.description || "", w.evidence || ""]));
    }
    if (scoreValSrc) {
      verifRows.push([], ["점수 산술 검증", scoreValSrc.passed ? "통과" : "실패"]);
      if (scoreValSrc.summary) verifRows.push(["요약", scoreValSrc.summary]);
      (scoreValSrc.issues || []).forEach(iss => verifRows.push(["[" + (iss.severity || "soft") + "]", iss.message || iss.description || "", iss.detail || ""]));
    }
  }

  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws1["!cols"] = [{ wch: 18 }, { wch: 80 }];
  XLSX.utils.book_append_sheet(wb, ws1, "요약");

  const ws2 = XLSX.utils.aoa_to_sheet([itemHeader, ...itemRows]);
  ws2["!cols"] = [
    { wch: 4 }, { wch: 14 }, { wch: 24 }, { wch: 6 }, { wch: 6 },
    { wch: 60 }, { wch: 60 }, { wch: 70 }, { wch: 50 }, { wch: 50 }, { wch: 35 }, { wch: 25 },
  ];
  XLSX.utils.book_append_sheet(wb, ws2, "항목별 상세");

  if (scoreCmpRows.length) {
    const ws3 = XLSX.utils.aoa_to_sheet(scoreCmpRows);
    ws3["!cols"] = [{ wch: 5 }, { wch: 30 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 8 }, { wch: 80 }];
    XLSX.utils.book_append_sheet(wb, ws3, "AI vs 사람 점수");
  }
  if (evCmpRows.length) {
    const ws4 = XLSX.utils.aoa_to_sheet(evCmpRows);
    ws4["!cols"] = [
      { wch: 5 }, { wch: 24 }, { wch: 8 }, { wch: 8 }, { wch: 14 },
      { wch: 60 }, { wch: 60 }, { wch: 60 }, { wch: 60 },
    ];
    XLSX.utils.book_append_sheet(wb, ws4, "AI vs 사람 근거 (LLM)");
  }
  if (verifRows.length) {
    const ws5 = XLSX.utils.aoa_to_sheet(verifRows);
    ws5["!cols"] = [{ wch: 18 }, { wch: 60 }, { wch: 60 }];
    XLSX.utils.book_append_sheet(wb, ws5, "검증");
  }

  if (returnBuffer) {
    const buf = XLSX.write(wb, { type: "array", bookType: "xlsx" });
    return { buf, fileName };
  }
  XLSX.writeFile(wb, fileName);
}

const ResultsContent = React.memo(function ResultsContent({ tab, result, streamingItems, logs, traces, rawLogs, serverUrl, csvState, setCsvState, llmBackend, consultationId, pushToast }) {
  const logsEndRef = useRef(null);
  const [viewMode, setViewMode] = useState("item"); // 'item' | 'agent'
  const [editMode, setEditMode] = useState(false);  // HITL 수정 모드 토글

  // item_number → { score, confirmed } — 확정/임시저장 완료 항목 추적 (세션 내)
  const [humanSavedMap, setHumanSavedMap] = useState({});
  const handleHumanSaved = useCallback((itemNum, humanScore, confirmed) => {
    setHumanSavedMap(prev => ({
      ...prev,
      [itemNum]: { score: humanScore, confirmed },
    }));
  }, []);

  // 모두 펼치기 / 모두 접기 — 버튼 클릭 시 version 을 증가시켜 하위 카드의 useEffect 로 동기화
  const [expandVersion, setExpandVersion] = useState(0);
  const [expandAllTarget, setExpandAllTarget] = useState(null);
  const handleExpandAll = useCallback(() => {
    setExpandAllTarget(true);
    setExpandVersion(v => v + 1);
  }, []);
  const handleCollapseAll = useCallback(() => {
    setExpandAllTarget(false);
    setExpandVersion(v => v + 1);
  }, []);

  // 검증 탐지 문제 패널 접기/펼치기 (기본: 펼침)
  const [verifCollapsed, setVerifCollapsed] = useState(false);

  // 결과 상세 전체 접기/펼치기 (등급 카드는 항상 표시)
  const [detailOpen, setDetailOpen] = useState(true);

  useEffect(() => {
    if (tab === "logs" && logsEndRef.current) {
      logsEndRef.current.scrollIntoView({ behavior: "smooth" });
    }
  }, [logs, tab]);

  const rp = result?.report || result || {};
  const report = rp.report || rp;
  const sm = report.summary || rp.summary || {};
  const finalItems = report.item_scores || [];
  const hasFinal = finalItems.length > 0 || !!sm.grade;

  /* ── Phase C Gate 검증 결과 추출 ───────────────────────────
     리포트 생성된 경우:  report.score_validation 에 통합되어 있음
     Gate 실패(리포트 생략) 경우:  result 최상위에 verification / score_validation 직접 포함 */
  const scoreValSrc = report.score_validation
    || (result?.score_validation?.validation)
    || (result?.score_validation)
    || null;
  const verifSrc = (result?.verification?.verification) || (result?.verification) || null;
  const hasVerification = !!(scoreValSrc || verifSrc);
  const scorePassed = scoreValSrc ? scoreValSrc.passed : null;
  const consistPassed = verifSrc ? verifSrc.is_consistent : null;
  const gateBlocked = rp.status === "validation_failed" || (scorePassed === false || consistPassed === false);

  /* ── 일관성/산술 검증 실패 사유 집계 ─────────────────────────
     우선순위: report.verification_issues (보고서 내 구조화된 필드) →
     fallback: verifSrc.critical_issues/soft_warnings + scoreValSrc.issues (raw) */
  const reportVerifIssues = report.verification_issues || null;
  const failureReasons = (() => {
    if (reportVerifIssues?.reasons?.length) return reportVerifIssues.reasons;
    const out = [];
    (verifSrc?.critical_issues || []).forEach(c => out.push({
      severity: "critical", origin: "consistency_check",
      type: c.type, source: c.source || "llm",
      description: c.description || "", affected_items: c.affected_items || [],
      evidence: c.evidence || "",
    }));
    (verifSrc?.soft_warnings || []).forEach(w => out.push({
      severity: "soft", origin: "consistency_check",
      type: w.type, source: w.source || "llm",
      description: w.description || "", affected_items: w.affected_items || [],
      evidence: w.evidence || "",
    }));
    (scoreValSrc?.issues || []).forEach(iss => out.push({
      severity: iss.severity || "soft", origin: "score_validation",
      type: iss.type || "arithmetic", source: "rule",
      description: iss.message || iss.description || "",
      affected_items: iss.item_number ? [iss.item_number] : [],
      evidence: iss.detail || "",
    }));
    return out;
  })();
  const missedIssues = reportVerifIssues?.missed_issues || verifSrc?.missed_issues || [];
  const scoreAdjustments = reportVerifIssues?.score_adjustments || verifSrc?.score_adjustments || [];
  const hasFailureReasons = failureReasons.length > 0 || missedIssues.length > 0 || scoreAdjustments.length > 0;
  const criticalCount = failureReasons.filter(r => r.severity === "critical").length;
  const softCount = failureReasons.filter(r => r.severity === "soft").length;

  // 최종 리포트 도착 전까지는 streamingItems 를 부분 결과로 사용
  const isStreaming = !hasFinal && (streamingItems || []).length > 0;
  const items = hasFinal ? finalItems : (streamingItems || []);
  const deductions = report.deductions || [];
  const strengths = report.strengths || [];
  const improvements = report.improvements || [];
  const coaching = report.coaching_points || [];

  // 부분 결과일 때의 running total 계산 (등급은 없음)
  const runningTotal = items.reduce((acc, it) => ({
    score: acc.score + (it.score ?? 0),
    max: acc.max + (it.max_score ?? 0),
  }), { score: 0, max: 0 });

  const score = hasFinal ? (sm.total_score || 0) : runningTotal.score;
  const maxScore = hasFinal ? (sm.max_score || 104) : runningTotal.max;
  const grade = sm.grade || null;

  return (
    <div className="tab-content" style={{ height: '100%', overflowY: 'auto', padding: '16px 20px' }}>
      {tab === "results" && (
          (!hasFinal && !isStreaming) ? (
            <div className="empty-state">
              <div className="empty-state-icon">&#9776;</div>
              <div className="empty-state-text">평가를 실행하면 결과가 여기에 표시됩니다</div>
            </div>
          ) : (
            <div>
              <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16,flexWrap:'wrap'}}>
                {grade ? (
                  <div className="grade-card">
                    <div className={`grade-letter ${grade}`}>{grade}</div>
                    <div className="grade-score">{score} / {maxScore}점</div>
                    <div style={{fontSize:11,color:'var(--text-secondary)',marginTop:2}}>QA 종합 평가</div>
                  </div>
                ) : (
                  <div className="grade-card streaming">
                    <div className="streaming-indicator">
                      <span className="streaming-dot"></span>
                      <span>집계 중</span>
                    </div>
                    <div className="grade-score">{score} / {maxScore}점</div>
                    <div style={{fontSize:11,color:'var(--text-secondary)',marginTop:2}}>부분 결과 · 에이전트 실행 중</div>
                  </div>
                )}
                <button
                  className={`results-collapse-btn ${detailOpen ? 'open' : ''}`}
                  onClick={() => setDetailOpen(p => !p)}
                  title={detailOpen ? '상세 결과 접기' : '상세 결과 펼치기'}
                  style={{alignSelf:'flex-start',marginTop:4}}
                >
                  <span className="collapse-chevron">&#9654;</span>
                  {detailOpen ? '상세 접기' : '상세 펼치기'}
                </button>

                {hasFinal && (
                  <button
                    onClick={() => exportResultsToXlsx(result, llmBackend)}
                    title="현재 평가 결과를 엑셀(.xlsx)로 저장 — 요약/항목별 상세/검증 3개 시트"
                    style={{
                      alignSelf:'flex-start', marginTop:4,
                      padding:'8px 14px', fontSize:12, fontWeight:600,
                      background:'var(--green, #22c55e)', color:'#fff',
                      border:'none', borderRadius:6, cursor:'pointer',
                      display:'inline-flex', alignItems:'center', gap:6,
                    }}
                  >
                    엑셀로 내보내기 (.xlsx)
                  </button>
                )}

                {hasVerification && (
                  <div style={{display:'flex',flexDirection:'column',gap:6,flex:1,minWidth:260}}>
                    <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600,letterSpacing:'0.04em'}}>
                      Phase C · 검증 게이트
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {consistPassed !== null && (
                        <div style={{
                          padding:'6px 10px',borderRadius:6,fontSize:11,
                          background:consistPassed?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)',
                          color:consistPassed?'var(--green,#22c55e)':'var(--red,#ef4444)',

                        }}>
                          <span style={{fontWeight:600}}>{consistPassed?'✓':'✗'} 일관성</span>
                          {verifSrc?.conflicts?.length ? <span style={{marginLeft:6,opacity:0.7}}>모순 {verifSrc.conflicts.length}건</span> : null}
                          {verifSrc?.evidence_check?.missing ? <span style={{marginLeft:6,opacity:0.7}}>증거누락 {verifSrc.evidence_check.missing}건</span> : null}
                        </div>
                      )}
                      {scorePassed !== null && (
                        <div style={{

                          color:scorePassed?'var(--green,#22c55e)':'var(--red,#ef4444)',

                        }}>
                          <span style={{fontWeight:600}}>{scorePassed?'✓':'✗'} 점수 산술</span>

                      <code>RMSE = √(Σ(AI−사람)² / 항목수)</code> &nbsp;·&nbsp;
                      <code>차이 = AI 합계 − 사람 합계</code>
                      <br/>
                      <span style={{color:'#6b7280'}}>※ 비교 단위는 <b>항목</b> ({gc.compared_item_count}개). 총점 차이와는 단위가 다릅니다.</span>
                    </div>
                    <div style={{fontSize:11}}>
                      <div style={{display:'grid',gridTemplateColumns:'36px 1fr 60px 70px 50px',padding:'4px 6px',background:'#e5e7eb',borderRadius:'3px 3px 0 0',fontWeight:700,color:'#1f2937'}}>
                        <span>#</span><span>항목</span>
                        <span style={{textAlign:'right'}}>AI</span>
                        <span style={{textAlign:'right'}}>사람 QA</span>
                        <span style={{textAlign:'center'}}>차이</span>
                      </div>
                      {(gc.items || []).map(row => {
                        const bg = row.excluded ? '#fef3c7'
                                 : row.match === true ? '#dcfce7'
                                 : row.match === false ? '#fee2e2'
                                 : '#fff';
                        return (
                          <div key={row.item_number} style={{display:'grid',gridTemplateColumns:'36px 1fr 60px 70px 50px',padding:'4px 6px',background:bg,borderBottom:'1px solid #e5e7eb'}} title={row.note || ''}>
                            <span style={{fontWeight:700,color:'#4b5563'}}>#{row.item_number}</span>
                            <span style={{color:'#1f2937',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.item_name}</span>
                            <span style={{textAlign:'right',fontWeight:600}}>{row.ai_score ?? '-'}</span>
                            <span style={{textAlign:'right',fontWeight:600}}>{row.gt_score ?? '-'}</span>
                            <span style={{textAlign:'center',fontWeight:700,color:row.diff === 0 ? '#166534' : row.diff > 0 ? '#ea580c' : row.diff < 0 ? '#1d4ed8' : '#9ca3af'}}>
                              {row.excluded ? '제외' : row.diff == null ? '-' : (row.diff > 0 ? '+' : '') + row.diff}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

              {detailOpen && (<>

                  {viewMode === 'item' && items.map((it, i) => {
                    const num = it.item_number || i+1;

                    const hasDetail = itemDeds.length > 0 || itemStr.length > 0 || itemImp.length > 0 || itemCoach.length > 0 || itemEv.length > 0;
                    const savedEntry = humanSavedMap[num];
                    return (
                      <ItemCard key={i} num={num} name={it.item_name || ITEM_NAMES[num] || ''} score={sc} maxScore={mx}

                        expandVersion={expandVersion} expandAllTarget={expandAllTarget}

                  {viewMode === 'agent' && AGENT_ITEMS.map((ag, i) => {
                    const itemsForAgent = ag.items

                    return (
                      <AgentGroupCard

                        label={ag.label}

                        itemsForAgent={itemsForAgent}

                        strengths={strengths}
                        improvements={improvements}
                        coaching={coaching}
                        defaultOpen={hasGap}
                        expandVersion={expandVersion}
                        expandAllTarget={expandAllTarget}

              {(() => {
                const unlinkedStr = strengths.filter(s => typeof s === 'string' || (typeof s === 'object' && (!s.reference_items || s.reference_items.length === 0)));
                const unlinkedImp = improvements.filter(s => typeof s === 'string' || (typeof s === 'object' && (!s.reference_items || s.reference_items.length === 0)));
                const unlinkedCoach = coaching.filter(c => !c.reference_items || c.reference_items.length === 0);

                  <>

                      </div>

                    {unlinkedCoach.length > 0 && (
                      <div className="result-section">
                        <div className="result-section-title">코칭 포인트 (종합)</div>
                        <ul className="result-list coaching">
                          {unlinkedCoach.map((c,i) => <li key={i}><strong>[{c.priority}] {c.area||''}</strong>: {c.suggestion||c.description||''}</li>)}
                        </ul>
                      </div>
                    )}
                  </>
                );
              })()}

              {(report.full_report_text) && (
                <details style={{marginTop:12}} open>

                    __html: sanitizeHtml(typeof marked !== 'undefined' ? marked.parse(report.full_report_text) : report.full_report_text)
                  }} />

              )}

              {result?.elapsed_seconds && (
                <div style={{textAlign:'center',fontSize:12,color:'var(--text-secondary)',marginTop:10}}>{result.elapsed_seconds.toFixed(1)}초</div>
              )}

              <details style={{marginTop:8}}>
                <summary style={{fontSize:11,color:'var(--text-secondary)',cursor:'pointer'}}>Raw JSON</summary>
                <pre style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:10,fontSize:10,overflow:'auto',maxHeight:250,marginTop:6}}>{JSON.stringify(result, null, 2)}</pre>
              </details>
              </>)}

            </div>
          )
        )}

        {tab === "logs" && (
          logs.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">&#128196;</div>
              <div className="empty-state-text">이벤트 로그가 여기에 표시됩니다</div>
            </div>
          ) : (
            <div>
              {logs.map((log, i) => (
                <div key={i} className="log-entry">
                  <span className="log-time">[{log.time}]</span>
                  <span className={`log-msg ${log.type || ""}`}>{log.msg}</span>
                </div>
              ))}
              <div ref={logsEndRef} />
            </div>
          )
        )}

      {tab === "traces" && (
        traces.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">&#128269;</div>
            <div className="empty-state-text">노드별 Input/Output 트레이스가 여기에 표시됩니다</div>
          </div>

          <TraceList traces={traces} />
        )
      )}

      {tab === "rawlogs" && (
        (rawLogs || []).length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">&#128196;</div>

          </div>
        ) : (
          <RawLogList rawLogs={rawLogs} />

      )}

      {tab === "review-queue" && (
        <ReviewQueueTab serverUrl={serverUrl} pushToast={pushToast} />
      )}
    </div>
  );
});

/* ── Review Queue Tab — 사람 검수 대기/완료 항목 조회 ──────── */

const REVIEW_STATUS_LABELS = {
  pending:   { label: "검수 대기", color: "#a16207", bg: "#fef3c7" },
  confirmed: { label: "확정",       color: "#166534", bg: "#dcfce7" },
  draft:     { label: "임시저장",   color: "#1d4ed8", bg: "#dbeafe" },
  rejected:  { label: "반려",       color: "#b91c1c", bg: "#fee2e2" },
};

function ReviewQueueTab({ serverUrl, pushToast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [forceT3Only, setForceT3Only] = useState(false);
  const [sortDesc, setSortDesc] = useState(true);
  // 상태 필터: pending(대기) / confirmed(확정 완료) / all(전체)
  // 기본 "전체" — 대기/확정 혼합 표시 + 💾 배지/확정 카운트가 즉시 반영되도록
  const [statusFilter, setStatusFilter] = useState("all");
  // 상담 단위 펼침 (대화 row) + 그 안의 항목별 편집 펼침
  const [expandedConsultationId, setExpandedConsultationId] = useState(null);
  // 각 상담 안에서 "현재 편집 중인 item_number" 를 저장 (풀뷰 카드 내부 편집 폼 토글)
  const [editingItemNumber, setEditingItemNumber] = useState(null);
  const [inlineScore, setInlineScore] = useState("");
  const [inlineNote, setInlineNote] = useState("");
  const [confirming, setConfirming] = useState(false);
  // 풀뷰 캐시: consultation_id → { loading, error, data }
  const [fullCache, setFullCache] = useState({});

  const fetchFullResult = useCallback(async (consultationId) => {
    if (!serverUrl || !consultationId) return;
    setFullCache(prev => ({ ...prev, [consultationId]: { loading: true, error: "", data: null } }));
    try {
      const r = await fetch(`${serverUrl}/v2/result/full/${encodeURIComponent(consultationId)}`);
      if (r.status === 404) {
        setFullCache(prev => ({ ...prev, [consultationId]: { loading: false, error: "not_found", data: null } }));
        return;
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      setFullCache(prev => ({ ...prev, [consultationId]: { loading: false, error: "", data: j.data || j } }));
    } catch (err) {
      console.error("fetchFullResult failed:", err);
      setFullCache(prev => ({ ...prev, [consultationId]: { loading: false, error: String(err.message || err), data: null } }));
    }
  }, [serverUrl]);

  const refresh = useCallback(async () => {
    if (!serverUrl) return;
    setLoading(true);
    setError("");
    try {
      const qs = new URLSearchParams({
        status: statusFilter,
        force_t3_only: forceT3Only ? "true" : "false",
        limit: "500",
      });
      const r = await fetch(`${serverUrl}/v2/review/queue?${qs.toString()}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      setItems(Array.isArray(data?.items) ? data.items : []);
    } catch (err) {
      console.error("review queue fetch failed:", err);
      setError(String(err.message || err));
      setItems([]);
    } finally {
      setLoading(false);
    }
  }, [serverUrl, forceT3Only, statusFilter]);

  useEffect(() => { refresh(); }, [refresh]);

  // 상담(consultation_id) 단위로 그룹화
  const consultations = useMemo(() => {
    const grouped = new Map();
    for (const it of items) {
      const cid = it.consultation_id || "(no id)";
      if (!grouped.has(cid)) {
        grouped.set(cid, {
          consultation_id: cid,
          items: [],
          createdAt: it.created_at,
          forceT3Count: 0,
          lowConfCount: 0,
          pendingCount: 0,
          confirmedCount: 0,
          totalAi: 0,
          totalHuman: 0,
          humanCount: 0,
        });
      }
      const g = grouped.get(cid);
      g.items.push(it);
      // 가장 빠른 created_at 우선 (상담 시작 시점)
      if (it.created_at && (!g.createdAt || it.created_at < g.createdAt)) {
        g.createdAt = it.created_at;
      }
      if (it.force_t3) g.forceT3Count += 1;
      const conf = it.ai_confidence;
      if (conf != null) {
        const cn = Number(conf);
        const isIntScale = cn > 1.0;
        const isLow = isIntScale ? (cn <= 2) : (cn <= 0.4);
        if (isLow) g.lowConfCount += 1;
      }
      if ((it.status || "pending") === "pending") g.pendingCount += 1;
      if (it.status === "confirmed") g.confirmedCount += 1;
      if (it.ai_score != null) g.totalAi += Number(it.ai_score) || 0;
      if (it.human_score != null) {
        g.totalHuman += Number(it.human_score) || 0;
        g.humanCount += 1;
      }
    }
    // 각 상담의 items 를 항목번호 순으로
    for (const g of grouped.values()) {
      g.items.sort((a, b) => Number(a.item_number) - Number(b.item_number));
    }
    // 상담 자체는 createdAt 정렬
    const arr = Array.from(grouped.values());
    arr.sort((a, b) => {
      const ta = new Date(a.createdAt || 0).getTime();
      const tb = new Date(b.createdAt || 0).getTime();
      return sortDesc ? tb - ta : ta - tb;
    });
    return arr;
  }, [items, sortDesc]);

  const totalItemCount = items.length;

  const [exporting, setExporting] = useState(false);
  const handleExport = useCallback(async () => {
    if (!serverUrl) return;
    setExporting(true);
    try {
      // 검토 큐 탭의 현재 필터 상태 반영: "전체/pending" 은 UI 에 없으므로 status=all 디폴트.
      // force_t3_only 는 백엔드가 지원한다고 알려지지 않았으므로 전송 생략 (status 만 전달)
      const r = await fetch(`${serverUrl}/v2/review/export-xlsx?status=all`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (!data || data.ok !== true) {
        throw new Error(data?.error || "export 실패 (ok=false)");
      }
      pushToast && pushToast({
        kind: "success",
        title: "엑셀 저장 완료",
        message: `${data.path || '-'}\n(${data.row_count ?? 0}건 저장됨)`,
      });
    } catch (err) {
      console.error("review export-xlsx failed:", err);
      pushToast && pushToast({ kind: "error", title: "엑셀 내보내기 실패", message: String(err.message || err) });
    } finally {
      setExporting(false);
    }
  }, [serverUrl, pushToast]);

  const handleConfirm = useCallback(async (row, humanScore, noteText) => {
    if (!serverUrl) return;
    setConfirming(true);
    try {
      // 1) UPSERT — /v2/human-review 는 부분 업데이트가 아니므로 (미전달 필드는 NULL),
      //    기존 row 의 AI 필드 전부 재전송 + 수정된 human_score / human_note 반영
      const body = {
        consultation_id: row.consultation_id || "",
        item_number: Number(row.item_number),
        ai_score: row.ai_score != null ? Number(row.ai_score) : 0,
        human_score: Number(humanScore),
        ai_evidence: Array.isArray(row.ai_evidence) ? row.ai_evidence : [],
        ai_judgment: row.ai_judgment || "",
        human_note: noteText || row.human_note || "",
        ai_confidence: row.ai_confidence != null ? Number(row.ai_confidence) : null,
        reviewer_id: "ui-user",
        reviewer_role: "senior",
        force_t3: !!row.force_t3,
      };
      const rUp = await fetch(`${serverUrl}/v2/human-review`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!rUp.ok) throw new Error(`UPSERT HTTP ${rUp.status}`);
      const upData = await rUp.json();
      const reviewId = (upData && upData.id) ?? row.id;
      // 2) confirm
      const rCf = await fetch(`${serverUrl}/v2/review/${reviewId}/confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviewer_id: "ui-user", reviewer_role: "senior" }),
      });
      if (!rCf.ok) throw new Error(`CONFIRM HTTP ${rCf.status}`);
      const cfData = await rCf.json().catch(() => ({}));
      const snapPath = cfData?.snapshot_path || cfData?.snapshot_root || "";
      pushToast && pushToast({
        kind: "success",
        title: "확정되었습니다",
        message: `검수 ID #${reviewId} · ${humanScore}점` + (snapPath ? `\n💾 ${snapPath}` : ""),
      });
      setEditingItemNumber(null);
      setInlineScore(""); setInlineNote("");
      refresh();
      // 풀뷰 캐시 무효화 → 다시 펼칠 때 최신 상태 반영
      const cid = row.consultation_id;
      if (cid) {
        setFullCache(prev => { const n = {...prev}; delete n[cid]; return n; });
      }
    } catch (err) {
      console.error("confirm failed:", err);
      pushToast && pushToast({ kind: "error", title: "확정 실패", message: String(err.message || err) });
    } finally {
      setConfirming(false);
    }
  }, [serverUrl, pushToast, refresh]);

  // 항목 단위 검수 취소 (confirmed → pending)
  const [revertingReviewId, setRevertingReviewId] = useState(null);
  const handleRevert = useCallback(async (row) => {
    if (!serverUrl || !row?.id) return;
    const reason = window.prompt(
      `항목 #${row.item_number} 검수 취소 사유 (선택 — 비고에 기록됨)`,
      ""
    );
    if (reason === null) return; // 취소 다이얼로그 닫음
    setRevertingReviewId(row.id);
    try {
      const r = await fetch(`${serverUrl}/v2/review/${row.id}/revert`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviewer_id: "ui-user", reason }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      pushToast && pushToast({
        kind: "success",
        title: "검수 취소됨",
        message: `항목 #${row.item_number} → 대기로 복귀\n💾 ${data.snapshot_path || '-'}`,
      });
      refresh();
      const cid = row.consultation_id;
      if (cid) setFullCache(prev => { const n = {...prev}; delete n[cid]; return n; });
    } catch (err) {
      console.error("revert failed:", err);
      pushToast && pushToast({ kind: "error", title: "검수 취소 실패", message: String(err.message || err) });
    } finally {
      setRevertingReviewId(null);
    }
  }, [serverUrl, pushToast, refresh]);

  // 상담 단위 전체 검수 취소 (모든 confirmed → pending)
  const [bulkRevertingId, setBulkRevertingId] = useState(null);
  const handleBulkRevert = useCallback(async (consultationId, confirmedCount) => {
    if (!serverUrl || !consultationId) return;
    const reason = window.prompt(
      `상담 ${consultationId} 의 확정 ${confirmedCount}건을 전체 검수 취소하시겠습니까?\n\n사유 (선택 — 각 항목 비고에 기록됨)`,
      ""
    );
    if (reason === null) return;
    setBulkRevertingId(consultationId);
    try {
      const r = await fetch(`${serverUrl}/v2/review/consultation/${encodeURIComponent(consultationId)}/revert-all`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviewer_id: "ui-user", reason }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      pushToast && pushToast({
        kind: "success",
        title: "전체 검수 취소",
        message: `${data.reverted}건 → 대기로 복귀\n💾 ${data.snapshot_path || '-'}`,
      });
      refresh();
      setFullCache(prev => { const n = {...prev}; delete n[consultationId]; return n; });
    } catch (err) {
      console.error("bulk revert failed:", err);
      pushToast && pushToast({ kind: "error", title: "전체 취소 실패", message: String(err.message || err) });
    } finally {
      setBulkRevertingId(null);
    }
  }, [serverUrl, pushToast, refresh]);

  // 상담 단위 전체 확정 (AI 점수 그대로 승인 또는 입력값 유지)
  const [bulkConfirmingId, setBulkConfirmingId] = useState(null);
  const handleBulkConfirm = useCallback(async (consultationId, pendingCount) => {
    if (!serverUrl || !consultationId) return;
    const msg = `상담 ${consultationId} 의 대기 ${pendingCount} 건을 전체 확정하시겠습니까?\n\n` +
                `· 사람 점수가 비어있는 항목은 AI 점수를 그대로 승인합니다 (accept_ai_score)\n` +
                `· 이미 확정된 항목은 건너뜁니다\n` +
                `· 확정 완료 후 ~/Desktop/QA평가결과/HITL_수정/${consultationId}.json 에 스냅샷이 저장됩니다`;
    if (!window.confirm(msg)) return;
    setBulkConfirmingId(consultationId);
    try {
      const r = await fetch(`${serverUrl}/v2/review/consultation/${encodeURIComponent(consultationId)}/confirm-all`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviewer_id: "ui-user", reviewer_role: "senior", accept_ai_score: true, overwrite: false }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      pushToast && pushToast({
        kind: "success",
        title: "전체 검토 완료",
        message: `확정 ${data.confirmed}건 · AI 점수 자동채움 ${data.filled_from_ai}건 · 건너뜀 ${data.skipped}건\n💾 ${data.snapshot_path || data.snapshot_root}`,
      });
      refresh();
      // 풀뷰 캐시 무효화 → 다시 펼칠 때 최신 상태 반영
      setFullCache(prev => { const n = {...prev}; delete n[consultationId]; return n; });
    } catch (err) {
      console.error("bulk confirm failed:", err);
      pushToast && pushToast({ kind: "error", title: "전체 확정 실패", message: String(err.message || err) });
    } finally {
      setBulkConfirmingId(null);
    }
  }, [serverUrl, pushToast, refresh]);

  return (
    <div style={{padding:'0 4px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>검토 큐</div>
        <span style={{fontSize:11,color:'var(--text-secondary)'}}>
          {(() => {
            if (loading) return "불러오는 중...";
            const fLabel = statusFilter === "pending" ? "검토 대기" : statusFilter === "confirmed" ? "확정 완료" : "전체";
            const totalPending = consultations.reduce((s, c) => s + (c.pendingCount || 0), 0);
            const totalConfirmed = consultations.reduce((s, c) => s + (c.confirmedCount || 0), 0);
            return `상담 ${consultations.length}건 · 항목 ${totalItemCount}건 (대기 ${totalPending} / 확정 ${totalConfirmed}) · 필터: ${fLabel}`;
          })()}
        </span>
        <div style={{flex:1}} />
        {/* 상태 필터 — DB human_reviews.status 기준 */}
        <div style={{
          display:'inline-flex',alignItems:'center',gap:6,fontSize:12,fontWeight:600,
          padding:'4px 10px',background:'#fdfaf2',color:'#78350f',
          border:'1px solid #e5d8c3',borderRadius:4,
        }}>
          <span style={{fontSize:10,color:'var(--text-secondary)',fontWeight:500}}>상태</span>
          <select
            value={statusFilter}
            onChange={e => setStatusFilter(e.target.value)}
            title="DB human_reviews.status 기준 필터. 확정 완료를 선택하면 사람이 수정·확정한 상담만 조회됩니다."
            style={{
              fontSize:12,fontWeight:600,border:'none',background:'transparent',color:'#78350f',
              cursor:'pointer',outline:'none',padding:'0 2px',
            }}
          >
            <option value="pending">검토 대기</option>
            <option value="confirmed">확정 완료 💾</option>
            <option value="all">전체</option>
          </select>
        </div>
        <label style={{
          display:'inline-flex',alignItems:'center',gap:6,
          padding:'4px 10px',fontSize:12,fontWeight:600,
          background: forceT3Only ? '#b91c1c' : '#fdfaf2',
          color: forceT3Only ? '#fff' : '#78350f',
          border:'1px solid ' + (forceT3Only ? '#991b1b' : '#e5d8c3'),
          borderRadius:4,cursor:'pointer',userSelect:'none',
        }}>
          <input type="checkbox" checked={forceT3Only} onChange={e => setForceT3Only(e.target.checked)} style={{margin:0}} />
          force_t3 만 보기
        </label>
        <button
          type="button"
          onClick={() => setSortDesc(v => !v)}
          style={{padding:'4px 10px',fontSize:12,background:'#fdfaf2',color:'#78350f',border:'1px solid #e5d8c3',borderRadius:4,cursor:'pointer'}}
          title="생성일 기준 정렬 방향"
        >
          {sortDesc ? "최신순" : "오래된 순"}
        </button>
        <button
          type="button"
          onClick={handleExport}
          disabled={exporting}
          title="현재 검토 큐 전체를 xlsx 로 저장 (~/Desktop/QA평가결과/HITL_비교/)"
          style={{padding:'4px 10px',fontSize:12,fontWeight:600,background:'#16a34a',color:'#fff',border:'1px solid #15803d',borderRadius:4,cursor:exporting?'not-allowed':'pointer'}}
        >
          {exporting ? "저장 중..." : "엑셀 내보내기"}
        </button>
        <button
          type="button"
          onClick={refresh}
          disabled={loading}
          style={{padding:'4px 10px',fontSize:12,fontWeight:600,background:'#d97706',color:'#fff',border:'1px solid #b45309',borderRadius:4,cursor:loading?'not-allowed':'pointer'}}
        >
          새로고침
        </button>
      </div>

      {/* 수정 파일 저장 경로 안내 */}
      <div style={{
        display:'flex',alignItems:'center',gap:8,fontSize:10,color:'#78350f',
        padding:'4px 10px',marginBottom:10,background:'#fff7e6',border:'1px dashed #fbd38d',borderRadius:4,flexWrap:'wrap',
      }}>
        <span style={{fontWeight:700}}>💾 사람 수정 결과 자동 저장 경로</span>
        <code style={{background:'#fef3c7',padding:'1px 6px',borderRadius:3,fontFamily:'"JetBrains Mono",Consolas,monospace'}}>
          ~/Desktop/QA평가결과/HITL_수정/&lt;상담ID&gt;.json
        </code>
        <span style={{color:'#92400e'}}>
          · 항목 카드를 펼쳐 사람 점수를 입력하고 <b>확정</b> 을 누르면 즉시 스냅샷을 저장합니다.
        </span>
      </div>

      {error && (
        <div style={{padding:'10px 12px',background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:6,color:'#b91c1c',fontSize:12,marginBottom:10}}>
          큐 조회 실패: {error}
        </div>
      )}

      {!loading && consultations.length === 0 && !error && (
        <div className="empty-state" style={{padding:'40px 0'}}>
          <div className="empty-state-icon">&#10003;</div>
          <div className="empty-state-text">검토 대기 상담이 없습니다</div>
        </div>
      )}

      {consultations.length > 0 && (
        <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',background:'var(--card)'}}>
          {/* 상위 헤더 — 상담 단위 */}
          <div style={{
            display:'grid',gridTemplateColumns:'200px 1fr 70px 70px 70px 90px 90px 80px',
            padding:'10px 12px',background:'#f5efe0',fontSize:11,fontWeight:700,color:'#4a3f35',
            borderBottom:'1px solid var(--border)',gap:8,
          }}>
            <span>상담 ID</span>
            <span>생성일 (가장 빠른)</span>
            <span style={{textAlign:'center'}}>항목</span>
            <span style={{textAlign:'center'}} title="force_t3 항목 수">⚠ T3</span>
            <span style={{textAlign:'center'}} title="낮은 confidence 항목 수">Low Conf.</span>
            <span style={{textAlign:'center'}}>대기/확정</span>
            <span style={{textAlign:'right'}}>AI 합계</span>
            <span style={{textAlign:'center'}}>펼치기</span>
          </div>
          {consultations.map(con => {
            const isConOpen = expandedConsultationId === con.consultation_id;
            return (
              <div key={con.consultation_id} style={{borderBottom:'1px solid var(--border)'}}>
                {/* 상담 row */}
                <div
                  onClick={() => {
                    const nextId = isConOpen ? null : con.consultation_id;
                    setExpandedConsultationId(nextId);
                    setEditingItemNumber(null);
                    if (nextId && !fullCache[nextId]) {
                      fetchFullResult(nextId);
                    }
                  }}
                  style={{
                    display:'grid',gridTemplateColumns:'200px 1fr 70px 70px 70px 90px 90px 80px',
                    padding:'10px 12px',gap:8,fontSize:12,cursor:'pointer',
                    background: isConOpen
                      ? '#fdfaf2'
                      : con.confirmedCount > 0 && con.pendingCount === 0
                        ? 'rgba(22,163,74,0.06)'  /* 전체 확정 완료 → 연녹색 */
                        : con.confirmedCount > 0
                          ? 'rgba(22,163,74,0.03)' /* 일부 확정 → 매우 옅은 녹색 */
                          : con.forceT3Count > 0
                            ? 'rgba(239,68,68,0.04)'
                            : 'transparent',
                    alignItems:'center',fontWeight: isConOpen ? 600 : 400,
                    borderLeft: con.confirmedCount > 0 && con.pendingCount === 0 ? '3px solid #16a34a' : '3px solid transparent',
                  }}
                >
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'monospace'}}>
                    {(() => {
                      // 상태 신호등:
                      //   🟢 녹색 — 전체 확정 완료 (pending=0, confirmed>0)
                      //   🟡 노랑 — 일부 확정 (pending>0, confirmed>0)
                      //   🔴 빨강 — force_t3 포함 & 미확정
                      //   🟠 주황 — 일반 대기 (pending>0, confirmed=0, no force_t3)
                      //   ⚪ 회색 — 데이터 없음
                      let color = '#9ca3af';
                      let title = '상태 없음';
                      if (con.pendingCount === 0 && con.confirmedCount > 0) {
                        color = '#16a34a'; title = '전체 검토 완료';
                      } else if (con.confirmedCount > 0 && con.pendingCount > 0) {
                        color = '#eab308'; title = `일부 확정 (${con.confirmedCount}/${con.items.length})`;
                      } else if (con.forceT3Count > 0) {
                        color = '#dc2626'; title = `force_t3 ${con.forceT3Count}건 포함 · 사람 검수 필수`;
                      } else if (con.pendingCount > 0) {
                        color = '#f97316'; title = `검토 대기 ${con.pendingCount}건`;
                      }
                      return (
                        <span style={{color,marginRight:4,fontSize:13,lineHeight:1}} title={title}>●</span>
                      );
                    })()}
                    {con.consultation_id}
                  </span>
                  <span style={{color:'var(--text-secondary)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {con.createdAt || '-'}
                  </span>
                  <span style={{textAlign:'center'}}>{con.items.length}</span>
                  <span style={{textAlign:'center',color: con.forceT3Count > 0 ? '#b91c1c' : 'var(--text-secondary)',fontWeight: con.forceT3Count > 0 ? 700 : 400}}>
                    {con.forceT3Count}
                  </span>
                  <span style={{textAlign:'center',color: con.lowConfCount > 0 ? '#b91c1c' : 'var(--text-secondary)',fontWeight: con.lowConfCount > 0 ? 700 : 400}}>
                    {con.lowConfCount}
                  </span>
                  <span style={{textAlign:'center',fontSize:11}}>
                    <span style={{color:'#d97706',fontWeight:600}}>{con.pendingCount}</span>
                    <span style={{color:'var(--text-secondary)',margin:'0 3px'}}>/</span>
                    <span style={{color:'#16a34a',fontWeight:600}}>{con.confirmedCount}</span>
                    {con.confirmedCount > 0 && (
                      <span
                        title={`~/Desktop/QA평가결과/HITL_수정/${con.consultation_id}.json 에 저장됨`}
                        style={{
                          marginLeft:4,fontSize:9,fontWeight:700,
                          padding:'1px 5px',borderRadius:8,background:'#dcfce7',color:'#166534',
                        }}
                      >💾 저장</span>
                    )}
                  </span>
                  <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{con.totalAi}</span>
                  <span style={{textAlign:'center',color:'var(--text-secondary)',fontSize:11}}>
                    {isConOpen ? '접기 ▲' : '펼치기 ▼'}
                  </span>
                </div>

                {/* 펼침 — 풀뷰 (GT 비교 / 근거 비교 / 항목별 상세) + 항목별 sub list */}
                {isConOpen && (
                  <div style={{padding:'12px 16px 16px 16px',background:'#fbf5e8',borderTop:'1px dashed var(--border)'}}>
                    {(() => {
                      const cache = fullCache[con.consultation_id];
                      if (!cache || cache.loading) {
                        return <div style={{fontSize:12,color:'var(--text-secondary)',padding:'8px 0'}}>풀 결과 불러오는 중...</div>;
                      }

                        return (
                          <div style={{fontSize:11,color:'#92400e',background:'#fef3c7',padding:'8px 12px',border:'1px solid #fcd34d',borderRadius:6,marginBottom:10}}>
                            ℹ 이 상담의 풀 결과 JSON 이 없습니다. 파이프라인이 결과를 저장하지 않은 구 버전 실행 건일 수 있습니다. 아래 항목별 편집은 정상 동작합니다.
                          </div>
                        );
                      }
                      if (cache.error) {
                        return <div style={{fontSize:11,color:'#b91c1c',padding:'8px 0'}}>풀 결과 로드 실패: {cache.error}</div>;
                      }
                      const data = cache.data || {};
                      const report = data.report || {};
                      const gt = data.gt_comparison || {};
                      const gtEv = data.gt_evidence_comparison || {};
                      const finalScore = report.final_score || {};
                      const categories = (report.evaluation && report.evaluation.categories) || [];

                      return (
                        <div style={{display:'flex',flexDirection:'column',gap:16}}>
                          {/* ─── 종합 점수 헤더 ─── */}
                          <div style={{
                            display:'flex',alignItems:'center',gap:16,padding:'12px 16px',
                            background:'#fff',border:'1px solid #e5d8c3',borderRadius:8,flexWrap:'wrap',
                          }}>
                            <div style={{fontSize:11,fontWeight:700,color:'#6b5b48',letterSpacing:0.3}}>QA 종합 평가</div>
                            <div style={{
                              display:'flex',alignItems:'baseline',gap:6,
                              padding:'4px 12px',background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:6,
                            }}>
                              <span style={{fontSize:22,fontWeight:800,color:'#78350f'}}>{finalScore.grade || '-'}</span>
                              <span style={{fontSize:13,fontWeight:700,color:'#92400e'}}>
                                {finalScore.after_overrides ?? finalScore.raw_total ?? '-'} / 100
                              </span>
                            </div>
                            {report.routing?.decision && (
                              <div style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:10,background:'#e0e7ff',color:'#3730a3'}}>
                                {report.routing.decision}
                              </div>
                            )}
                            <div style={{flex:1}} />
                            {/* 상담 단위 일괄 확정 — 대기 건이 있고 bulk 진행중이 아닐 때만 표시 */}
                            {con.pendingCount > 0 && (
                              <button
                                type="button"
                                disabled={bulkConfirmingId === con.consultation_id}
                                onClick={e => { e.stopPropagation(); handleBulkConfirm(con.consultation_id, con.pendingCount); }}
                                title={`대기 ${con.pendingCount}건 전체 확정 — 사람 점수 미입력 항목은 AI 점수로 승인`}
                                style={{
                                  padding:'6px 14px',fontSize:11,fontWeight:700,
                                  background: bulkConfirmingId === con.consultation_id ? '#a3a3a3' : '#16a34a',
                                  color:'#fff',border:'1px solid #15803d',borderRadius:4,
                                  cursor: bulkConfirmingId === con.consultation_id ? 'not-allowed' : 'pointer',
                                  whiteSpace:'nowrap',
                                }}
                              >
                                {bulkConfirmingId === con.consultation_id
                                  ? "확정 중..."
                                  : `✓ 전체 검토 완료 (대기 ${con.pendingCount}건)`}
                              </button>
                            )}
                            {con.pendingCount === 0 && con.confirmedCount > 0 && (
                              <span style={{
                                padding:'6px 14px',fontSize:11,fontWeight:700,
                                background:'#dcfce7',color:'#166534',border:'1px solid #86efac',borderRadius:4,whiteSpace:'nowrap',
                              }}>
                                ✅ 전체 검토 완료 ({con.confirmedCount}건)
                              </span>
                            )}
                            {/* 상담 단위 일괄 검수 취소 — 확정 건이 있을 때 노출 */}
                            {con.confirmedCount > 0 && (
                              <button
                                type="button"
                                disabled={bulkRevertingId === con.consultation_id}
                                onClick={e => { e.stopPropagation(); handleBulkRevert(con.consultation_id, con.confirmedCount); }}
                                title={`확정 ${con.confirmedCount}건을 전체 대기로 되돌림 (human_score 는 유지)`}
                                style={{
                                  padding:'5px 10px',fontSize:10,fontWeight:600,
                                  background: bulkRevertingId === con.consultation_id ? '#a3a3a3' : '#fff',
                                  color:'#b91c1c',border:'1px solid #fca5a5',borderRadius:4,
                                  cursor: bulkRevertingId === con.consultation_id ? 'not-allowed' : 'pointer',
                                  whiteSpace:'nowrap',
                                }}
                              >
                                {bulkRevertingId === con.consultation_id ? "취소 중..." : `↺ 전체 취소 (${con.confirmedCount}건)`}
                              </button>
                            )}
                            <div style={{fontSize:10,color:'var(--text-secondary)'}}>
                              {report.evaluated_at || '-'} · {report.tenant || '-'}
                            </div>
                          </div>

                          {/* ─── GT 점수 비교 ─── */}
                          {gt.items && gt.items.length > 0 && (
                            <div style={{padding:'12px 16px',background:'#fff',border:'1px solid #e5d8c3',borderRadius:8}}>
                              <div style={{fontSize:12,fontWeight:700,color:'#4a3f35',marginBottom:8,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                                📊 AI vs 사람 QA 점수 비교
                                <span style={{fontSize:10,fontWeight:400,color:'var(--text-secondary)'}}>
                                  — 상담ID {gt.sample_id || con.consultation_id} · 업무 정확도 (#15, #16) 제외
                                </span>
                              </div>
                              {/* 메트릭 요약 */}
                              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(100px, 1fr))',gap:8,marginBottom:10}}>
                                {[
                                  {label:'AI 합계', value: gt.ai_total ?? '-', color:'#1e3a8a'},
                                  {label:'사람 합계', value: gt.gt_total ?? '-', color:'#166534'},
                                  {label:'차이 (AI-사람)', value: gt.diff != null ? (gt.diff > 0 ? `+${gt.diff}` : gt.diff) : '-', color:'#b91c1c'},
                                  {label:'MAE', value: gt.mae != null ? Number(gt.mae).toFixed(2) : '-', color:'#78350f'},
                                  {label:'RMSE', value: gt.rmse != null ? Number(gt.rmse).toFixed(3) : '-', color:'#78350f'},
                                  {label:'일치 / 불일치', value: `${gt.match_count ?? '-'} / ${gt.mismatch_count ?? '-'}`, color:'#4a3f35'},
                                ].map(m => (
                                  <div key={m.label} style={{padding:'6px 10px',background:'#fdfaf2',border:'1px solid #e5d8c3',borderRadius:4,textAlign:'center'}}>
                                    <div style={{fontSize:9,fontWeight:600,color:'var(--text-secondary)'}}>{m.label}</div>
                                    <div style={{fontSize:14,fontWeight:800,color:m.color,marginTop:2}}>{m.value}</div>
                                  </div>
                                ))}
                              </div>
                              <div style={{fontSize:10,color:'var(--text-secondary)',marginBottom:6,fontStyle:'italic'}}>
                                MAE = Σ|AI−사람| / 항목수 · RMSE = √(Σ(AI−사람)² / 항목수) · 비교 단위: 항목
                              </div>
                              {/* 항목 테이블 */}
                              <div style={{border:'1px solid #e5d8c3',borderRadius:4,overflow:'hidden',background:'#fff'}}>
                                <div style={{display:'grid',gridTemplateColumns:'50px 1fr 60px 70px 70px',padding:'5px 10px',background:'#f5efe0',fontSize:10,fontWeight:700,color:'#4a3f35',borderBottom:'1px solid #e5d8c3'}}>
                                  <span>#</span>
                                  <span>항목</span>
                                  <span style={{textAlign:'right'}}>AI</span>
                                  <span style={{textAlign:'right'}}>사람</span>
                                  <span style={{textAlign:'center'}}>차이</span>
                                </div>
                                {gt.items.map((row, idx) => {
                                  const delta = (row.ai_score != null && row.gt_score != null) ? (Number(row.ai_score) - Number(row.gt_score)) : null;
                                  const isExcluded = row.excluded || row.item_number === 15 || row.item_number === 16;
                                  return (
                                    <div key={idx} style={{
                                      display:'grid',gridTemplateColumns:'50px 1fr 60px 70px 70px',
                                      padding:'5px 10px',fontSize:11,borderBottom:'1px solid #efe4cf',
                                      background: delta !== 0 && delta != null && !isExcluded ? '#fef3c7' : 'transparent',
                                    }}>
                                      <span style={{fontWeight:600}}>#{row.item_number}</span>
                                      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                        {row.item_name || (ITEM_NAMES && ITEM_NAMES[row.item_number]) || '-'} ({row.max_score || '-'})
                                      </span>
                                      <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{row.ai_score ?? '-'}</span>
                                      <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{row.gt_score ?? '-'}</span>
                                      <span style={{
                                        textAlign:'center',fontWeight:700,
                                        color: isExcluded ? 'var(--text-secondary)' : (delta === 0 ? '#166534' : (delta > 0 ? '#b91c1c' : '#1d4ed8')),
                                      }}>
                                        {isExcluded ? '제외' : (delta == null ? '-' : (delta > 0 ? `+${delta}` : delta))}
                                      </span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}

                          {/* ─── GT 근거 비교 (LLM 판정) ─── */}
                          {gtEv.items && gtEv.items.length > 0 && (
                            <div style={{padding:'12px 16px',background:'#fff',border:'1px solid #e5d8c3',borderRadius:8}}>
                              <div style={{fontSize:12,fontWeight:700,color:'#4a3f35',marginBottom:8,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                                🔍 AI vs 사람 QA 근거 비교 (LLM 판정)
                                <span style={{fontSize:10,fontWeight:400,color:'var(--text-secondary)'}}>
                                  — 항목별 근거 텍스트가 동일 사실/구간을 가리키는지 LLM 비교
                                </span>
                              </div>
                              {/* 메트릭 요약 */}
                              {gtEv.summary && (
                                <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                                  {[
                                    {label:'총 비교', value: gtEv.summary.total ?? '-', color:'#4a3f35'},
                                    {label:'일치', value: gtEv.summary.match ?? '-', color:'#166534'},
                                    {label:'부분일치', value: gtEv.summary.partial ?? '-', color:'#ca8a04'},
                                    {label:'불일치', value: gtEv.summary.mismatch ?? '-', color:'#b91c1c'},
                                    {label:'일치율', value: gtEv.summary.match_rate != null ? `${gtEv.summary.match_rate}%` : '-', color:'#1e3a8a'},
                                  ].map(m => (
                                    <div key={m.label} style={{padding:'4px 10px',background:'#fdfaf2',border:'1px solid #e5d8c3',borderRadius:4,minWidth:70,textAlign:'center'}}>
                                      <div style={{fontSize:9,fontWeight:600,color:'var(--text-secondary)'}}>{m.label}</div>
                                      <div style={{fontSize:13,fontWeight:800,color:m.color}}>{m.value}</div>
                                    </div>
                                  ))}
                                </div>
                              )}
                              {/* 항목 리스트 */}
                              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                {gtEv.items.map((row, idx) => {
                                  const verdict = row.verdict || '-';
                                  const verdictStyle = {
                                    match: {bg:'#dcfce7', color:'#166534', icon:'✅', label:'일치'},
                                    partial: {bg:'#fef3c7', color:'#92400e', icon:'⚠️', label:'부분일치'},
                                    mismatch: {bg:'#fee2e2', color:'#b91c1c', icon:'❌', label:'불일치'},
                                    insufficient: {bg:'#e5e7eb', color:'#4b5563', icon:'❓', label:'근거 부족'},
                                  }[verdict] || {bg:'#e5e7eb', color:'#4b5563', icon:'·', label:verdict};
                                  return (
                                    <div key={idx} style={{
                                      padding:'8px 12px',background:'#fdfaf2',border:'1px solid #e5d8c3',borderRadius:4,
                                    }}>
                                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
                                        <span style={{fontSize:11,fontWeight:700,color:'#4a3f35'}}>#{row.item_number}</span>
                                        <span style={{fontSize:11,color:'var(--text-primary)'}}>
                                          {row.item_name || (ITEM_NAMES && ITEM_NAMES[row.item_number]) || '-'}
                                        </span>
                                        <span style={{fontSize:10,color:'var(--text-secondary)'}}>
                                          AI {row.ai_score ?? '-'} / 사람 {row.gt_score ?? '-'}
                                        </span>
                                        <span style={{
                                          fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,
                                          background:verdictStyle.bg,color:verdictStyle.color,
                                        }}>
                                          {verdictStyle.icon} {verdictStyle.label}
                                        </span>
                                      </div>
                                      {row.reasoning && (
                                        <div style={{fontSize:11,color:'#4a3f35',lineHeight:1.5,paddingLeft:8,borderLeft:'2px solid #d9c9b3'}}>
                                          {row.reasoning}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}

                          {/* ─── 항목별 평가 상세 + 사람 검수 입력 ─── */}
                          {categories.length > 0 && (() => {
                            // HITL 행 lookup (item_number → hitlRow)
                            const hitlByNum = new Map();
                            for (const r of (con.items || [])) {
                              hitlByNum.set(Number(r.item_number), r);
                            }
                            const flatItems = categories.flatMap(
                              cat => (cat.items || []).map((it, i) => ({...it, category: cat.category, _k: `${cat.category}-${it.item_number}-${i}`}))
                            );
                            return (
                              <div style={{padding:'12px 16px',background:'#fff',border:'1px solid #e5d8c3',borderRadius:8}}>
                                <div style={{fontSize:12,fontWeight:700,color:'#4a3f35',marginBottom:4,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                                  📋 항목별 평가 상세 · 사람 검수 입력
                                  <span style={{fontSize:10,fontWeight:400,color:'var(--text-secondary)'}}>
                                    — 항목을 클릭하면 LLM 판정·근거·앙상블과 함께 사람 점수/비고 입력창이 펼쳐집니다
                                  </span>
                                </div>
                                <div style={{fontSize:10,color:'var(--text-secondary)',marginBottom:10,lineHeight:1.5}}>
                                  <span style={{color:'#dc2626'}}>●</span> force_t3 · <span style={{color:'#b91c1c'}}>⚠</span> 신뢰도≤2 · 사람 점수 수정 시 AI 점수와 다르면 주황색 강조
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                  {flatItems.map(it => {
                                    const hitlRow = hitlByNum.get(Number(it.item_number));
                                    const statusKey = (hitlRow?.status) || "pending";
                                    const statusInfo = REVIEW_STATUS_LABELS[statusKey] || REVIEW_STATUS_LABELS.pending;
                                    const humanScore = hitlRow?.human_score;
                                    const humanDiff = humanScore != null && Number(humanScore) !== Number(it.score);
                                    return (
                                      <details
                                        key={it._k}
                                        style={{
                                          background: it.force_t3 ? 'rgba(239,68,68,0.05)' : '#fdfaf2',
                                          border:'1px solid ' + (it.force_t3 ? '#fca5a5' : '#e5d8c3'),
                                          borderRadius:4,padding:0,
                                        }}
                                        onToggle={e => {
                                          if (e.target.open) {
                                            setEditingItemNumber(Number(it.item_number));
                                            setInlineScore(humanScore != null ? String(humanScore) : "");
                                            setInlineNote(hitlRow?.human_note || "");
                                          }
                                        }}
                                      >
                                        <summary style={{padding:'8px 12px',cursor:'pointer',fontSize:11,fontWeight:600,color:'#4a3f35',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                                          <span style={{fontWeight:700}}>
                                            {it.force_t3 && <span style={{color:'#dc2626',marginRight:2}}>●</span>}
                                            #{it.item_number}
                                          </span>
                                          <span>{it.item || it.item_name || '-'}</span>
                                          <span style={{color:'var(--text-secondary)',fontWeight:400}}>· {it.category}</span>
                                          <span style={{marginLeft:'auto',fontSize:12,fontWeight:800,color:'#1e3a8a'}}>
                                            AI {it.score}/{it.max_score}
                                          </span>
                                          <span style={{
                                            fontSize:12,fontWeight:800,
                                            color: humanScore == null ? 'var(--text-secondary)' : (humanDiff ? '#ea580c' : '#166534'),
                                            padding:'0 4px',
                                          }}>
                                            사람 {humanScore ?? '—'}
                                          </span>
                                          {it.confidence?.final != null && (
                                            <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:8,background: it.confidence.final <= 2 ? '#fee2e2' : '#dbeafe', color: it.confidence.final <= 2 ? '#b91c1c' : '#1d4ed8'}}>
                                              신뢰도 {it.confidence.final}/5
                                            </span>
                                          )}
                                          <span style={{
                                            fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:10,
                                            background:statusInfo.bg,color:statusInfo.color,whiteSpace:'nowrap',
                                          }}>{statusInfo.label}</span>
                                        </summary>
                                        <div style={{padding:'10px 14px',borderTop:'1px dashed #e5d8c3',display:'flex',flexDirection:'column',gap:10,fontSize:11}}>
                                          {it.judgment && (
                                            <div>
                                              <div style={{fontSize:10,fontWeight:700,color:'#6b5b48',marginBottom:3}}>LLM 판정 사유 (judgment)</div>
                                              <div style={{color:'#4a3f35',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{it.judgment}</div>
                                            </div>
                                          )}
                                          {Array.isArray(it.deductions) && it.deductions.length > 0 && (
                                            <div>
                                              <div style={{fontSize:10,fontWeight:700,color:'#b91c1c',marginBottom:3}}>감점 사유</div>
                                              <ul style={{margin:0,paddingLeft:18,color:'#4a3f35',lineHeight:1.5}}>

                          {/* ─── Raw JSON ─── */}
