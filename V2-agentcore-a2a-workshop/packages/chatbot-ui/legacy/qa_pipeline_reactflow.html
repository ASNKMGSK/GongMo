/* tenant_config drawer 에서 AWS 리소스 상태를 fetch — serverUrl 필요 */
function useAwsResources(nodeId, tenantId, serverUrl) {
  const [state, setState] = useState({ loading: false, data: null, error: null });
  useEffect(() => {
    if (nodeId !== "tenant_config" || !serverUrl) {
      setState({ loading: false, data: null, error: null });
      return;
    }
    let cancel = false;
    setState({ loading: true, data: null, error: null });
    const url = `${serverUrl}/v2/aws-resources?tenant_id=${encodeURIComponent(tenantId || "generic")}`;
    fetch(url, { method: "GET" })
      .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
      .then(d => { if (!cancel) setState({ loading: false, data: d, error: null }); })
      .catch(e => { if (!cancel) setState({ loading: false, data: null, error: e.message || String(e) }); });
    return () => { cancel = true; };
  }, [nodeId, tenantId, serverUrl]);
  return state;
}

/* App-level AWS RAG readiness gate.
   평가 실행 전 tenant_config 의 핵심 리소스가 모두 연동되어야 true.
   REQUIRED: qa-golden-set (docs>0), qa-reasoning-index (docs>0) — 현재 tenant 기준. */
const REQUIRED_AOSS_INDEXES = ["qa-golden-set", "qa-reasoning-index"];

function computeAwsRagReady(awsData) {
  if (!awsData || !awsData.connected) return { ready: false, reason: "AWS 미연결" };
  const idxs = (awsData.aoss && awsData.aoss.indexes) || [];
  const missing = [];
  for (const name of REQUIRED_AOSS_INDEXES) {
    const it = idxs.find(x => x.name === name);
    if (!it) { missing.push(`${name} 정보 없음`); continue; }
    if (!it.exists) { missing.push(`${name} 인덱스 미생성`); continue; }
    if ((it.doc_count || 0) <= 0) { missing.push(`${name} 문서 0건`); continue; }
  }
  if (missing.length > 0) {
    return { ready: false, reason: missing.join(" · ") };
  }
  // backend 가 aoss 가 아니어도 준비는 된 것. 하지만 gating 경고는 다른 곳에서.
  return { ready: true, reason: null };
}

function useAwsRagGate(serverUrl, tenantId) {
  const [state, setState] = useState({ loading: false, data: null, error: null });
  useEffect(() => {
    if (!serverUrl || !tenantId) {
      setState({ loading: false, data: null, error: null });
      return;
    }
    let cancel = false;
    setState(s => ({ ...s, loading: true }));
    const url = `${serverUrl}/v2/aws-resources?tenant_id=${encodeURIComponent(tenantId)}`;
    fetch(url, { method: "GET" })
      .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
      .then(d => { if (!cancel) setState({ loading: false, data: d, error: null }); })
      .catch(e => { if (!cancel) setState({ loading: false, data: null, error: e.message || String(e) }); });
    return () => { cancel = true; };
  }, [serverUrl, tenantId]);
  const check = computeAwsRagReady(state.data);
  return {
    ...state,
    ready: check.ready,
    reason: check.reason,
  };
}

/* RAG Admin 탭 — AOSS 인덱스 상태 조회 + bootstrap 빌드 SSE 진행도 표시. */
function RagAdminPanel({ serverUrl }) {
  const [status, setStatus] = useState({ loading: true, data: null, error: null });
  const [buildLogs, setBuildLogs] = useState([]);
  const [building, setBuilding] = useState(false);
  const [selectedTenant, setSelectedTenant] = useState("");
  const [recreate, setRecreate] = useState(false);
  // progress[tenant][kind] = { total, current, fail, status }
  const [progress, setProgress] = useState({});
  const abortRef = useRef(null);

  const fetchStatus = useCallback(async () => {
    if (!serverUrl) return;
    setStatus(s => ({ ...s, loading: true, error: null }));
    try {
      const r = await fetch(`${serverUrl}/v2/rag/status`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      setStatus({ loading: false, data, error: null });
    } catch (e) {
      setStatus({ loading: false, data: null, error: e.message || String(e) });
    }
  }, [serverUrl]);

  useEffect(() => { fetchStatus(); }, [fetchStatus]);

  const triggerBuild = useCallback(async (overrides) => {
    if (!serverUrl || building) return;
    const tgtTenant = (overrides && overrides.tenant !== undefined) ? overrides.tenant : selectedTenant;
    const tgtRecreate = (overrides && overrides.recreate !== undefined) ? overrides.recreate : recreate;
    // 단일 tenant 빌드는 자동으로 clean_tenant=true (delete_by_query 시도 → 다른 tenant 보존)
    const tgtCleanTenant = (overrides && overrides.clean_tenant !== undefined) ? overrides.clean_tenant : !!tgtTenant;
    setBuilding(true);
    setProgress({}); // 새 빌드 시 이전 progress 초기화
    setBuildLogs([{ ts: Date.now(), kind: "start",
      text: `🚀 bootstrap 시작 — tenant=${tgtTenant || "ALL"}, recreate=${tgtRecreate}, clean_tenant=${tgtCleanTenant}` }]);
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    try {
      const r = await fetch(`${serverUrl}/v2/rag/build`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          tenant: tgtTenant || undefined,
          recreate: tgtRecreate,
          clean_tenant: tgtCleanTenant,
        }),
        signal: ctrl.signal,
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop() || "";
        for (const evt of events) {
          const lines = evt.split("\n");
          let event = "log", data = "";
          for (const ln of lines) {
            if (ln.startsWith("event: ")) event = ln.slice(7).trim();
            else if (ln.startsWith("data: ")) data += ln.slice(6);
          }
          let payload = {};
          try { payload = JSON.parse(data); } catch {}
          const lineText = payload.line || payload.message || JSON.stringify(payload);
          // PROGRESS 라인 파싱: "PROGRESS tenant=X kind=Y total=N current=M ..."
          if (typeof lineText === "string" && lineText.startsWith("PROGRESS ")) {
            const kv = {};
            lineText.slice(9).split(/\s+/).forEach(tok => {
              const [k, v] = tok.split("=");
              if (k) kv[k] = v;
            });
            const t = kv.tenant, k = kv.kind;
            if (t && k) {
              setProgress(prev => {
                const next = { ...prev };
                next[t] = { ...(next[t] || {}) };
                next[t][k] = {
                  total: Number(kv.total || 0),
                  current: Number(kv.current || 0),
                  fail: Number(kv.fail || 0),
                  status: kv.status || "indexing",
                };
                return next;
              });
            }
            // PROGRESS 라인은 별도 표시 안 함 (progress bar 로 대체)
          } else {
            setBuildLogs(prev => [...prev, { ts: Date.now(), kind: event, text: lineText }]);
          }
          if (event === "done") {
            setBuildLogs(prev => [...prev, { ts: Date.now(), kind: "summary",
              text: `✅ 완료 — return_code=${payload.return_code} ok=${payload.ok}` }]);
            // 빌드 끝나면 status 재조회
            setTimeout(fetchStatus, 800);
          }
        }
      }
    } catch (e) {
      setBuildLogs(prev => [...prev, { ts: Date.now(), kind: "error", text: `❌ ${e.message}` }]);
    } finally {
      setBuilding(false);
      abortRef.current = null;
    }
  }, [serverUrl, building, selectedTenant, recreate, fetchStatus]);

  // 테넌트 버튼: 직접 호출용 (clean_tenant 자동 활성)

  const abortBuild = useCallback(() => {

  const data = status.data;

  return (

          <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 10, color: "var(--text-primary)" }}>

          </div>
          {Object.keys(progress).length === 0 ? (

                  ].map(({ key, label, color }) => {
                    const p = kinds[key];
                    if (!p) {
                      return (
                        <div key={key} style={{ marginBottom: 8, fontSize: 10, color: "#9ca3af" }}>

                    }

                    const barColor = isDone ? "#10b981" : color;
                    return (
                      <div key={key} style={{ marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, marginBottom: 3 }}>
                          <span style={{ fontWeight: 600 }}>
                            {label}
                            {p.fail > 0 && <span style={{ marginLeft: 6, color: "#dc2626" }}>(실패 {p.fail})</span>}
                          </span>
                          <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700,
                            color: isDone ? "#166534" : "var(--text-primary)" }}>
                            {p.current} / {p.total} {isDone && "✓"}
                          </span>
                        </div>
                        <div style={{ position: "relative", height: 10, background: "#e5e7eb", borderRadius: 5, overflow: "hidden" }}>
                          <div style={{
                            position: "absolute", top: 0, left: 0, height: "100%",
                            width: `${pct}%`, background: barColor,
                            transition: "width 0.3s ease",
                          }} />
                          <div style={{
                            position: "absolute", top: 0, left: 0, right: 0, height: "100%",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: 9, fontWeight: 700, color: pct > 50 ? "white" : "#374151",
                          }}>
                            {pct}%
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* 빌드 로그 */}
      {buildLogs.length > 0 && (
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>📜 빌드 로그</div>
          <div style={{ maxHeight: 400, overflow: "auto", padding: 12, background: "#0f172a", color: "#e2e8f0", fontSize: 11, fontFamily: "ui-monospace, SFMono-Regular, monospace", borderRadius: 4, lineHeight: 1.6 }}>
            {buildLogs.map((l, i) => {
              const color = l.kind === "error" ? "#fca5a5"
                : l.kind === "done" || l.kind === "summary" ? "#86efac"
                : l.kind === "start" ? "#93c5fd" : "#cbd5e1";
              return (
                <div key={i} style={{ color, marginBottom: 1 }}>
                  <span style={{ color: "#64748b", marginRight: 8 }}>[{new Date(l.ts).toLocaleTimeString()}]</span>
                  {l.text}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* RAG 유사도 배지 — RRF 기반 단일 지표 (0~100%).
 *
 * Primary: RRF (Reciprocal Rank Fusion) score 를 이론 최댓값(2/61 ≈ 0.033) 대비 %.
 * RRF 는 BM25 rank + KNN rank 의 융합 순위 점수 — 두 retrieval 방식 합의 강도.
 *
 * 기준:
 *   ≥ 70% → 강함 (양쪽 모두 상위권)
 *   ≥ 40% → 보통 (한쪽만 상위권)
 *   < 40% → 약함 (순위 밀림)
 *
 * tooltip 에 cosine/BM25 raw 값 병기 (참고용).
 * `value` prop = legacy (similarity = RRF).
 */
function SimilarityBadge({ value, cosine, bm25, rrf, bm25Rank, knnRank }) {
  const RRF_MAX = 2 / 61;
  // RRF 를 primary 로 사용 — 없으면 legacy value (= RRF 로 추정)
  const rrfRaw = (rrf !== undefined && rrf !== null && !isNaN(Number(rrf)))
    ? Number(rrf)
    : (value !== undefined && value !== null && !isNaN(Number(value)) ? Number(value) : null);
  if (rrfRaw === null) return null;

  const pct = Math.max(0, Math.min(100, (rrfRaw / RRF_MAX) * 100));
  const lvl = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
  const c = {
    high: { bg:'#dcfce7', fg:'#166534', dot:'#10b981', label:'강함' },
    mid:  { bg:'#fef3c7', fg:'#92400e', dot:'#f59e0b', label:'보통' },
    low:  { bg:'#fecaca', fg:'#991b1b', dot:'#ef4444', label:'약함' },
  }[lvl];

  const tipLines = [
    `RAG 유사도 ${pct.toFixed(0)}% · ${c.label}`,
    `RRF 점수 ${rrfRaw.toFixed(4)} / 최대 ${RRF_MAX.toFixed(4)}`,
    '(BM25 + KNN 하이브리드 융합 지표)',
    '',
  ];
  if (cosine !== undefined && cosine !== null && !isNaN(Number(cosine))) {
    tipLines.push(`· cosine: ${Number(cosine).toFixed(3)} (Titan Embed v2)`);
  }
  if (bm25 !== undefined && bm25 !== null && !isNaN(Number(bm25))) {
    tipLines.push(`· BM25 raw: ${Number(bm25).toFixed(1)} (키워드 매칭)`);
  }
  if (bm25Rank !== undefined && bm25Rank !== null) tipLines.push(`· BM25 rank: ${bm25Rank + 1}위`);
  if (knnRank !== undefined && knnRank !== null) tipLines.push(`· KNN rank: ${knnRank + 1}위`);
  tipLines.push('');
  tipLines.push('기준: ≥70% 강함 · ≥40% 보통 · <40% 약함');

  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      fontSize:10, fontWeight:700, padding:'3px 9px', borderRadius:12,
      background:c.bg, color:c.fg, cursor:'help',
    }} title={tipLines.join('\n')}>
      <span style={{width:6,height:6,borderRadius:'50%',background:c.dot}}></span>
      유사도 {pct.toFixed(0)}% · {c.label}
    </span>
  );
}

function NodeDrawer({ nodeId, nodeStates, nodeTimings, nodeScores, result, streamingItems, nodeErrors, onClose, backend, modelLabel, tenantId, serverUrl, awsSharedState, gtScores, personaMode }) {
  // 앱 레벨 awsGate 가 넘어오면 그걸 우선 사용 (중복 fetch 방지).
  // fallback: drawer 가 스스로 fetch (standalone 모드).
  const localState = useAwsResources(nodeId, tenantId, (awsSharedState && awsSharedState.data) ? null : serverUrl);
  const awsState = (awsSharedState && (awsSharedState.data || awsSharedState.loading || awsSharedState.error))
    ? awsSharedState
    : localState;
  // per-item persona breakdown 토글 상태 — item_number 를 key 로 Set 관리.
  const [expandedPersonaItems, setExpandedPersonaItems] = React.useState(() => new Set());
  const togglePersonaItem = React.useCallback((num) => {
    setExpandedPersonaItems(prev => {
      const next = new Set(prev);
      if (next.has(num)) next.delete(num); else next.add(num);
      return next;
    });
  }, []);
  if (!nodeId) return null;
  const def = NODE_DEFS[nodeId];
  // modelLabel prop 우선 (비교 탭은 컬럼별 실제 선택 모델명 전달). fallback 은 backend 기반 하드코딩(단일 탭 기본).
  const backendLabel = modelLabel || (backend === "sagemaker" ? "Qwen3-8B" : backend === "bedrock" ? "Sonnet 4.6" : null);
  const state = nodeStates[nodeId] || "pending";
  const timing = nodeTimings[nodeId];
  const items = NODE_ITEMS[nodeId] || [];
  const rp = result?.report || result || {};
  const report = rp.report || rp;
  // 최종 리포트가 나오기 전에도 streamingItems (실시간 부분 결과) 로 점수 표시.
  // 우선순위: 최종 리포트의 item_scores > 실시간 streamingItems > 빈 배열
  const reportItems = report.item_scores || [];
  const itemScores = reportItems.length > 0 ? reportItems : (streamingItems || []);
  const deductions = report.deductions || [];
  // 이 노드의 에러 정보 (error_info 배열: [{item_number, item_name, error_type, error_message}])
  const thisNodeErrors = (nodeErrors && nodeErrors[nodeId]) || [];

  const nodeDeductions = deductions.filter(d => items.includes(d.item_number || d.item));

  return (
    <>
      <div className={`drawer-overlay ${nodeId ? "open" : ""}`} onClick={onClose} />
      <div className={`drawer ${nodeId ? "open" : ""}`} data-testid="node-drawer" data-backend={backend || ""}>
        <div className="drawer-header">
          <div>
            <div className="drawer-title">
              {def.label}
              {backendLabel && (
                <span
                  className="compare-badge"
                  data-backend={backend}
                  data-testid="drawer-backend-badge"
                  style={{ marginLeft: 8, fontSize: 10, padding: "2px 8px" }}

                        <span className={`node-confidence-chip ${cls}`}
                          style={{position:'static',display:'inline-flex',marginLeft:6,fontSize:9,padding:'1px 6px'}}>
                          <span className="conf-dot"></span>conf {Number(cFinal).toFixed(1)}
                        </span>
                      );
                    }
                  }

                  // per-item persona 뱃지 — 합의/충돌/판사 경로를 한 눈에
                  let personaIndicator = null;
                  if (found && found.persona_votes && typeof found.persona_votes === "object") {
                    const pv = found.persona_votes;
                    const nSuccess = ["strict", "neutral", "loose"].filter(p => pv[p] !== undefined && pv[p] !== null).length;
                    const spread = Number(found.persona_step_spread ?? 0);
                    const isJudge = found.persona_merge_path === "judge";
                    const isSingle = found.persona_merge_path === "single";
                    if (isSingle) {
                      personaIndicator = (
                        <span style={{
                          display:'inline-flex', alignItems:'center', gap:4, marginLeft:6,
                          fontSize:9, fontWeight:700,
                          padding:'1px 6px', borderRadius:8,
                          background:'#dbeafe', color:'#1e3a8a',
                        }} title="Single 모드 · Neutral 1명 판정">
                          N
                        </span>
                      );
                    } else {
                      personaIndicator = (
                        <span style={{
                          display:'inline-flex', alignItems:'center', gap:4, marginLeft:6,
                          fontSize:9, fontWeight:700,
                          padding:'1px 6px', borderRadius:8,
                          background: isJudge ? '#ede9fe' : spread >= 2 ? '#fed7aa' : spread === 0 ? '#dcfce7' : '#e0e7ff',
                          color: isJudge ? '#5b21b6' : spread >= 2 ? '#9a3412' : spread === 0 ? '#166534' : '#3730a3',
                        }}
                        title={`${nSuccess}/3 persona · spread ${spread}${isJudge ? ' · 판사 경로' : ''}`}>
                          {isJudge ? '🎭' : spread === 0 ? '✓' : '⚠'} {nSuccess}/3
                        </span>
                      );
                    }
                  }

                  // GT 점수 병기 (있을 때만)
                  const gtItem = (gtScores && Array.isArray(gtScores.items))
                    ? gtScores.items.find(g => g.item_number === num)
                    : null;
                  const aiScore = found ? (found.score ?? found.awarded ?? 0) : null;
                  const aiMax = found ? (found.max_score ?? found.max ?? '?') : '?';
                  const gtScore = gtItem ? gtItem.score : null;
                  const scoreMatch = (gtScore !== null && aiScore !== null)
                    ? (Number(gtScore) === Number(aiScore)) : null;

                  return (
                    <div key={num} className="drawer-info-row">
                      <span className="drawer-info-label">
                        Item {num}
                        {errForItem && (
                          <span style={{
                            marginLeft:6,fontSize:9,fontWeight:700,color:'white',
                            background:'var(--red)',padding:'1px 6px',borderRadius:8,
                          }}>⚠ 에러</span>
                        )}
                        {confDisplay}
                        {personaIndicator}
                      </span>
                      <span className="drawer-info-value" style={errForItem ? {color:'var(--red)'} : {}}>
                        {found ? (
                          <>
                            <span title="AI 최종 점수">AI <b>{aiScore}</b>/{aiMax}</span>
                            {gtItem && (
                              <span style={{
                                marginLeft:6, fontSize:10, fontWeight:700,
                                padding:'1px 6px', borderRadius:8,
                                background: scoreMatch === true ? '#dcfce7'
                                          : scoreMatch === false ? '#fee2e2' : '#f3f4f6',
                                color: scoreMatch === true ? '#166534'
                                     : scoreMatch === false ? '#991b1b' : '#4b5563',
                              }} title={gtItem.note || '수기 QA 비고 없음'}>
                                수기 QA <b>{gtScore ?? '?'}</b>/{gtItem.max_score ?? '?'}
                                {scoreMatch === true ? ' ✓' : scoreMatch === false ? ` (Δ${Number(aiScore) - Number(gtScore)})` : ''}
                              </span>
                            )}
                          </>
                        ) : (gtItem ? (
                          <span style={{fontSize:10, color:'var(--text-secondary)'}}>
                            수기 QA <b>{gtScore ?? '?'}</b>/{gtItem.max_score ?? '?'}
                          </span>
                        ) : '--')}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* ─────────────────────────────────────────────────────────────
             Ensemble 전용 평가자 상세 섹션.
             - Single persona 에이전트 (greeting / listening_comm / privacy) 는 숨김.
             - 완료: 최종 결과는 이미 Evaluated Items 에 있으므로, 여기서는 "각 평가자별
               판정 상세" 를 토글 형식으로 접을 수 있게 제공.
             - 실행 중: 3 persona 대기 placeholder.
             ───────────────────────────────────────────────────────────── */}
          {items.length > 0 && (() => {
            const isRunning = state === "active" || state === "running" || state === "pending";
            const subAgentIds = ["greeting","listening_comm","language","needs",
                                 "explanation","proactiveness","work_accuracy","privacy"];
            const isSubAgent = subAgentIds.includes(nodeId);
            if (!isSubAgent) return null;

            // 에이전트별 단일 persona 여부 — 싱글 에이전트는 이 섹션 전부 숨김.
            const SINGLE_PERSONA_AGENTS = new Set([
              "greeting", "listening_comm", "privacy",
            ]);
            const isSingleAgent = SINGLE_PERSONA_AGENTS.has(nodeId);
            if (isSingleAgent) return null;

            const personaItems = items
              .map(num => ({ num, it: itemScores.find(it => (it.item_number || it.item) === num) }))
              .filter(x => x.it && x.it.persona_votes && typeof x.it.persona_votes === "object");

            // 실행 중 + persona 데이터 미도착 시 placeholder 만 표시
            if (personaItems.length === 0 && !isRunning) return null;
            if (personaItems.length === 0 && isRunning) {
              const PERSONA_META_RUN = [
                { key: "strict",  label: "품격",     ko: "응대·경청", bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" },
                { key: "neutral", label: "정확성",   ko: "업무·팩트", bg: "#dbeafe", color: "#1e3a8a", border: "#93c5fd" },
                { key: "loose",   label: "고객경험", ko: "적극·만족", bg: "#dcfce7", color: "#166534", border: "#86efac" },
              ];
              const runMetas = PERSONA_META_RUN;
              const gridCols = 'repeat(3, 1fr)';
              const runLabel = '— 3 persona 병렬 호출 중';
              const chipLabel = '⏳ 3 persona 병렬 호출 중';
              return (
                <div className="drawer-section">
                  <div className="drawer-section-title">
                    3-Persona 실행 상세
                    <span style={{fontSize:10, fontWeight:500, color:'var(--text-secondary)', marginLeft:6}}>
                      {runLabel}
                    </span>
                  </div>
                  {items.map(num => (
                    <div key={num} style={{
                      marginBottom: 10, padding: 10,
                      background: '#f9fafb', border: '1px solid rgba(0,0,0,0.08)',
                      borderRadius: 6,
                    }}>
                      <div style={{
                        display:'flex', alignItems:'center', gap:8,
                        marginBottom: 8, flexWrap:'wrap',
                      }}>
                        <span style={{fontSize:12, fontWeight:800, color:'#1f2937'}}>
                          #{num} {ITEM_NAMES[num] || `Item ${num}`}
                        </span>
                        <span style={{
                          fontSize:10, fontWeight:700,
                          padding:'1px 6px', borderRadius:8,
                          background:'#fef3c7', color:'#92400e',
                        }}>{chipLabel}</span>
                      </div>
                      <div style={{
                        display:'grid', gridTemplateColumns: gridCols, gap:6,
                      }}>
                        {runMetas.map(p => (
                          <div key={p.key} style={{
                            padding:'6px 8px', borderRadius:5,
                            background: p.bg, border: `1px solid ${p.border}`,
                            position:'relative', overflow:'hidden',
                          }}>
                            <div style={{
                              display:'flex', alignItems:'center', justifyContent:'space-between',
                              marginBottom: 3,
                            }}>
                              <span style={{fontSize:10, fontWeight:800, color: p.color, letterSpacing:0.3}}>
                                {p.label}
                              </span>
                              <span style={{fontSize:9, color: p.color, opacity:0.7}}>{p.ko}</span>
                            </div>
                            <div style={{
                              fontSize:11, fontWeight:700, color: p.color,
                              lineHeight:1.1, display:'flex', alignItems:'center', gap:4,
                            }}>
                              <span className="persona-spinner" style={{
                                display:'inline-block', width:10, height:10, borderRadius:'50%',
                                border:`2px solid ${p.color}`, borderTopColor:'transparent',
                                animation:'persona-spin 0.8s linear infinite',
                              }}></span>
                              대기
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              );
            }

            const PERSONA_META = [
              { key: "strict",  label: "Strict",  ko: "엄격", bg: "#fee2e2", color: "#991b1b", border: "#fca5a5" },
              { key: "neutral", label: "Neutral", ko: "중립", bg: "#dbeafe", color: "#1e3a8a", border: "#93c5fd" },
              { key: "loose",   label: "Loose",   ko: "관대", bg: "#dcfce7", color: "#166534", border: "#86efac" },
            ];

            return (
              <div className="drawer-section">
                <div className="drawer-section-title">
                  3-Persona 실행 상세
                  <span style={{fontSize:10, fontWeight:500, color:'var(--text-secondary)', marginLeft:6}}>
                    — 이 Sub Agent 안에서 돌아간 평가자 3명의 개별 점수
                  </span>
                </div>

                {personaItems.map(({ num, it }) => {
                  const pv = it.persona_votes || {};
                  const pd = it.persona_details || {};
                  const merged = Number(it.score ?? 0);
                  const maxScore = it.max_score || STT_MAX_SCORES[num] || null;
                  const spread = Number(it.persona_step_spread ?? 0);
                  const mergePath = it.persona_merge_path || "stats";
                  const mergeRule = it.persona_merge_rule || null;
                  const isJudge = mergePath === "judge";
                  const mhr = !!it.mandatory_human_review;
                  const judgeReasoning = it.judge_reasoning || null;
                  const itemName = ITEM_NAMES[num] || `Item ${num}`;
                  const isExpanded = expandedPersonaItems.has(num);

                  // 최종 결과 (neutral 대표 판정 = ItemVerdict 의 judgment/deductions/evidence)
                  const finalJudgment = it.judgment || it.summary || '';
                  const finalDeductions = Array.isArray(it.deductions) ? it.deductions : [];
                  const finalEvidence = Array.isArray(it.evidence) ? it.evidence : [];

                  return (
                    <div key={num} style={{
                      marginBottom: 10, padding: 10,
                      background: '#f9fafb', border: '1px solid rgba(0,0,0,0.08)',
                      borderRadius: 6,
                    }}>
                      {/* 항목 헤더 — 최종 점수 + 머지 경로 뱃지 */}
                      <div style={{
                        display:'flex', alignItems:'center', gap:8,
                        marginBottom: 8, flexWrap:'wrap',
                      }}>
                        <span style={{fontSize:12, fontWeight:800, color:'#1f2937'}}>
                          #{num} {itemName}
                        </span>
                        <span style={{fontSize:11, color:'var(--text-secondary)'}}>
                          최종: <b style={{color:'#111827', fontSize:13}}>{merged}{maxScore ? ` / ${maxScore}` : ''}</b>
                        </span>
                        {isJudge ? (
                          <span style={{
                            fontSize:10, fontWeight:700,
                            padding:'1px 6px', borderRadius:8,
                            background:'#ede9fe', color:'#5b21b6',
                            border:'1px solid rgba(124,58,237,0.3)',
                          }}>🎭 판사 숙고</span>
                        ) : (
                          <span style={{
                            fontSize:10, fontWeight:700,
                            padding:'1px 6px', borderRadius:8,
                            background: spread === 0 ? '#dcfce7' : spread <= 1 ? '#e0e7ff' : '#fed7aa',
                            color: spread === 0 ? '#166534' : spread <= 1 ? '#3730a3' : '#9a3412',
                          }}>
                            {spread === 0 ? '✓ 3명 합의' : `통계 머지 · spread ${spread}`}
                            {mergeRule ? ` (${mergeRule})` : ''}
                          </span>
                        )}
                        {mhr && (
                          <span style={{
                            fontSize:10, fontWeight:800,
                            padding:'1px 6px', borderRadius:8,
                            background:'#fee2e2', color:'#991b1b',
                            marginLeft:'auto',
                          }}>⚠ 검수 필요</span>
                        )}
                      </div>

                      {/* ───── 최종 결과 (판단 / 감점 / 인용) ───── */}
                      {(finalJudgment || finalDeductions.length || finalEvidence.length) && (
                        <div style={{
                          padding:'6px 8px', marginBottom:8,
                          background:'white', border:'1px solid rgba(0,0,0,0.08)',
                          borderLeft:'3px solid #111827',
                          borderRadius:3, fontSize:10.5, lineHeight:1.5,
                        }}>
                          {finalJudgment && (
                            <div style={{color:'#1f2937', marginBottom: finalDeductions.length ? 4 : 0}}>
                              <b>최종 판단:</b> {finalJudgment}
                            </div>
                          )}
                          {finalDeductions.length > 0 && (
                            <div style={{marginTop:2, marginBottom: finalEvidence.length ? 4 : 0}}>
                              <b style={{fontSize:10}}>감점:</b>
                              <ul style={{margin:'2px 0 0 0', paddingLeft:16, listStyle:'disc'}}>
                                {finalDeductions.slice(0, 5).map((d, i) => (
                                  <li key={i} style={{color:'#374151', marginBottom:1}}>
                                    <span style={{fontWeight:700, color:'#991b1b'}}>
                                      -{d.points || 0}점
                                    </span>
                                    {' · '}{d.reason || ''}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}
                          {finalEvidence.length > 0 && (
                            <div style={{marginTop:2}}>
                              <b style={{fontSize:10}}>인용:</b>
                              <ul style={{margin:'2px 0 0 0', paddingLeft:16, listStyle:'"— "'}}>
                                {finalEvidence.slice(0, 3).map((e, i) => (
                                  <li key={i} style={{color:'#4b5563', marginBottom:1, fontStyle:'italic'}}>
                                    {e.speaker && <span style={{fontWeight:700, fontStyle:'normal', marginRight:3}}>[{e.speaker}]</span>}
                                    "{e.quote || e.text || ''}"
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}
                        </div>
                      )}

                      {/* ───── 판사 숙고 근거 (있을 때만) ───── */}
                      {isJudge && judgeReasoning && (
                        <div style={{
                          marginTop:4, marginBottom: 8, padding:'6px 10px',
                          background:'#ede9fe', borderLeft:'3px solid #7c3aed',
                          borderRadius:3, fontSize:11, lineHeight:1.5,
                          color:'#4c1d95',
                        }}>
                          <span style={{fontWeight:800, marginRight:4}}>🎭 판사 숙고:</span>
                          {judgeReasoning}
                        </div>
                      )}

                      {/* ───── 평가자 3명 판정 상세 토글 ───── */}
                      {Object.keys(pv).length > 0 && (
                        <>
                          <button
                            type="button"
                            onClick={() => togglePersonaItem(num)}
                            style={{
                              width:'100%', padding:'5px 8px',
                              background: isExpanded ? '#eef2ff' : '#f3f4f6',
                              border:'1px solid rgba(0,0,0,0.08)',
                              borderRadius:4, cursor:'pointer',
                              display:'flex', alignItems:'center', gap:6,
                              fontSize:10.5, fontWeight:700,
                              color: isExpanded ? '#3730a3' : '#4b5563',
                              transition:'background 0.15s',
                            }}
                          >
                            <span style={{
                              display:'inline-block', transition:'transform 0.15s',
                              transform: isExpanded ? 'rotate(90deg)' : 'rotate(0deg)',
                            }}>▸</span>
                            <span>각 평가자별 판정 상세 (품격 · 정확성 · 고객경험)</span>
                            <span style={{
                              marginLeft:'auto', fontSize:9, fontWeight:600,
                              color:'var(--text-secondary)',
                            }}>
                              {Object.keys(pv).length}/3 평가자
                            </span>
                          </button>

                          {isExpanded && (
                            <div style={{marginTop:8}}>
                              {/* 3-persona 점수 카드 row */}
                              <div style={{
                                display:'grid', gridTemplateColumns:'repeat(3, 1fr)',
                                gap:6, marginBottom:8,
                              }}>
                                {PERSONA_META.map(p => {
                                  const rawVote = pv[p.key];
                                  const hasVote = rawVote !== undefined && rawVote !== null;
                                  const score = hasVote ? Number(rawVote) : null;
                                  const isMerged = hasVote && score === merged;
                                  return (
                                    <div key={p.key} style={{
                                      padding:'6px 8px', borderRadius:5,
                                      background: hasVote ? p.bg : '#f3f4f6',
                                      border: `1px solid ${hasVote ? p.border : 'rgba(0,0,0,0.08)'}`,
                                      opacity: hasVote ? 1 : 0.55,
                                      outline: isMerged ? `2px solid ${p.color}` : 'none',
                                      outlineOffset: isMerged ? 1 : 0,
                                    }}>
                                      <div style={{
                                        display:'flex', alignItems:'center', justifyContent:'space-between',
                                        marginBottom: 3,
                                      }}>
                                        <span style={{fontSize:10, fontWeight:800, color: p.color, letterSpacing:0.3}}>
                                          {p.label}
                                        </span>
                                        <span style={{fontSize:9, color: p.color, opacity:0.7}}>{p.ko}</span>
                                      </div>
                                      <div style={{
                                        fontSize:14, fontWeight:800,
                                        color: hasVote ? p.color : '#9ca3af',
                                        lineHeight:1.1,
                                      }}>
                                        {hasVote ? (
                                          <>
                                            {score}
                                            {maxScore ? (
                                              <span style={{fontSize:10, fontWeight:500, opacity:0.7}}>
                                                {' '}/ {maxScore}
                                              </span>
                                            ) : null}
                                            {isMerged && (
                                              <span style={{
                                                fontSize:8, fontWeight:700, marginLeft:4,
                                                padding:'1px 4px', borderRadius:6,
                                                background:'white', color: p.color,
                                              }}>✓ 채택</span>
                                            )}
                                          </>
                                        ) : (
                                          <span style={{fontSize:10, fontWeight:600}}>호출 실패</span>
                                        )}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>

                              {/* per-persona 판정 상세 (judgment/deductions/evidence) */}
                              {Object.keys(pd).length > 0 && PERSONA_META.filter(p => pd[p.key]).map(p => {
                                const det = pd[p.key] || {};
                                const judg = det.judgment || det.summary || '';
                                const deducts = Array.isArray(det.deductions) ? det.deductions : [];
                                const evs = Array.isArray(det.evidence) ? det.evidence : [];
                                return (
                                  <div key={p.key} style={{
                                    marginBottom: 6, padding: '6px 8px',
                                    background: 'white',
                                    border: `1px solid ${p.border}`, borderLeft: `3px solid ${p.color}`,
                                    borderRadius: 4, fontSize: 10.5, lineHeight: 1.5,
                                  }}>
                                    <div style={{
                                      display:'flex', alignItems:'center', gap:6, marginBottom: 3,
                                    }}>
                                      <span style={{
                                        fontSize:9, fontWeight:800, color:p.color, letterSpacing:0.3,
                                      }}>{p.label}</span>
                                      <span style={{fontSize:9, color:p.color, opacity:0.65}}>{p.ko}</span>
                                      <span style={{fontSize:9, color:'var(--text-secondary)', marginLeft:'auto'}}>
                                        점수 {det.score ?? '?'}{maxScore ? ` / ${maxScore}` : ''}
                                      </span>
                                    </div>
                                    {judg && (
                                      <div style={{color:'#1f2937', marginBottom: deducts.length ? 4 : 0}}>
                                        <b style={{color:p.color}}>판단:</b> {judg}
                                      </div>
                                    )}
                                    {deducts.length > 0 && (
                                      <div style={{marginTop:2, marginBottom: evs.length ? 4 : 0}}>
                                        <b style={{color:p.color, fontSize:10}}>감점 근거:</b>
                                        <ul style={{margin:'2px 0 0 0', paddingLeft:16, listStyle:'disc'}}>
                                          {deducts.map((d, i) => (
                                            <li key={i} style={{color:'#374151', marginBottom:1}}>
                                              <span style={{fontWeight:700, color:'#991b1b'}}>
                                                -{d.points || 0}점
                                              </span>
                                              {' · '}{d.reason || ''}
                                            </li>
                                          ))}
                                        </ul>
                                      </div>
                                    )}
                                    {evs.length > 0 && (
                                      <div style={{marginTop:2}}>
                                        <b style={{color:p.color, fontSize:10}}>인용:</b>
                                        <ul style={{margin:'2px 0 0 0', paddingLeft:16, listStyle:'"— "'}}>
                                          {evs.map((e, i) => (
                                            <li key={i} style={{color:'#4b5563', marginBottom:1, fontStyle:'italic'}}>
                                              {e.speaker && <span style={{fontWeight:700, fontStyle:'normal', marginRight:3}}>[{e.speaker}]</span>}
                                              "{e.quote || ''}"
                                            </li>
                                          ))}
                                        </ul>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {(() => {
            const hits = aggregateRagHitsByAgent(result, streamingItems)[nodeId];
            if (!hits || (!hits.hasGS && !hits.hasRS && !hits.hasBK)) return null;
            // 평가 항목별 탭 — 백엔드는 item 단위로 RAG 를 분리 호출하므로, 같은 에이전트라도
            // 항목 rubric 이 다르면 조회 결과가 다르다. 드로어에서 항목별로 분리 표시.
            const perItemMap = hits.perItem || {};
            const itemNumsRaw = Object.keys(perItemMap).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
            const multiItem = itemNumsRaw.length > 1;
            return (
              <RagHitsPerItemSection
                hits={hits}
                perItemMap={perItemMap}
                itemNums={itemNumsRaw}
                multiItem={multiItem}
              />
            );
          })()}

          {thisNodeErrors.length > 0 && (
            <div className="drawer-section">
              <div className="drawer-section-title" style={{color:'var(--red)'}}>⚠ Evaluation Errors</div>
              {thisNodeErrors.map((err, i) => (
                <div key={i} style={{
                  marginBottom:10,padding:'10px 12px',
                  background:'rgba(239,68,68,0.06)',
                  border:'1px solid var(--error-border)',
                  borderLeft:'3px solid var(--red)',
                  borderRadius:6,
                }}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--red)',marginBottom:4}}>
                    #{err.item_number} {err.item_name} — {err.error_type || 'Error'}
                  </div>
                  <div style={{fontSize:12,color:'var(--text-primary)',lineHeight:1.5,wordBreak:'break-word'}}>
                    {err.error_message || '알 수 없는 오류'}
                  </div>
                </div>
              ))}
            </div>
          )}

          {nodeDeductions.length > 0 && (
            <div className="drawer-section">
              <div className="drawer-section-title">Deductions</div>
              {nodeDeductions.map((d, i) => (
                <div key={i} style={{marginBottom: 8}}>
                  <div style={{fontSize: 12, fontWeight: 600, color: "var(--red)"}}>
                    Item {d.item_number || d.item}: -{d.deduction || d.points}점
                  </div>
                  <div style={{fontSize: 12, color: "var(--text-secondary)", marginTop: 2}}>
                    {d.reason || d.description || ""}
                  </div>
                  {(d.evidence || d.quote) && (
                    <div className="drawer-evidence">{d.evidence || d.quote}</div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

/* ── 3-Persona Ensemble Components ──────────────────────────
   Strict / Neutral / Loose 3-persona 앙상블 + 판사(Judge) 경로 시각화.
   백엔드 ItemVerdict 에 persona_votes, persona_merge_path, judge_reasoning,
   persona_step_spread, mandatory_human_review 필드가 있을 때만 활성화. */

const PERSONA_ORDER = ["strict", "neutral", "loose"];
const PERSONA_LABELS_KO = { strict: "품격", neutral: "정확성", loose: "고객경험" };

/* 3-persona 막대 차트 — 각 persona 점수와 merged 점수 하이라이트. */
function PersonaBarChart({ personaVotes, merged, maxScore, mergeRule, mergePath, stepSpread }) {
  if (!personaVotes || typeof personaVotes !== "object") return null;
  const max = Math.max(1, maxScore || 10);
  // merged 와 일치하는 persona 를 찾아 하이라이트 대상 결정
  const mergedPersona = PERSONA_ORDER.find(p => personaVotes[p] === merged) || null;

  const spread = Number(stepSpread ?? 0);
  let badge = null;
  if (spread === 0) {
    badge = <span className="persona-badge consensus">합의</span>;
  } else if (spread <= 2) {
    badge = <span className="persona-badge mild-spread">경미한 차이 · spread {spread}</span>;
  } else {
    badge = <span className="persona-badge conflict">의견 충돌 · spread {spread}</span>;
  }

  return (
    <div className="persona-chart">
      <div className="persona-chart-header">
        <span className="persona-chart-title">3-Persona 앙상블</span>
        {badge}
      </div>
      {PERSONA_ORDER.map(p => {
        const raw = personaVotes[p];
        const hasVote = raw !== null && raw !== undefined && !Number.isNaN(Number(raw));
        const numScore = hasVote ? Number(raw) : null;
        const pct = hasVote ? Math.max(2, Math.min(100, (numScore / max) * 100)) : 0;
        const isMerged = hasVote && mergedPersona === p;
        return (
          <div className="persona-row" key={p}>
            <span className={`persona-label ${p}`}>
              <span className="persona-dot"></span>
              {PERSONA_LABELS_KO[p]}
              {p === "neutral" && <span className="persona-default-check" title="기본 평가자">✓</span>}
            </span>
            <div className={`persona-bar-track${isMerged ? " merged" : ""}`}
                 title={isMerged ? `최종 채택된 평가자 (${PERSONA_LABELS_KO[p]})` : PERSONA_LABELS_KO[p]}>
              {hasVote && <div className={`persona-bar-fill ${p}`} style={{width: pct + "%"}}></div>}
            </div>
            <span className={`persona-value${hasVote ? "" : " missing"}`}>
              {hasVote ? numScore : "—"}
            </span>
          </div>
        );
      })}
      <div className="persona-footer">
        <span className="persona-merged-text">
          Merged: <span className="persona-merged-score">{merged} / {maxScore}</span>
        </span>
        {(mergeRule || mergePath) && (
          <span className="persona-merged-path" title={`merge_path: ${mergePath || "—"} · rule: ${mergeRule || "—"}`}>
            경로: {mergeRule || mergePath}
          </span>
        )}
      </div>
    </div>
  );
}

/* 판사 숙고 패널 — persona_merge_path === "judge" 일 때 뱃지 클릭 시 확장.
   현재 백엔드 ItemVerdict 에는 neutral persona 의 judgment/evidence 만 저장됨.
   strict/loose per-persona {judgment, deductions, evidence} 는 미저장 — 2단계 백엔드 보강 필요. */
function JudgePanel({ personaVotes, judgeReasoning, finalScore, maxScore, stepSpread, personaDetails, personaLabelMap }) {
  if (!personaVotes) return null;
  // 익명 라벨 A/B/C — persona 순서 (strict, neutral, loose) 기준
  const anonLabels = ["A", "B", "C"];

  return (
    <div className="judge-panel">
      <div className="judge-panel-header">
        <span style={{fontSize: 14}}>🎭</span>
        판사 숙고 결과
      </div>
      <div className="judge-panel-subtitle">
        의견 충돌 감지 — step_spread: <b>{stepSpread ?? "?"}</b> · 판사 LLM 이 3 평가자 의견을 종합해 최종 결정.
      </div>

      <div className="judge-panel-voter-grid">
        {PERSONA_ORDER.map((p, i) => {
          const raw = personaVotes[p];
          const hasVote = raw !== null && raw !== undefined && !Number.isNaN(Number(raw));
          const details = (personaDetails && personaDetails[p]) || null;
          const personaDisplayLabel = (personaLabelMap && personaLabelMap[p]) || PERSONA_LABELS_KO[p];
          return (
            <div key={p} className={`judge-voter-card ${hasVote ? p : "missing"}`}>
              <div>
                <span className="judge-voter-anon">평가자 {anonLabels[i]}</span>
                <span className="judge-voter-persona">({personaDisplayLabel})</span>
              </div>
              <div className={`judge-voter-score ${p}`}>
                {hasVote ? `${Number(raw)} / ${maxScore}` : "실패 / 누락"}
              </div>
              {details && details.judgment && (
                <div style={{fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.45, marginTop: 4}}>
                  {String(details.judgment).slice(0, 220)}
                  {String(details.judgment).length > 220 && "…"}
                </div>
              )}
              {/* TODO(backend): per-persona judgment/deductions/evidence 는 ItemVerdict 에 persona_details 필드 추가 후 표시 가능 */}
            </div>
          );
        })}
      </div>

      <div className="judge-final-box">
        <div className="judge-final-label">
          <span style={{fontSize: 13}}>⚖️</span> 판사 최종 결정
        </div>
        <div className="judge-final-score">{finalScore} / {maxScore}</div>
        {judgeReasoning ? (
          <div className="judge-final-reasoning">{judgeReasoning}</div>
        ) : (
          <div className="judge-reasoning-missing">
            판사 근거 텍스트가 비어있습니다 — 백엔드 judge 경로 성공 여부 확인 필요
          </div>
        )}
      </div>

      <div className="judge-todo-note">
        ℹ 평가자별 상세 판정(judgment/deductions/evidence) 은 현재 정확성 평가자만 저장됩니다.
        품격/고객경험 평가자의 판정 본문을 UI 에 표시하려면 백엔드 ItemVerdict 에 <code>persona_details</code> 필드 추가 필요.
      </div>
    </div>
  );
}

/* ── Item Card ─────────────────────────────────────────────── */

const ItemCard = React.memo(function ItemCard({ num, name, score, maxScore, scoreColor, borderColor, deds, strs, imps, coaches, evidence, defaultOpen, expandVersion, expandAllTarget, error, judgment, summary, personaVotes, personaMergePath, personaMergeRule, personaStepSpread, judgeReasoning, mandatoryHumanReview, personaDetails, personaLabelMap, editMode, forceT3, aiConfidence, consultationId, serverUrl, pushToast, humanConfirmed, humanConfirmedScore, onHumanSaved }) {
  const [open, setOpen] = useState(defaultOpen || !!error);
  const [judgeOpen, setJudgeOpen] = useState(false);
  const evList = evidence || [];
  const hasPersona = personaVotes && typeof personaVotes === "object"
    && (personaVotes.strict !== undefined || personaVotes.neutral !== undefined || personaVotes.loose !== undefined);
  const isJudgePath = hasPersona && personaMergePath === "judge";
  const hasDetail = deds.length > 0 || strs.length > 0 || imps.length > 0 || coaches.length > 0 || evList.length > 0 || !!error || hasPersona;

  // HITL 수정 모드 state
  const [humanScoreInput, setHumanScoreInput] = useState("");
  const [humanNote, setHumanNote] = useState("");
  const [savingState, setSavingState] = useState(""); // "", "draft", "confirm"
  const effectiveScore = humanConfirmed && humanConfirmedScore != null ? humanConfirmedScore : score;
  const hasDivergence = humanConfirmed && humanConfirmedScore != null && humanConfirmedScore !== score;

  const submitHumanReview = useCallback(async (confirm) => {
    if (!serverUrl) {
      pushToast && pushToast({ kind: "error", title: "저장 실패", message: "서버 URL 이 설정되지 않았습니다." });
      return;
    }
    const parsed = humanScoreInput === "" ? null : Number(humanScoreInput);
    if (parsed == null || Number.isNaN(parsed)) {
      pushToast && pushToast({ kind: "error", title: "입력 오류", message: "점수를 숫자로 입력해 주세요." });
      return;
    }
    if (parsed < 0 || parsed > maxScore) {
      pushToast && pushToast({ kind: "error", title: "점수 범위 오류", message: `0 ~ ${maxScore} 범위의 점수를 입력해 주세요.` });
      return;
    }
    setSavingState(confirm ? "confirm" : "draft");
    try {
      const evidenceLines = (evList || [])
        .map(ev => typeof ev === "string" ? ev : (ev.text || ev.quote || ""))
        .filter(Boolean);
      const body = {
        consultation_id: consultationId || "",
        item_number: Number(num),
        ai_score: Number(score) || 0,
        human_score: parsed,
        ai_evidence: evidenceLines,
        ai_judgment: String(judgment || summary || ""),
        human_note: humanNote || "",
        ai_confidence: aiConfidence != null ? Number(aiConfidence) : null,
        reviewer_id: "ui-user",
        reviewer_role: "senior",
        force_t3: !!forceT3,
      };
      const r = await fetch(`${serverUrl}/v2/human-review`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const reviewId = data && data.id;
      if (confirm && reviewId != null) {
        const r2 = await fetch(`${serverUrl}/v2/review/${reviewId}/confirm`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reviewer_id: "ui-user", reviewer_role: "senior" }),
        });
        if (!r2.ok) throw new Error(`confirm HTTP ${r2.status}`);
      }
      pushToast && pushToast({
        kind: "success",
        title: confirm ? "확정되었습니다" : "임시저장되었습니다",
        message: `#${num} ${name} · 사람 점수 ${parsed}점`,
      });
      onHumanSaved && onHumanSaved(Number(num), parsed, confirm);
    } catch (err) {
      console.error("human-review save failed:", err);
      pushToast && pushToast({ kind: "error", title: "저장 실패", message: String(err.message || err) });
    } finally {
      setSavingState("");
    }
  }, [serverUrl, humanScoreInput, humanNote, maxScore, consultationId, num, name, score, judgment, summary, evList, aiConfidence, forceT3, pushToast, onHumanSaved]);

  // 상위의 "모두 펼치기/접기" 버튼 클릭 시 동기화 (version 증가 시만 반응)
  useEffect(() => {
    if (expandVersion && expandVersion > 0 && typeof expandAllTarget === 'boolean') {
      setOpen(expandAllTarget);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [expandVersion]);

  // 에러 상태면 빨간색 테두리로 시각 강조
  const effectiveBorderColor = error ? 'var(--red)' : (forceT3 ? '#dc2626' : borderColor);
  const divergenceBg = hasDivergence ? 'rgba(251,113,133,0.07)' : null;

  return (
    <div style={{
      border: error ? '1px solid var(--error-border)' : (hasDivergence ? '1px solid #fda4af' : '1px solid var(--border)'),
      borderLeft: `3px solid ${effectiveBorderColor}`,
      borderRadius: 8,
      background: error ? 'var(--error-bg)' : (divergenceBg || 'var(--card)'),
      marginBottom: 6,
      overflow: 'hidden',
    }}>
      <div onClick={() => hasDetail && setOpen(!open)} style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '8px 12px', cursor: hasDetail ? 'pointer' : 'default',
        background: open ? (error ? 'rgba(239,68,68,0.05)' : 'var(--bg)') : 'transparent',
        transition: 'background 0.15s',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0}}>
          {forceT3 && (
            <span style={{
              display:'inline-flex',alignItems:'center',gap:4,
              fontSize:10,fontWeight:700,color:'#b91c1c',background:'#fee2e2',
              border:'1px solid #fca5a5',borderRadius:10,padding:'2px 8px',
            }} title="이 항목은 사람 검수가 필수입니다 (force_t3)">
              <span style={{width:6,height:6,borderRadius:'50%',background:'#dc2626',display:'inline-block'}}></span>
              사람 검수 필수
            </span>
          )}
          <span style={{fontSize:10,color:'var(--text-secondary)',background:'var(--bg)',borderRadius:4,padding:'1px 6px',fontWeight:600}}>#{num}</span>
          <span style={{fontSize:13,fontWeight:600}}>{name}</span>
          {humanConfirmed && (
            <span style={{
              fontSize:10,fontWeight:700,color:'#166534',background:'#dcfce7',
              border:'1px solid #86efac',padding:'2px 7px',borderRadius:10,
              display:'inline-flex',alignItems:'center',gap:3,
            }} title="사람 QA 가 확정한 점수입니다">
              ✓ 사람 확정 ({humanConfirmedScore}점)
            </span>
          )}
          {error && (
            <span style={{
              fontSize:10,fontWeight:700,color:'white',background:'var(--red)',
              padding:'2px 7px',borderRadius:10,marginLeft:4,
              display:'inline-flex',alignItems:'center',gap:3,
            }} title={error.error_message}>
              <span style={{fontSize:11}}>⚠</span> 평가 실패
            </span>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {/* 검수 필요 / 의견 충돌 뱃지 — mandatory_human_review 가 우선 */}
          {mandatoryHumanReview ? (
            <span className="persona-badge review" title="필수 검수 — 사람이 재확인 필요">⚠ 검수 필요</span>
          ) : (hasPersona && Number(personaStepSpread ?? 0) >= 2) ? (
            <span className="persona-badge conflict" title={`3 persona 의 step_spread = ${personaStepSpread}`}>의견 충돌</span>
          ) : null}
          {/* 판사 경로 뱃지 — 클릭 시 확장 */}
          {isJudgePath && (
            <span className={`persona-badge judge${judgeOpen ? " open" : ""}`}
                  onClick={(e) => { e.stopPropagation(); setJudgeOpen(v => !v); if (!open) setOpen(true); }}
                  title="3 persona 의 의견이 충돌해 판사 LLM 이 숙고한 항목 — 클릭하면 상세 보기">
              🎭 판사 숙고 {judgeOpen ? "▲" : "▼"}
            </span>
          )}
          <span style={{fontSize:14,fontWeight:700,color:error ? 'var(--red)' : scoreColor,fontVariantNumeric:'tabular-nums'}}>{score}/{maxScore}</span>
          {hasDetail && <span style={{fontSize:10,color:'var(--text-secondary)',transition:'transform 0.2s',transform:open?'rotate(90deg)':'rotate(0deg)'}}>&#9654;</span>}
        </div>
      </div>
      {editMode && (
        <div
          onClick={(e) => e.stopPropagation()}
          style={{
            padding: '10px 12px',
            background: 'rgba(245,158,11,0.06)',
            borderTop: '1px solid #f3e1b5',
            display: 'flex', flexDirection: 'column', gap: 8,
          }}
        >
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <label style={{fontSize:11,fontWeight:700,color:'#78350f',display:'flex',alignItems:'center',gap:6}}>
              사람 점수
              <input
                type="number"
                min={0}
                max={maxScore}
                step={1}
                value={humanScoreInput}
                placeholder={String(score ?? 0)}
                onChange={(e) => setHumanScoreInput(e.target.value)}
                style={{
                  width: 70, padding: '4px 6px', fontSize: 12,
                  border: '1px solid #e5d8c3', borderRadius: 4,
                  background: '#fff',
                }}
              />
              <span style={{fontSize:11,color:'#78350f',fontWeight:500}}>/ {maxScore}</span>
            </label>
            <span style={{fontSize:11,color:'var(--text-secondary)',display:'inline-flex',alignItems:'center',gap:8}}>
              AI 점수: <b style={{color:'var(--text-primary)'}}>{score}</b>
              {aiConfidence != null && (() => {
                const confNum = Number(aiConfidence);
                const isIntScale = confNum > 1.0;
                const isLow = isIntScale ? (confNum <= 2) : (confNum <= 0.4);
                const display = isIntScale ? `${Math.round(confNum)}/5` : confNum.toFixed(2);
                return (
                  <span
                    title={isLow ? "낮은 신뢰도 — 사람 검수 권장" : "AI 평가 신뢰도"}
                    style={{
                      fontSize:10, fontWeight:700,
                      padding:'2px 8px', borderRadius:10,
                      background: isLow ? '#fee2e2' : '#e0f2fe',
                      color: isLow ? '#b91c1c' : '#075985',
                      border: '1px solid ' + (isLow ? '#fca5a5' : '#bae6fd'),
                    }}
                  >
                    신뢰도 {display}
                  </span>
                );
              })()}
            </span>
          </div>
          <textarea
            rows={3}
            placeholder="수정 사유 / 보완 설명..."
            value={humanNote}
            onChange={(e) => setHumanNote(e.target.value)}
            style={{
              width:'100%', fontSize:12, padding:'6px 8px',
              border:'1px solid #e5d8c3', borderRadius:4, background:'#fff',
              resize:'vertical', fontFamily:'inherit', lineHeight:1.4,
            }}
          />
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button
              type="button"
              disabled={!!savingState}
              onClick={() => submitHumanReview(false)}
              style={{
                padding:'6px 14px', fontSize:12, fontWeight:600,
                background:'#fdfaf2', color:'#78350f',
                border:'1px solid #e5d8c3', borderRadius:4,
                cursor: savingState ? 'not-allowed' : 'pointer',
              }}
            >
              {savingState === "draft" ? "저장 중..." : "임시저장"}
            </button>
            <button
              type="button"
              disabled={!!savingState}
              onClick={() => submitHumanReview(true)}
              style={{
                padding:'6px 14px', fontSize:12, fontWeight:700,
                background:'#d97706', color:'#fff',
                border:'1px solid #b45309', borderRadius:4,
                cursor: savingState ? 'not-allowed' : 'pointer',
              }}
            >
              {savingState === "confirm" ? "확정 중..." : "확정"}
            </button>
          </div>
        </div>
      )}
      {open && hasDetail && (
        <div style={{padding:'0 12px 10px',borderTop:'1px solid var(--border)'}}>
          {/* 3-Persona 막대 차트 — persona_votes 있을 때만 */}
          {hasPersona && (
            <div style={{paddingTop: 8}}>
              <PersonaBarChart
                personaVotes={personaVotes}
                merged={score}
                maxScore={maxScore}
                mergeRule={personaMergeRule}
                mergePath={personaMergePath}
                stepSpread={personaStepSpread}
              />
            </div>
          )}
          {/* 판사 숙고 패널 — judge 경로 + 뱃지 클릭 시 확장 */}
          {isJudgePath && judgeOpen && (
            <JudgePanel
              personaVotes={personaVotes}
              judgeReasoning={judgeReasoning}
              finalScore={score}
              maxScore={maxScore}
              stepSpread={personaStepSpread}
              personaDetails={personaDetails}
              personaLabelMap={personaLabelMap}
            />
          )}
          {error && (
            <div style={{
              marginTop:8,padding:'10px 12px',
              background:'rgba(239,68,68,0.08)',
              border:'1px solid var(--error-border)',
              borderLeft:'3px solid var(--red)',
              borderRadius:6,
            }}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--red)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}>
                ⚠ 평가 실패 — {error.error_type || 'Error'}
              </div>
              <div style={{fontSize:12.5,color:'var(--text-primary)',lineHeight:1.5,wordBreak:'break-word'}}>
                {error.error_message || '알 수 없는 오류'}
              </div>
              <div style={{fontSize:11,color:'var(--text-secondary)',marginTop:6,fontStyle:'italic'}}>
                점수는 0점으로 기본 처리되었습니다. 재평가하려면 파이프라인을 다시 실행하세요.
              </div>
            </div>
          )}
          {(judgment || summary) && (() => {
            const jt = String(judgment || summary || "");
            // BK / GS / RS chunk ID 패턴 추출 → highlight
            const chunkRefs = Array.from(jt.matchAll(/\b(BK-[A-Z]+-\d{3}|GS-\d{2}-[A-Z-]+|r_\d{3})\b/g)).map(m => m[1]);
            const uniqueRefs = [...new Set(chunkRefs)];
            // chunk ID 를 <mark> 처럼 강조하기 위해 JSX 로 분할
            const parts = uniqueRefs.length > 0
              ? jt.split(new RegExp(`(${uniqueRefs.join("|")})`, "g"))
              : [jt];
            return (
              <div>
                <div className="item-section-label" style={{display:'flex',alignItems:'center',gap:6}}>

/* ── JSON Syntax Highlighting ────────────────────────────── */

function syntaxHighlightJson(obj) {
  const json = JSON.stringify(obj, null, 2);
  if (!json) return '';
  const escaped = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return escaped.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
    function(match) {
      let cls = 'json-number';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'json-key' : 'json-string';
      } else if (/true|false/.test(match)) {
        cls = 'json-boolean';
      } else if (/null/.test(match)) {
        cls = 'json-null';
      }
      return '<span class="' + cls + '">' + match + '</span>';
    }
  );
}

/* ── Raw Log Entry — 모든 SSE 이벤트 원본 표시 ─────────────── */

const RAW_LOG_EVENT_COLORS = {
  status:     { bg: 'rgba(34,197,94,0.10)',  fg: '#15803d' },
  routing:    { bg: 'rgba(139,92,246,0.10)', fg: '#6d28d9' },
  node_trace: { bg: 'rgba(59,130,246,0.10)', fg: '#1d4ed8' },
  result:     { bg: 'rgba(245,158,11,0.10)', fg: '#a16207' },
  done:       { bg: 'rgba(148,163,184,0.10)',fg: '#475569' },
  error:      { bg: 'rgba(239,68,68,0.10)',  fg: '#b91c1c' },
};

function RawLogEntry({ entry, index, open, onToggle }) {
  const { time, event, data } = entry;
  const color = RAW_LOG_EVENT_COLORS[event] || { bg: 'rgba(148,163,184,0.08)', fg: '#475569' };
  const [copied, setCopied] = useState(false);

  // 한 줄 요약 — 이벤트 타입별로 자주 쓰는 필드 뽑기
  let summary = '';
  if (event === 'status') summary = `${data.label || data.node || ''} · ${data.status || ''}${data.elapsed != null ? ` · ${data.elapsed.toFixed(2)}s` : ''}`;
  else if (event === 'routing') summary = `${data.phase_label || data.phase || ''} → ${data.next_label || data.next_node || ''}`;
  else if (event === 'node_trace') summary = `${data.label || data.node || ''}${data.elapsed != null ? ` · ${data.elapsed.toFixed(2)}s` : ''}`;
  else if (event === 'result') summary = `grade=${data?.report?.summary?.grade || '—'} · ${data?.elapsed_seconds?.toFixed(2) || '?'}s`;
  else if (event === 'done') summary = `elapsed=${data?.elapsed_seconds?.toFixed(2) || '?'}s`;
  else if (event === 'error') summary = data?.message || '';

  const handleCopy = React.useCallback((e) => {
    e.stopPropagation();
    const text = typeof data === 'string' ? data : (() => { try { return JSON.stringify(data, null, 2); } catch (_) { return String(data); } })();
    copyToClipboard(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }, [data]);

  return (
    <div className="raw-log-entry" onClick={onToggle}>
      <div className="raw-log-header">
        <span className="raw-log-idx">#{index + 1}</span>
        <span className="raw-log-time">{time}</span>
        <span className="raw-log-event" style={{ background: color.bg, color: color.fg }}>{event}</span>
        <span className="raw-log-summary">{summary}</span>
        <button
          type="button"
          className={`raw-log-copy-btn ${copied ? 'copied' : ''}`}
          onClick={handleCopy}
          title="로그 엔트리 복사"
        >
          {copied ? '복사됨!' : '복사'}
        </button>
        <span className={`raw-log-chevron ${open ? 'open' : ''}`}>&#9654;</span>
      </div>
      {open && (
        <div className="raw-log-body">
          <pre dangerouslySetInnerHTML={{ __html: sanitizeHtml(syntaxHighlightJson(data)) }} />
        </div>
      )}
    </div>
  );
}

function TraceCard({ trace, maxElapsed, open, onToggle }) {
  const [subTab, setSubTab] = useState("input");
  const node = trace.node || '';
  const label = trace.label || node;
  const elapsed = trace.elapsed || 0;
  const barWidth = maxElapsed > 0 ? Math.max(4, (elapsed / maxElapsed) * 100) : 4;

  const evals = (trace.output && trace.output.evaluations) || [];
  let totalScore = 0, totalMax = 0, hasScore = false;
  evals.forEach(ev => {
    const e = ev.evaluation || ev;
    if (e.score !== undefined && e.max_score !== undefined) {
      totalScore += e.score;
      totalMax += e.max_score;
      hasScore = true;
    }
  });
  const scoreCls = !hasScore ? '' : totalScore >= totalMax ? '' : totalScore > 0 ? 'partial' : 'zero';

  return (
    <div className="trace-card">
      <div className="trace-header" onClick={onToggle}>
        <span className={`trace-chevron ${open ? 'open' : ''}`}>&#9654;</span>
        <span className={`trace-dot ${trace.error ? 'error' : ''}`}></span>
        <span className="trace-node-name">{label}</span>
        <span className="trace-label">{node}</span>
        {hasScore && (
          <span className={`trace-score-badge ${scoreCls}`}>{totalScore}/{totalMax}</span>
        )}
        <span className="trace-duration">{elapsed.toFixed(2)}s</span>
      </div>
      <div className="trace-duration-bar" style={{ width: barWidth + '%' }}></div>
      {open && (
        <div className="trace-body">
          <div className="trace-tabs">
            <button className={`trace-tab-btn ${subTab === 'input' ? 'active' : ''}`}
              onClick={() => setSubTab('input')}>Input</button>
            <button className={`trace-tab-btn ${subTab === 'output' ? 'active' : ''}`}
              onClick={() => setSubTab('output')}>Output</button>
          </div>
          <div className="trace-json-wrap">
            <pre dangerouslySetInnerHTML={{
              __html: sanitizeHtml(syntaxHighlightJson(subTab === 'input' ? trace.input : trace.output))
            }} />
          </div>
        </div>
      )}
    </div>
  );
}

function TraceList({ traces }) {
  const { openSet, allOpen, toggleOne, expandAll, collapseAll } = useExpandSet(traces.length);
