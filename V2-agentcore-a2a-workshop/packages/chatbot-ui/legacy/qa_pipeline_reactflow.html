   - phase_b2 : proactiveness
   - phase_c  : consistency_check / score_validation (V2 시각화에선 layer3로 집계)
*/
const PHASE_A_NODES  = ["greeting", "listening_comm", "language", "needs", "privacy"];
const PHASE_B1_NODES = ["explanation", "work_accuracy"];
const PHASE_B2_NODES = ["proactiveness"];
const PHASE_C_NODES  = ["orchestrator_v2"];
const edgeKey = (from, to) => `${from}->${to}`;

/* ── SSE 리더 루프 (event + data 쌍 파싱) ─────────────────────
   청크 경계에서 event 타입이 유실되지 않게 eventType 을 외부 스코프에 유지.
   payload 모양으로 eventType 추론하는 폴백 포함. AbortSignal 로 중단 가능. */
async function parseSSEStream(response, { signal, onEvent }) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  let eventType = null;

  const inferEventType = (d) => {
    if (!d || typeof d !== 'object') return null;
    if (d.phase !== undefined && d.next_node !== undefined) return 'routing';
    if (d.node !== undefined && d.input !== undefined && d.output !== undefined) return 'node_trace';
    if (d.node !== undefined && d.status !== undefined) return 'status';
    if (d.report !== undefined || (d.elapsed_seconds !== undefined && d.node_timings !== undefined)) return 'result';
    if (d.elapsed_seconds !== undefined) return 'done';
    if (d.message !== undefined) return 'error';
    return null;
  };

  const onAbort = () => { try { reader.cancel(); } catch {} };
  if (signal) signal.addEventListener("abort", onAbort);
  try {
    while (true) {
      if (signal && signal.aborted) break;
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (line.startsWith("event:")) {
          eventType = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          const dataStr = line.slice(5).trim();
          if (!dataStr) continue;
          let data;
          try { data = JSON.parse(dataStr); } catch { continue; }
          const evtSnap = eventType || inferEventType(data);
          onEvent({ eventType: evtSnap, data });
          eventType = null;
        }
      }
    }
  } finally {
    if (signal) signal.removeEventListener("abort", onAbort);
    try { reader.releaseLock(); } catch {}
  }
}

/* ── SSE 이벤트 → state setter 묶음 dispatch ──────────────────
   기존 runEvaluation 의 이벤트별 분기를 순수 함수화.
   setters 는 훅/App 어느 쪽 setter 집합이든 주입. */
function applySSEEvent(s, evt, elapsedFallback) {
  const { eventType, data } = evt;
  const timeSnap = new Date().toLocaleTimeString('ko-KR', { hour12: false });
  s.setRawLogs(prev => [...prev, { time: timeSnap, event: eventType, data }]);

  if (eventType === "start") {
    /* tenant_id 캡처 — 파이프라인 그래프의 tenant 노드에 표시 */
    if (data && data.tenant_id && s.setTenantId) {
      s.setTenantId(data.tenant_id);
    }
    /* tenant_config 노드는 평가 시작과 동시에 done 처리 (정적 자원 주입) */
    if (s.setNodeStates) {
      s.setNodeStates(prev => ({ ...prev, tenant_config: "done" }));
    }
    return;
  }

  if (eventType === "routing") {
    const { next_node: rawNext, next_label, phase, phase_label } = data;
    /* V1 → V2 alias 매핑 (legacy SSE 이벤트 호환) */
    const next_node = (LEGACY_TO_V2_NODE && LEGACY_TO_V2_NODE[rawNext]) || rawNext;
    s.addLog(`Routing: ${phase_label || phase} -> ${next_label || next_node}`, "info");
    /* V2 에서는 orchestrator_v2 가 routing 중심 노드지만, routing 이벤트 자체가 Layer 3
       도달을 의미하지는 않음 (Layer 2 fan-out 중에도 routing 이벤트가 발생).
       → orchestrator_v2 활성화는 아래 phase === "layer3" / "phase_b1" 분기에서만 수행.
       이전엔 모든 routing 마다 unconditionally active 로 표시하여 Layer 2 실행 중 Layer 3
       도 같이 active 로 찍히는 오류가 있었음 (2026-04-21 수정). */
    /* V2 Layer 기반 분기 (+ V1 phase 이름 하위 호환) */
    if (phase === "layer1" || phase === "preprocessing") {
      s.activatePhaseGroup(LAYER1_NODES);
    } else if (phase === "dp_done" || phase === "layer2" || (phase === "parallel_eval" && rawNext === "__parallel__")) {
      s.activatePhaseGroup(PHASE_A_NODES);
    } else if (phase === "phase_a") {
      s.activatePhaseGroup(PHASE_A_NODES);
    } else if (phase === "phase_b1") {
      s.activatePhaseGroup(PHASE_B1_NODES);
    } else if (phase === "phase_b2") {
      s.activatePhaseGroup(PHASE_B2_NODES);
    } else if (phase === "layer3") {
      s.activatePhaseGroup(LAYER3_NODES);
    } else if (phase === "phase_c") {
      s.activatePhaseGroup(PHASE_C_NODES);
    } else if (phase === "layer4") {
      s.activatePhaseGroup(LAYER4_NODES);
    } else if (phase === "reporting" || next_node === "report_generator") {
      s.setNodeStates(prev => ({ ...prev, report_generator: "active" }));
      s.activateEdgesTo("report_generator");
    } else if (next_node && next_node !== "__end__" && next_node !== "__parallel__") {
      s.setNodeStates(prev => ({ ...prev, [next_node]: "active" }));
      s.activateEdgesTo(next_node);
    } else if (phase && phase !== "complete" && phase !== "init") {
      s.addLog(`[warn] Unmatched routing phase="${phase}" next_node="${next_node}"`, "warn");
    }
    return;
  }

  if (eventType === "status") {
    const { node: rawNode, label, status, elapsed: el, scores: nodeItemScores, node_status, error_info } = data;
    /* V1 backend event → V2 node ID alias 매핑 */
    const node = (LEGACY_TO_V2_NODE && LEGACY_TO_V2_NODE[rawNode]) || rawNode;
    const isErrorNode = node_status === "error" && Array.isArray(error_info) && error_info.length > 0;
    if (isErrorNode) {
      const errDetails = error_info
        .map(ei => `#${ei.item_number} ${ei.item_name}: ${ei.error_type} — ${ei.error_message}`)
        .join(" / ");
      s.addLog(`${label || node}: ⚠️ 에러 (${errDetails})`, "error");
    } else {
      s.addLog(`${label || node}: ${status}${el ? ` (${el.toFixed(1)}s)` : ""}`,
               status === "completed" ? "success" : "warn");
    }
    if (status === "completed" || status === "done") {
      if (nodeItemScores && nodeItemScores.length > 0) {
        const total = nodeItemScores.reduce((sum, sc) => sum + (sc.score || 0), 0);
        s.setNodeScores(prev => ({ ...prev, [node]: total }));
        s.setStreamingItems(prev => {
          const map = new Map(prev.map(it => [it.item_number, it]));
          nodeItemScores.forEach(sc => {
            if (sc.item_number != null) {
              const err = isErrorNode ? error_info.find(ei => ei.item_number === sc.item_number) : null;
              map.set(sc.item_number, err ? { ...sc, agent_id: node, _error: err } : { ...sc, agent_id: node });
            }
          });
          return Array.from(map.values()).sort((a, b) => (a.item_number || 0) - (b.item_number || 0));
        });
      }
      if (data.verification) s.setResult(prev => ({ ...(prev || {}), verification: data.verification }));
      if (data.score_validation) s.setResult(prev => ({ ...(prev || {}), score_validation: data.score_validation }));
      s.setNodeStates(prev => ({ ...prev, [node]: isErrorNode ? "error" : "done" }));
      if (isErrorNode) s.setNodeErrors(prev => ({ ...prev, [node]: error_info }));
      if (el !== undefined) s.setNodeTimings(prev => ({ ...prev, [node]: el }));
      s.completeEdgesTo(node);
    } else if (status === "error") {
      s.setNodeStates(prev => ({ ...prev, [node]: "error" }));
    } else if (status === "started" || status === "active") {
      s.setNodeStates(prev => ({ ...prev, [node]: "active" }));
      s.activateEdgesTo(node);
    }
    return;
  }

  if (eventType === "result") {
    const vData  = data.verification?.verification || data.verification || {};
    const svData = data.score_validation?.validation || data.score_validation || {};
    const gateFailed = data.status === "validation_failed"
      || (!data.report && (data.verification || data.score_validation));
    const consistFailed = vData.is_consistent === false;
    const scoreFailed   = svData.passed === false;

    s.setResult(data);

    if (gateFailed) {
      /* V2: consistency_check / score_validation 은 orchestrator_v2 내부 단계. Gate 실패는
         orchestrator_v2 노드를 error 로 표시하고 Layer 4 전체 skipped 처리. */
      s.addLog("Layer 3 Gate 실패 — Layer 4 건너뜀 (consistency 또는 score_validation)", "error");
      if (consistFailed) {
        const conflicts = vData.conflicts?.length || 0;
        const evMiss = vData.evidence_check?.missing || 0;
        s.addLog(`  일관성 검증 실패 — 모순 ${conflicts}건, 증거 누락 ${evMiss}건`, "error");
      }
      if (scoreFailed) {
        const issues = svData.issues?.length || 0;
        const missing = svData.missing_items?.length || 0;
        s.addLog(`  점수 산술 검증 실패 — 위반 ${issues}건, 누락 ${missing}건`, "error");
      }
      s.setNodeStates(prev => ({
        ...prev,
        orchestrator_v2: "error",
        confidence: "skipped",
        tier_router: "skipped",
        evidence_refiner: "skipped",
        report_generator: "gate-failed",
        gt_comparison: "skipped",
        gt_evidence_comparison: "skipped",
        qa_output: "skipped",
      }));
      s.setEdge("orchestrator_v2", "confidence",        "skipped");
      s.setEdge("confidence",      "tier_router",       "skipped");
      s.setEdge("tier_router",     "evidence_refiner",  "skipped");
      s.setEdge("evidence_refiner", "report_generator", "skipped");
      s.setEdge("report_generator", "gt_comparison",    "skipped");
      s.setEdge("gt_comparison",    "gt_evidence_comparison", "skipped");
      s.setEdge("gt_evidence_comparison", "qa_output",  "skipped");
    } else {
      s.addLog("Evaluation result received", "success");
      s.setNodeStates(prev => ({ ...prev, report_generator: "done", gt_comparison: "done", gt_evidence_comparison: "done", qa_output: "done" }));
      s.setEdge("report_generator", "gt_comparison", "done");
      s.setEdge("gt_comparison",    "gt_evidence_comparison", "done");
      s.setEdge("gt_evidence_comparison", "qa_output", "done");
    }

    const itemScores = extractItemScores(data);
    const scores = {};
    Object.entries(NODE_ITEMS).forEach(([nodeId, itemNums]) => {
      let total = 0;
      let found_any = false;
      itemNums.forEach(num => {
        const found = itemScores.find(it => (it.item_number || it.item) === num);
        if (found) {
          total += (found.score !== undefined ? found.score : (found.awarded || 0));
          found_any = true;
        }
      });
      if (found_any) scores[nodeId] = total;
    });
    s.setNodeScores(scores);
    return;
  }

  if (eventType === "node_trace") {
    s.setTraces(prev => [...prev, data]);
    return;
  }

  if (eventType === "done") {
    const { elapsed_seconds } = data;
    s.addLog(`Pipeline completed in ${elapsed_seconds ? elapsed_seconds.toFixed(1) : (elapsedFallback || 0).toFixed(1)}s`, "success");
    s.setNodeStates(prev => {
      const next = { ...prev };
      const preserve = new Set(["skipped", "gate-failed", "error"]);
      Object.keys(NODE_DEFS).forEach(k => { if (!preserve.has(next[k])) next[k] = "done"; });
      return next;
    });
    s.setEdgeStates(prev => {
      const next = { ...prev };
      EDGES.forEach(e => {
        const ek = edgeKey(e.from, e.to);
        if (next[ek] !== "skipped") next[ek] = "done";
      });
      return next;
    });
    s.setRunning(false);
    return;
  }

  if (eventType === "error") {
    s.addLog(`Error: ${data.message || JSON.stringify(data)}`, "error");
    s.setErrorAlert({
      type: data.type === "timeout" ? "timeout" : "error",
      message: data.message || "파이프라인 실행 중 오류가 발생했습니다.",
      timestamp: Date.now(),
    });
    s.setRunning(false);
    return;
  }
}

function extractItemScores(data) {
  const rp = data.report || data;
  const report = rp.report || rp;
  let scores = report.item_scores || [];
  if (!scores.length) {
    const evals = data.evaluations || report.evaluations || rp.evaluations || [];
    evals.forEach(ev => {
      const e = ev.evaluation || ev;
      if (e.item_number && e.score !== undefined) {
        scores.push({ item_number: e.item_number, score: e.score, max_score: e.max_score });
      }
    });
  }
  return scores;
}

/* ── 수동 평가표(xlsx) 결정적 파서 ────────────────────────────── */
/* STT 기반 통합 상담평가표 템플릿 전용. 탭 구조:
   R5=헤더 | R6~R23=18개 항목 | R25=총점
   열: A=대분류(병합) · B=평가항목 · C=기준 · D=배점 · E=점수 · F=비고 */
function _cleanItemName(s) {
  return String(s || "").replace(/\n?\(\s*\d+\s*\)\s*$/, "").replace(/\s+/g, " ").trim();
}
function parseManualEvalSheet(ws, sheetName) {
  const rows2d = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  // 상담ID 추출: R3 B열 → 시트명 말미 숫자
  let sheetId = "";
  const b3 = rows2d[2] && rows2d[2][1];
  if (b3 != null && String(b3).trim()) sheetId = String(b3).trim();
  else {
    const m = sheetName.match(/(\d{4,})\s*$/);
    if (m) sheetId = m[1];
  }
  // 18개 항목 (R6~R23)
  const rows = [];
  let lastCategory = "";
  let no = 1;
  for (let i = 5; i <= 22 && i < rows2d.length; i++) {
    const r = rows2d[i] || [];
    const rawCat = String(r[0] || "").trim();
    const rawItem = String(r[1] || "").trim();
    if (rawCat) lastCategory = _cleanItemName(rawCat);
    if (!rawItem) continue;
    const max_score = r[3] === "" || r[3] == null ? null : Number(r[3]);
    const qa_score = r[4] === "" || r[4] == null ? null : Number(r[4]);
    rows.push({
      no,
      category: lastCategory,
      item: _cleanItemName(rawItem),
      criterion: String(r[2] || "").trim(),
      max_score: Number.isFinite(max_score) ? max_score : null,
      qa_score: Number.isFinite(qa_score) ? qa_score : null,
      qa_evidence: String(r[5] || "").trim(),
    });
    no++;
  }
  // 총점 (R25 근처)
  let total = null;
  let totalRowIdx = -1;
  for (let i = 23; i < Math.min(rows2d.length, 30); i++) {
    const r = rows2d[i] || [];
    if (String(r[0] || "").includes("총점")) {
      const t = r[4] === "" || r[4] == null ? r[3] : r[4];
      const n = Number(t);
      total = Number.isFinite(n) ? n : null;
      totalRowIdx = i;
      break;
    }
  }

  // G열 이후 모델 결과 파싱 (이미 append 되어 있는 경우)
  // R4(index 3)에 그룹 헤더(모델명), R5(index 4)에 "점수|이유" 서브 헤더
  // R6~R23 각 행 [점수|이유] × N, R25 총점
  const modelResults = {};
  try {
    // SheetJS 시트에서 병합 정보 가져오기
    const merges = Array.isArray(ws["!merges"]) ? ws["!merges"] : [];
    const rowHeader = rows2d[3] || [];   // R4
    const rowSubHdr = rows2d[4] || [];   // R5
    const rowTotal  = totalRowIdx >= 0 ? (rows2d[totalRowIdx] || []) : [];

    // R4에서 col 6(G)부터 짝수 인덱스마다 그룹 스캔 (병합된 경우 첫 셀에만 값이 있음)
    for (let col = 6; col < rowHeader.length; col += 2) {
      let name = String(rowHeader[col] || "").trim();
      // 병합 안 된 경우 바로 다음 셀에 값이 있을 수도 있으므로 fallback (짝수 col 가정 하에선 불필요하지만 안전망)
      if (!name) {
        // 병합 범위 안에 col 이 들어가는지 확인
        const mg = merges.find(m => m.s.r === 3 && m.s.c <= col && m.e.c >= col);
        if (mg) {
          const headCell = rows2d[3] && rows2d[3][mg.s.c];
          if (headCell != null && String(headCell).trim()) name = String(headCell).trim();
        }
      }
      if (!name) continue;

      // 서브 헤더 검증 — "점수"|"이유" 패턴이 아니면 스킵
      const sub1 = String(rowSubHdr[col] || "").trim();
      const sub2 = String(rowSubHdr[col + 1] || "").trim();
      if (sub1 !== "점수" && sub2 !== "이유") continue;

      const items = {};
      let sum = 0;
      let anyScore = false;
      for (let i = 5, n = 1; i <= 22 && n <= 18; i++, n++) {
        const r = rows2d[i] || [];
        const sRaw = r[col];
        const eRaw = r[col + 1];
        const scoreNum = (sRaw === "" || sRaw == null) ? null : Number(sRaw);
        const score = Number.isFinite(scoreNum) ? scoreNum : null;
        const evidence = (eRaw == null) ? "" : String(eRaw).trim();
        items[n] = { score, evidence };
        if (typeof score === "number") { sum += score; anyScore = true; }
      }
      if (!anyScore) continue; // 빈 그룹 헤더 방지

      // 총점: R25 동일 컬럼 우선, 없으면 점수 합계
      let mTotal = null;
      const tRaw = rowTotal[col];
      const tNum = (tRaw === "" || tRaw == null) ? null : Number(tRaw);
      if (Number.isFinite(tNum)) mTotal = tNum;
      else mTotal = sum;

      // 종합 리포트 (R24 = index 23) — 병합셀의 첫 번째 컬럼에만 값 존재
      const rowReport = rows2d[23] || [];
      const reportRaw = rowReport[col];
      const overallReport = (reportRaw == null) ? "" : String(reportRaw).trim();

      modelResults[name] = { total: mTotal, items, overallReport };
    }
  } catch (err) {
    console.warn("parseManualEvalSheet: modelResults 파싱 실패", err);
  }

  return { sheetName, sheetId, rows, total, modelResults };
}

/* xlsx 에서 파싱된 modelResults → AI result 구조로 재구성
   (batchResults 에 직접 주입되어도 formatAiEvidenceForMatrix / extractAiItemByNumber 이 정상 동작해야 함)
*/
function buildSyntheticResultFromModelResult(modelResult) {
  if (!modelResult || typeof modelResult !== "object") return null;
  const items = modelResult.items || {};
  const evaluations = [];
  for (let n = 1; n <= 18; n++) {
    const it = items[n];
    if (!it) continue;
    const max = STT_MAX_SCORES[n];
    const score = it.score != null && Number.isFinite(Number(it.score)) ? Number(it.score) : null;
    const evidence = it.evidence ? String(it.evidence) : "";
    // formatAiEvidenceForMatrix 가 deductions → evidence → 최상위 reason 순으로 파싱하므로
    // 빈 근거가 아닐 때만 deductions 에 채워넣어 재현성 확보
    const deductions = [];
    if (evidence) {
      const pts = (typeof score === "number" && typeof max === "number") ? Math.max(max - score, 0) : 0;
      deductions.push({ reason: evidence, points: pts });
    }
    evaluations.push({
      evaluation: {
        item_number: n,
        score: score,
        max_score: max,
        deductions,
        evidence: [],
      },
    });
  }
  // 종합 리포트 (R24) 보존 — xlsx 에 기록되어 있던 텍스트를 그대로 유지
  const overallReport = typeof modelResult.overallReport === "string" ? modelResult.overallReport.trim() : "";
  const report = overallReport ? { full_report_text: overallReport } : undefined;
  return {
    evaluations,
    __fromAnswerXlsx: true,
    ...(report ? { report } : {}),
  };
}

function buildManualPreview(structured) {
  if (!structured) return "";
  const { sheetId, rows, total } = structured;
  const lines = [];
  lines.push(`[상담ID ${sheetId || "-"}] 18항목 · 수동 총점 ${total ?? "-"} / 100`);
  lines.push("─".repeat(52));
  rows.forEach(r => {
    const score = r.qa_score == null ? "-" : r.qa_score;
    const max = r.max_score == null ? "?" : r.max_score;
    lines.push(`${String(r.no).padStart(2)}. [${r.category}] ${r.item}: ${score}/${max}`);
  });
  return lines.join("\n");
}

/* ── 매트릭스 뷰: 모델 결과 → STT 평가표 18행 ────────────────── */
/* 엑셀 템플릿의 대분류 표기와 정확히 매칭 */
const STT_CATEGORIES = {
  1: "인사 예절", 2: "인사 예절",
  3: "경청 및 소통", 4: "경청 및 소통", 5: "경청 및 소통",
  6: "언어 표현", 7: "언어 표현",
  8: "니즈 파악", 9: "니즈 파악",
  10: "설명력 및 전달력", 11: "설명력 및 전달력",
  12: "적극성", 13: "적극성", 14: "적극성",
  15: "업무 정확도", 16: "업무 정확도",
  17: "개인정보 보호", 18: "개인정보 보호",
};
// 2026-04-21: #3 경청 제거 (-5) + #15 정확한 안내 확장 (10→15, +5). 총점 100 불변.
const STT_MAX_SCORES = { 1:5,2:5,4:5,5:5,6:5,7:5,8:5,9:5,10:10,11:5,12:5,13:5,14:5,15:15,16:5,17:5,18:5 };

/* item_number → 담당 Sub Agent node ID 역매핑 (AGENT_ITEMS 기반) */
const ITEM_TO_AGENT = (() => {
  const map = {};
  AGENT_ITEMS.forEach(({ agent, items }) => items.forEach(n => { map[n] = agent; }));
  return map;
})();

/* 평가 결과(item dict 들의 list)에서 agentId 별로 RAG hit 집계.
   final result 의 evaluations[] 와 streaming 중인 streamingItems[] 둘 다 동일 포맷으로 처리 가능. */
function _aggregateRagFromItemList(itemList) {
  // 2026-04-21: 에이전트 단위 집계 + 평가 항목 단위(perItem) 분리 집계.
  // 백엔드는 평가 항목별로 RAG 를 따로 호출 (item #8 / #9 별개) — UI 도 드로어에서
  // 항목별 탭으로 분리 표시하기 위해 perItem 구조 유지.
  const agg = {};
  const _makePerItemBucket = () => ({
    fewshot: new Map(),
    reasoning: null,   // {stdev, sample_size, examples[], example_ids[]}
    knowledge: new Map(),
    queries: { fewshot: null, reasoning: null, knowledge: null, intent: null },
  });
  itemList.forEach(raw => {
    const e = (raw && raw.evaluation && typeof raw.evaluation === "object") ? raw.evaluation : raw;
    if (!e || typeof e !== "object") return;
    const itemNum = Number(e.item_number ?? e.item ?? e.no);
    const agent = ITEM_TO_AGENT[itemNum];
    if (!agent) return;
    const re = e.rag_evidence;
    if (!re || typeof re !== "object") return;
    if (!agg[agent]) agg[agent] = {
      fewshot: new Map(),       // 집계 — example_id → detail dict
      reasoning: new Map(),     // 집계 — item_number → {stdev, sample_size, examples[]}
      knowledge: new Map(),     // 집계 — chunk_id → detail dict
      items: new Set(),
      queries: { fewshot: [], reasoning: [], knowledge: [], intent: null },
      perItem: {},              // item_number → _makePerItemBucket()
    };
    agg[agent].items.add(itemNum);
    if (re.intent && !agg[agent].queries.intent) agg[agent].queries.intent = re.intent;
    if (re.fewshot_query && !agg[agent].queries.fewshot.includes(re.fewshot_query)) agg[agent].queries.fewshot.push(re.fewshot_query);
    if (re.reasoning_query && !agg[agent].queries.reasoning.includes(re.reasoning_query)) agg[agent].queries.reasoning.push(re.reasoning_query);
    if (re.knowledge_query && !agg[agent].queries.knowledge.includes(re.knowledge_query)) agg[agent].queries.knowledge.push(re.knowledge_query);

    if (!agg[agent].perItem[itemNum]) agg[agent].perItem[itemNum] = _makePerItemBucket();
    const pi = agg[agent].perItem[itemNum];
    if (re.intent && !pi.queries.intent) pi.queries.intent = re.intent;
    if (re.fewshot_query && !pi.queries.fewshot) pi.queries.fewshot = re.fewshot_query;
    if (re.reasoning_query && !pi.queries.reasoning) pi.queries.reasoning = re.reasoning_query;
    if (re.knowledge_query && !pi.queries.knowledge) pi.queries.knowledge = re.knowledge_query;

    // Few-shot — details 우선, 없으면 ID 만
    const fsDetails = re.fewshot_details || [];
    const fsIds = re.fewshot_ids || [];
    if (fsDetails.length > 0) {
      fsDetails.forEach(d => {
        agg[agent].fewshot.set(String(d.example_id), d);
        pi.fewshot.set(String(d.example_id), d);
      });
    } else {
      fsIds.forEach(id => {
        const key = String(id);
        if (!agg[agent].fewshot.has(key)) agg[agent].fewshot.set(key, { example_id: key });
        if (!pi.fewshot.has(key)) pi.fewshot.set(key, { example_id: key });
      });
    }

    // Reasoning — details 또는 ID 만
    if (re.reasoning_stdev !== null && re.reasoning_stdev !== undefined) {
      if (!agg[agent].reasoning.has(itemNum)) {
        agg[agent].reasoning.set(itemNum, {
          item: itemNum,
          stdev: Number(re.reasoning_stdev),
          sample_size: re.reasoning_sample_size ?? null,
          example_ids: re.reasoning_example_ids || [],
          examples: re.reasoning_details || [],
        });
      }
      if (!pi.reasoning) {
        pi.reasoning = {
          item: itemNum,
          stdev: Number(re.reasoning_stdev),
          sample_size: re.reasoning_sample_size ?? null,
          example_ids: re.reasoning_example_ids || [],
          examples: re.reasoning_details || [],
        };
      }
    }

    // Knowledge — details 또는 ID 만
    const knDetails = re.knowledge_details || [];
    const knIds = re.knowledge_chunk_ids || [];
    if (knDetails.length > 0) {
      knDetails.forEach(d => {
        agg[agent].knowledge.set(String(d.chunk_id), d);
        pi.knowledge.set(String(d.chunk_id), d);
      });
    } else {
      knIds.forEach(id => {
        const key = String(id);
        if (!agg[agent].knowledge.has(key)) agg[agent].knowledge.set(key, { chunk_id: key });
        if (!pi.knowledge.has(key)) pi.knowledge.set(key, { chunk_id: key });
      });
    }
  });
  // similarity 내림차순 정렬 (null/undefined 는 뒤로)
  const bySimDesc = (a, b) => {
    const sa = Number(a?.similarity); const sb = Number(b?.similarity);
    const va = isNaN(sa) ? -Infinity : sa;
    const vb = isNaN(sb) ? -Infinity : sb;
    return vb - va;
  };
  const byScoreDesc = (a, b) => {
    const sa = Number(a?.score); const sb = Number(b?.score);
    const va = isNaN(sa) ? -Infinity : sa;
    const vb = isNaN(sb) ? -Infinity : sb;
    return vb - va;
  };
  // 2026-04-21: 에이전트별 golden_set fewshot 상한 = 7 (dedupe + similarity desc 후 상위 7)
  const MAX_FEWSHOT_PER_AGENT = 7;
  // 평가 항목별 상한 — 항목별 탭 내부에선 상위 7 유지 (에이전트 전체 상한과 동일)
  const MAX_FEWSHOT_PER_ITEM = 7;
  const out = {};
  Object.entries(agg).forEach(([k, v]) => {
    const fewshotAll = Array.from(v.fewshot.values()).sort(bySimDesc);
    const fewshot = fewshotAll.slice(0, MAX_FEWSHOT_PER_AGENT);
    const reasoning = Array.from(v.reasoning.values()).map(r => ({
      ...r,
      examples: (r.examples || []).slice().sort(bySimDesc),
    }));
    const knowledge = Array.from(v.knowledge.values()).sort(byScoreDesc);

    // perItem 출력 구조 생성 — 각 항목 내부에서도 similarity 내림차순 정렬
    const perItem = {};
    Object.entries(v.perItem).forEach(([itemKey, bucket]) => {
      const fsArr = Array.from(bucket.fewshot.values()).sort(bySimDesc);
      const knArr = Array.from(bucket.knowledge.values()).sort(byScoreDesc);
      const rs = bucket.reasoning ? {
        ...bucket.reasoning,
        examples: (bucket.reasoning.examples || []).slice().sort(bySimDesc),
      } : null;
      perItem[itemKey] = {
        item: Number(itemKey),
        fewshot: fsArr.slice(0, MAX_FEWSHOT_PER_ITEM),
        fewshot_total: fsArr.length,
        reasoning: rs,
        knowledge: knArr,
        queries: bucket.queries,
        hasGS: fsArr.length > 0,
        hasRS: !!rs,
        hasBK: knArr.length > 0,
      };
    });

    out[k] = {
      fewshot,
      fewshot_total: fewshotAll.length,   // 디버그용 원본 개수
      reasoning,
      knowledge,
      items: Array.from(v.items).sort((a, b) => a - b),
      hasGS: fewshot.length > 0,
      hasRS: v.reasoning.size > 0,
      hasBK: v.knowledge.size > 0,
      queries: v.queries,
      perItem,
    };
  });
  return out;
}

/* result.evaluations 우선, 없으면 streamingItems (실시간) fallback */
function aggregateRagHitsByAgent(result, streamingItems) {
  const evals = [];
  const push = (v) => { if (Array.isArray(v)) v.forEach(x => evals.push(x)); };
  if (result && typeof result === "object") {
    push(result.evaluations);
    push(result.items);
    const report = result.report;
    if (report && typeof report === "object") {
      push(report.evaluations);
      const inner = report.report;
      if (inner && typeof inner === "object") push(inner.evaluations);
    }
  }
  if (evals.length > 0) return _aggregateRagFromItemList(evals);
  // 실시간 fallback — streamingItems 의 각 entry 가 rag_evidence 포함
  if (Array.isArray(streamingItems) && streamingItems.length > 0) {
    return _aggregateRagFromItemList(streamingItems);
  }
  return {};
}

/* 노드별 평균 confidence (1~5) — streamingItems / final evaluations 양쪽 지원 */
function aggregateConfidenceByAgent(result, streamingItems) {
  const sources = [];
  if (result && typeof result === "object") {
    if (Array.isArray(result.evaluations)) sources.push(...result.evaluations);
    const r = result.report;
    if (r && typeof r === "object" && Array.isArray(r.evaluations)) sources.push(...r.evaluations);
  }
  if (sources.length === 0 && Array.isArray(streamingItems)) sources.push(...streamingItems);

  const agg = {};
  sources.forEach(raw => {
    const e = (raw && raw.evaluation && typeof raw.evaluation === "object") ? raw.evaluation : raw;
    if (!e || typeof e !== "object") return;
    const itemNum = Number(e.item_number ?? e.item ?? e.no);
    const agent = ITEM_TO_AGENT[itemNum];
    if (!agent) return;
    // Group A: evaluation.confidence = {final, signals}
    // Group B: evaluation.llm_self_confidence = {score, rationale}
    const conf = e.confidence ?? e.llm_self_confidence;
    let final = null;
    if (typeof conf === "number") final = conf;
    else if (conf && typeof conf === "object") final = conf.final ?? conf.score ?? null;
    if (final === null || final === undefined) return;
    if (!agg[agent]) agg[agent] = { items: new Map(), sum: 0, count: 0 };
    if (!agg[agent].items.has(itemNum)) {
      agg[agent].items.set(itemNum, Number(final));
      agg[agent].sum += Number(final);
      agg[agent].count += 1;
    }
  });
  const out = {};
  Object.entries(agg).forEach(([k, v]) => {
    out[k] = {
      avg: v.count > 0 ? v.sum / v.count : null,
      perItem: Object.fromEntries(v.items),
    };
  });
  return out;
}

/* 노드별 3-persona 집계 — 각 Sub Agent 내부 strict/neutral/loose 호출 상태 요약 */
function aggregatePersonaByAgent(result, streamingItems) {
  const sources = [];
  if (result && typeof result === "object") {
    if (Array.isArray(result.evaluations)) sources.push(...result.evaluations);
    const r = result.report;
    if (r && typeof r === "object" && Array.isArray(r.evaluations)) sources.push(...r.evaluations);
  }
  if (sources.length === 0 && Array.isArray(streamingItems)) sources.push(...streamingItems);

  const agg = {};
  sources.forEach(raw => {
    const e = (raw && raw.evaluation && typeof raw.evaluation === "object") ? raw.evaluation : raw;
    if (!e || typeof e !== "object") return;
    const itemNum = Number(e.item_number ?? e.item ?? e.no);
    const agent = ITEM_TO_AGENT[itemNum];
    if (!agent) return;
    const votes = e.persona_votes || null;
    if (!votes) return;
    if (!agg[agent]) agg[agent] = {
      items: new Set(),
      personaSuccess: { strict: 0, neutral: 0, loose: 0 },
      personaTotal: 0,
      judgeCount: 0,
      conflictCount: 0,   // step_spread >= 2
      mhrCount: 0,        // mandatory_human_review
      avgSpread: 0,
      _spreadSum: 0,
      _spreadN: 0,
    };
    if (agg[agent].items.has(itemNum)) return;
    agg[agent].items.add(itemNum);
    agg[agent].personaTotal += 1;
    ["strict", "neutral", "loose"].forEach(p => {
      if (votes[p] !== undefined && votes[p] !== null) agg[agent].personaSuccess[p] += 1;
    });
    if (e.persona_merge_path === "judge") agg[agent].judgeCount += 1;
    const spread = Number(e.persona_step_spread);
    if (!isNaN(spread)) {
      agg[agent]._spreadSum += spread;
      agg[agent]._spreadN += 1;
      if (spread >= 2) agg[agent].conflictCount += 1;
    }
    if (e.mandatory_human_review) agg[agent].mhrCount += 1;
  });

  const out = {};
  Object.entries(agg).forEach(([k, v]) => {
    // isSingleOnly: 이 에이전트의 모든 항목이 neutral 만 성공 (strict/loose 모두 0)
    const isSingleOnly = v.personaTotal > 0
      && v.personaSuccess.strict === 0
      && v.personaSuccess.loose === 0
      && v.personaSuccess.neutral === v.personaTotal;
    out[k] = {
      itemCount: v.items.size,
      personaSuccess: v.personaSuccess,
      personaTotal: v.personaTotal,
      judgeCount: v.judgeCount,
      conflictCount: v.conflictCount,
      mhrCount: v.mhrCount,
      avgSpread: v._spreadN > 0 ? v._spreadSum / v._spreadN : 0,
      isSingleOnly,
    };
  });
  return out;
}

function extractAiItemByNumber(result, itemNumber) {
  if (!result || typeof result !== "object") return null;
  const containers = [];
  const push = (v) => { if (Array.isArray(v)) containers.push(v); };
  push(result.evaluations);
  push(result.items);
  push(result.item_scores);
  const report = result.report;
  if (report && typeof report === "object") {
    push(report.evaluations); push(report.items); push(report.item_scores);
    const inner = report.report;
    if (inner && typeof inner === "object") {
      push(inner.evaluations); push(inner.items); push(inner.item_scores);
    }
  }
  for (const arr of containers) {
    for (const raw of arr) {
      const e = raw && typeof raw === "object" && raw.evaluation && typeof raw.evaluation === "object"
        ? raw.evaluation : raw;
      if (!e || typeof e !== "object") continue;
      const n = e.item_number ?? e.item ?? e.no;
      if (Number(n) === itemNumber) return e;
    }
  }
  return null;
}

/* ai: 단일 항목 evaluation 객체
   result: 전체 파이프라인 결과 (report.improvements/coaching_points/strengths/deductions 참조용)
   itemNumber: 항목 번호 (reference_items 필터링용) */
function formatAiEvidenceForMatrix(ai, result, itemNumber) {
  if (!ai && !result) return "";

  const report = (result && result.report && typeof result.report === "object") ? result.report
               : (result && typeof result === "object") ? result
               : {};

  // 1) 감점 사유: ai.deductions + report.deductions(item_number 매칭) 병합
  const deductionLines = [];
  const seenDed = new Set();
  const pushDed = (d) => {
    if (!d) return;
    if (typeof d === "string") {
      const s = d.trim();
      if (s && !seenDed.has(s)) { seenDed.add(s); deductionLines.push(`· ${s}`); }
      return;
    }
    if (typeof d !== "object") return;
    const reason = String(d.reason || d.text || d.description || d.note || "").trim();
    if (!reason) return;
    const ptsRaw = d.points ?? d.points_lost ?? d.score_delta;
    const pts = typeof ptsRaw === "number" ? Math.abs(ptsRaw) : null;
    const line = pts != null ? `${reason} (-${pts}점)` : reason;
    if (!seenDed.has(line)) { seenDed.add(line); deductionLines.push(`· ${line}`); }
  };
  (Array.isArray(ai?.deductions) ? ai.deductions : []).forEach(pushDed);
  if (itemNumber != null && Array.isArray(report.deductions)) {
    report.deductions.filter(d => Number(d?.item_number) === Number(itemNumber)).forEach(pushDed);
  }

  // 2) 개선 필요: report.improvements (reference_items 매칭) + ai.improvements
  const improvementLines = [];
  const seenImp = new Set();
  const pushImp = (s) => {
    if (!s) return;
    const desc = typeof s === "string" ? s.trim()
               : String(s.description || s.text || s.summary || "").trim();
    if (desc && !seenImp.has(desc)) { seenImp.add(desc); improvementLines.push(`· ${desc}`); }
  };
  (Array.isArray(ai?.improvements) ? ai.improvements : []).forEach(pushImp);
  if (itemNumber != null && Array.isArray(report.improvements)) {
    report.improvements
      .filter(s => typeof s === "object" && Array.isArray(s.reference_items) && s.reference_items.includes(itemNumber))
      .forEach(pushImp);
  }

  // 3) 코칭 포인트: report.coaching_points (reference_items 매칭)
  const coachingLines = [];
  const seenCoach = new Set();
  const pushCoach = (c) => {
    if (!c || typeof c !== "object") return;
    const priority = String(c.priority || "medium").trim();
    const area = String(c.area || c.title || "코칭").trim();
    const desc = String(c.description || c.text || c.summary || "").trim();
    const line = desc ? `[${priority}] ${area} — ${desc}` : `[${priority}] ${area}`;
    if (!seenCoach.has(line)) { seenCoach.add(line); coachingLines.push(`· ${line}`); }
  };
  if (itemNumber != null && Array.isArray(report.coaching_points)) {
    report.coaching_points
      .filter(c => Array.isArray(c?.reference_items) && c.reference_items.includes(itemNumber))
      .forEach(pushCoach);
  }

  // 4) 평가 근거 발췌: ai.evidence — 전체 (#turn "quote" 형식)
  const evidenceLines = [];
  const seenEv = new Set();
  const pushEv = (e) => {
    if (!e) return;
    if (typeof e === "string") {
      const s = e.trim();
      if (s && !seenEv.has(s)) { seenEv.add(s); evidenceLines.push(`· ${s}`); }
      return;
    }
    if (typeof e !== "object") return;
    const txt = String(e.text || e.excerpt || e.quote || "").trim();
    if (!txt) return;
    const turn = e.turn ?? e.turn_number ?? e.index;
    const rawSpeaker = String(e.speaker || e.role || "").trim().toLowerCase();
    const speaker = rawSpeaker === "agent" || rawSpeaker === "상담사" ? "상담사"
                  : rawSpeaker === "customer" || rawSpeaker === "고객" ? "고객"
                  : rawSpeaker === "cs" ? "CS"
                  : rawSpeaker ? rawSpeaker : "";
    const prefix = [turn != null ? `#${turn}` : "", speaker].filter(Boolean).join(" ");
    const line = prefix ? `${prefix}: "${txt}"` : `"${txt}"`;
    if (!seenEv.has(line)) { seenEv.add(line); evidenceLines.push(`· ${line}`); }
  };
  (Array.isArray(ai?.evidence) ? ai.evidence : []).forEach(pushEv);

  // 5) 우수 사항: report.strengths (reference_items 매칭) + ai.positives/strengths
  const positiveLines = [];
  const seenPos = new Set();
  const pushPos = (p) => {
    if (!p) return;
    const desc = typeof p === "string" ? p.trim()
               : String(p.description || p.text || p.summary || "").trim();
    if (desc && !seenPos.has(desc)) { seenPos.add(desc); positiveLines.push(`· ${desc}`); }
  };
  (Array.isArray(ai?.positives) ? ai.positives : []).forEach(pushPos);
  (Array.isArray(ai?.strengths) ? ai.strengths : []).forEach(pushPos);
  if (itemNumber != null && Array.isArray(report.strengths)) {
    report.strengths
      .filter(s => typeof s === "object" && Array.isArray(s.reference_items) && s.reference_items.includes(itemNumber))
      .forEach(pushPos);
  }

  // 6) 섹션 조립 (비어있는 섹션은 생략)
  const sections = [];
  if (deductionLines.length)   sections.push("[감점 사유]\n" + deductionLines.join("\n"));
  if (improvementLines.length) sections.push("[개선 필요]\n" + improvementLines.join("\n"));
  if (coachingLines.length)    sections.push("[코칭 포인트]\n" + coachingLines.join("\n"));
  if (evidenceLines.length)    sections.push("[평가 근거]\n" + evidenceLines.join("\n"));
  if (positiveLines.length)    sections.push("[우수 사항]\n" + positiveLines.join("\n"));

  // 7) fallback — 위 섹션이 모두 비어있을 때 최상위 reason/요약 필드
  if (!sections.length && ai) {
    const topReason = String(
      ai.reason || ai.comment || ai.explanation || ai.rationale ||
      ai.note || ai.summary || ai.justification || ""
    ).trim();
    if (topReason) sections.push(topReason);
    else if (ai.common_penalty_applied) {
      sections.push(`[공통 감점 적용] ${ai.common_penalty_reason || "rudeness/misinfo 등 공통 감점"}`);
    }
  }

  return sections.join("\n\n");
}

/* 빈 evidence일 때 점수에 따라 placeholder 생성 */
function evidencePlaceholder(score, maxScore) {
  if (score == null) return "—";
  if (typeof score === "number" && typeof maxScore === "number" && score === maxScore) {
    return "(감점 없음)";
  }
  return "(근거 미제공)";
}

/* 파이프라인 result → 모델별 종합 리포트 텍스트 (Excel 셀 삽입용)
   우선 full_report_text 가 있으면 Markdown 제거 후 사용, 없으면 구조화 필드로 직접 조립 */
function buildOverallReportForExcel(result) {
  if (!result || typeof result !== "object") return "";
  const report = (result.report && typeof result.report === "object") ? result.report : result;
  const summary = report.summary || result.summary || {};
  const grade = summary.grade || "-";
  const totalScore = summary.total_score != null ? summary.total_score : null;
  const maxScore = summary.max_score != null ? summary.max_score : 100;
  const strengths = Array.isArray(report.strengths) ? report.strengths : [];
  const improvements = Array.isArray(report.improvements) ? report.improvements : [];
  const coaching = Array.isArray(report.coaching_points) ? report.coaching_points : [];

  // full_report_text 가 있으면 Markdown 간소 정리 후 반환
  if (typeof report.full_report_text === "string" && report.full_report_text.trim()) {
    return report.full_report_text
      .replace(/\*\*([^*]+)\*\*/g, "$1")   // **bold** 제거
      .replace(/^#+\s*/gm, "")              // #, ## 제거
      .replace(/^\s*[-*]\s+/gm, "· ")       // - item → · item
      .replace(/>\s*/g, "")                 // blockquote 제거
      .replace(/\n{3,}/g, "\n\n")           // 과도 공백 축소
      .trim();
  }

  // 구조화 필드로 직접 조립 (fallback)
  const sections = [];

  // 1) 종합 평가
  const scoreLine = totalScore != null ? `· 점수: ${totalScore}점 / 등급: ${grade}` : `· 등급: ${grade}`;
  const overall = [
    "[종합 평가]",
    scoreLine,
  ];
  const overallSummary = String(summary.overall_assessment || summary.summary || report.overall_comment || "").trim();
  if (overallSummary) overall.push(`· ${overallSummary}`);
  sections.push(overall.join("\n"));

  // 2) 주요 강점
  if (strengths.length) {
    const lines = ["[주요 강점]"];
    strengths.forEach(s => {
      if (!s) return;
      const desc = typeof s === "string" ? s.trim() : String(s.description || s.text || "").trim();
      if (!desc) return;
      const refs = Array.isArray(s.reference_items) && s.reference_items.length
        ? ` [#${s.reference_items.join(", #")}]` : "";
      lines.push(`· ${desc}${refs}`);
    });
    if (lines.length > 1) sections.push(lines.join("\n"));
  }

  // 3) 개선 필요 사항
  if (improvements.length) {
    const lines = ["[개선 필요 사항]"];
    improvements.forEach(s => {
      if (!s) return;
      const desc = typeof s === "string" ? s.trim() : String(s.description || s.text || "").trim();
      if (!desc) return;
      const refs = Array.isArray(s.reference_items) && s.reference_items.length
        ? ` [#${s.reference_items.join(", #")}]` : "";
      const ev = String(s.evidence_quote || s.evidence || "").trim();
      const evPart = ev ? ` · 근거: "${ev}"` : "";
      lines.push(`· ${desc}${refs}${evPart}`);
    });
    if (lines.length > 1) sections.push(lines.join("\n"));
  }

  // 4) 코칭 포인트
  if (coaching.length) {
    const lines = ["[코칭 포인트]"];
    coaching.forEach(c => {
      if (!c || typeof c !== "object") return;
      const priority = String(c.priority || "medium").trim();
      const area = String(c.area || c.title || "코칭").trim();
      const desc = String(c.suggestion || c.description || "").trim();
      if (!desc) return;
      const refs = Array.isArray(c.reference_items) && c.reference_items.length
        ? ` [#${c.reference_items.join(", #")}]` : "";
      lines.push(`· [${priority} / ${area}] ${desc}${refs}`);
    });
    if (lines.length > 1) sections.push(lines.join("\n"));
  }

  // 5) 마무리
  const closing = String(summary.closing || summary.conclusion || report.closing || report.conclusion || "").trim();
  if (closing) sections.push(`[마무리]\n${closing}`);

  return sections.join("\n\n");
}

function buildMatrixRows(models) {
  // models: [{name, type: "ai"|"manual", data}]
  //   ai: data = pipeline result (evaluations 포함)
  //   manual: data = parseManualEvalSheet().rows 배열 (각 항목 {no, qa_score, qa_evidence})
  const rows = [];
  for (let n = 1; n <= 18; n++) {
    const max = STT_MAX_SCORES[n];
    const row = {
      no: n,
      category: STT_CATEGORIES[n],
      item: ITEM_NAMES[n] || `항목 ${n}`,
      max_score: max,
      models: {},
    };
    models.forEach(({ name, type, data }) => {
      if (type === "manual") {
        const mr = Array.isArray(data) ? data.find(r => r.no === n) : null;
        row.models[name] = {
          score: mr && mr.qa_score != null ? Number(mr.qa_score) : null,
          evidence: mr?.qa_evidence || "",
        };
      } else {
        const ai = extractAiItemByNumber(data, n);
        row.models[name] = {
          score: ai && ai.score != null ? Number(ai.score) : null,
          evidence: formatAiEvidenceForMatrix(ai, data, n),
        };
      }
    });
    rows.push(row);
  }
  return rows;
}

function computeMatrixTotals(rows, modelNames) {
  const totals = {};
  modelNames.forEach(n => { totals[n] = 0; });
  rows.forEach(r => {
    modelNames.forEach(n => {
      const s = r.models[n]?.score;
      if (typeof s === "number" && Number.isFinite(s)) totals[n] += s;
    });
  });
  return totals;
}

/* 원본 워크북 clone (write→read 왕복 방식, SheetJS는 내장 clone 없음) */
function cloneWorkbook(wb) {
  const buf = window.XLSX.write(wb, { type: "array", bookType: "xlsx", cellStyles: true });
  return window.XLSX.read(buf, { type: "array", cellStyles: true });
}

/* 0-indexed col → 엑셀 컬럼 문자 (0→A, 6→G, 7→H ...) */
function _colLetter(col0) {
  let s = "", n = col0 + 1;
  while (n > 0) {
    const r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

/* ExcelJS worksheet에 AI 모델 컬럼 append — 원본 스타일 복제해서 서식 유지.
   시트 구조 전제: R5=헤더, R6~R23=18항목, R25=총점 */
function appendModelColumnsWithExcelJS(ws, aiMods) {
  if (!ws || !aiMods?.length) return;
  const startCol0 = 6; // G열 (0-indexed)
  const rG = 4;        // R4 그룹 헤더
  const rS = 5;        // R5 서브 헤더
  const rDataTop = 6;  // R6
  const rTotal = 25;   // R25

  const cloneStyle = (cell) => cell ? JSON.parse(JSON.stringify(cell.style || {})) : {};
  const headerStyle   = cloneStyle(ws.getCell("A5"));  // 파란 헤더 (#2F5496)
  const dataScoreStyle = cloneStyle(ws.getCell("E6"));  // 점수 셀 (가운데 정렬, 테두리)
  const dataEvidStyle  = cloneStyle(ws.getCell("C6"));  // 평가기준 셀 (wrap text)
  const totalStyle     = cloneStyle(ws.getCell("E25")); // 총점 셀

  // ★ 정책: 같은 모델명이면 그 자리 재사용 (덮어쓰기), 새 모델이면 마지막 뒤에 추가.
  // G열 이후 스캔하여 (1) 기존 모델별 컬럼 위치 매핑 + (2) 마지막 사용 컬럼 확인.
  const existingByName = new Map(); // modelName -> {c1_0, c2_0}
  let lastUsedCol0 = startCol0 - 2; // 시작 전 (startCol0=6 이면 4)
  for (let col0 = startCol0; col0 < startCol0 + 60; col0 += 2) {
    const cellTop = ws.getCell(rG, col0 + 1);  // R4 그룹 헤더
    const cellSub = ws.getCell(rS, col0 + 1);  // R5 서브헤더
    const topVal = cellTop && cellTop.value != null ? String(cellTop.value).trim() : "";
    const subVal = cellSub && cellSub.value != null ? String(cellSub.value).trim() : "";
    // R4 헤더 or R5 서브헤더 둘 중 하나라도 값 있으면 사용 중 컬럼
    if (topVal || subVal) {
      lastUsedCol0 = col0;
      // 모델명이 유효하면 매핑 — 동일 모델 재실행 시 덮어쓰기 위함
      if (topVal && topVal !== "(unknown)" && !existingByName.has(topVal)) {
        existingByName.set(topVal, { c1_0: col0, c2_0: col0 + 1 });
      }
    }
  }
  let nextFreeCol0 = lastUsedCol0 + 2;

  aiMods.forEach((m) => {
    // 같은 이름이 있으면 그 자리 재사용, 없으면 마지막 뒤에 추가
    const existing = m.name ? existingByName.get(m.name) : null;
    let c1_0, c2_0;
    if (existing) {
      c1_0 = existing.c1_0;
      c2_0 = existing.c2_0;
    } else {
      c1_0 = nextFreeCol0;
      c2_0 = c1_0 + 1;
      nextFreeCol0 += 2;
      // 새 모델 등록 — 같은 aiMods 내에서 중복 추가 방지
      if (m.name) existingByName.set(m.name, { c1_0, c2_0 });
    }
    const c1 = c1_0 + 1;   // ExcelJS 1-indexed col
    const c2 = c2_0 + 1;
    const c1L = _colLetter(c1_0);
    const c2L = _colLetter(c2_0);

    // 그룹 헤더 (R4 병합) — 기존 병합이 있으면 먼저 해제 후 깨끗히 재작성.
    // 기존 병합 상태에서 값을 쓰면 ExcelJS 버전에 따라 헤더가 공백으로 저장되는 사례 방지.
    const mergeRange = `${c1L}${rG}:${c2L}${rG}`;
    try { ws.unMergeCells(mergeRange); } catch (e) { /* 병합 없으면 무시 */ }
    const gc1 = ws.getCell(rG, c1);
    gc1.value = m.name || "(unknown)";   // 모델명 누락 방어
    gc1.style = headerStyle;
    const gc2 = ws.getCell(rG, c2);
    gc2.value = null;                     // "" 대신 null — ExcelJS 머지 시 값 남는 이슈 회피
    gc2.style = headerStyle;
    try { ws.mergeCells(mergeRange); } catch (e) { /* 이미 병합돼있으면 무시 */ }

    // 서브 헤더 (R5)
    const hc1 = ws.getCell(rS, c1);
    hc1.value = "점수";
    hc1.style = headerStyle;
    const hc2 = ws.getCell(rS, c2);
    hc2.value = "이유";
    hc2.style = headerStyle;

    // 18행 데이터
    let total = 0;
    for (let n = 1; n <= 18; n++) {
      const r = rDataTop + (n - 1);
      const ai = extractAiItemByNumber(m.result, n);
      const score = ai && ai.score != null ? Number(ai.score) : null;
      const evidence = formatAiEvidenceForMatrix(ai, m.result, n);

      const sc = ws.getCell(r, c1);
      sc.value = score != null ? score : null;
      sc.style = dataScoreStyle;

      const ec = ws.getCell(r, c2);
      ec.value = evidence || evidencePlaceholder(score, STT_MAX_SCORES[n]);
      ec.style = dataEvidStyle;

      if (typeof score === "number") total += score;
    }

    // 종합 리포트 (R24) — 2-col 병합, 긴 텍스트
    const reportText = buildOverallReportForExcel(m.result);
    const reportStyle = {
      ...cloneStyle(ws.getCell("C6")),  // wrap_text 포함 base
      alignment: { horizontal: "left", vertical: "top", wrapText: true },
      font: { name: "맑은 고딕", size: 10 },
    };
    const rRep = 24;
    const rc1 = ws.getCell(rRep, c1);
    rc1.value = reportText || "(종합 리포트 없음)";
    rc1.style = reportStyle;
    const rc2 = ws.getCell(rRep, c2);
    rc2.value = "";
    rc2.style = reportStyle;
    try { ws.mergeCells(`${c1L}${rRep}:${c2L}${rRep}`); } catch (e) { /* 이미 병합이면 무시 */ }
    // 리포트 행 높이 확장 (wrap 된 긴 텍스트 수용)
    try {
      const row = ws.getRow(rRep);
      if (!row.height || row.height < 400) row.height = 400;
    } catch (e) { /* no-op */ }

    // 총점 (R25)
    const tc1 = ws.getCell(rTotal, c1);
    tc1.value = total;
    tc1.style = totalStyle;
    const tc2 = ws.getCell(rTotal, c2);
    tc2.value = "";
    tc2.style = totalStyle;

    // 컬럼 너비
    ws.getColumn(c1).width = 10;
    ws.getColumn(c2).width = 55;
  });
}

/* 원본 STT 평가표 시트에 AI 모델 컬럼 append
   시트 구조 전제: R5=헤더(A~F), R6~R23=18항목, R25=총점, R4=blank
   추가 위치: G열부터 [모델명] 병합 헤더, 아래 [점수|이유] 쌍
*/
function appendModelColumnsToSheet(ws, aiMods) {
  if (!ws || !aiMods?.length) return;
  const utils = window.XLSX.utils;
  const startCol = 6; // G열 (0-indexed)
  const rG = 3;       // R4 그룹 헤더
  const rS = 4;       // R5 서브 헤더
  const rDataTop = 5; // R6 첫 데이터
  const rTotal = 24;  // R25 총점

  aiMods.forEach((m, i) => {
    const c1 = startCol + i * 2;
    const c2 = c1 + 1;

    // 그룹 헤더 (모델명, G4:H4 merge)
    ws[utils.encode_cell({ r: rG, c: c1 })] = { v: m.name, t: "s" };
    ws[utils.encode_cell({ r: rG, c: c2 })] = { v: "", t: "s" };
    if (!ws["!merges"]) ws["!merges"] = [];
    ws["!merges"].push({ s: { r: rG, c: c1 }, e: { r: rG, c: c2 } });

    // 서브 헤더 (R5)
    ws[utils.encode_cell({ r: rS, c: c1 })] = { v: "점수", t: "s" };
    ws[utils.encode_cell({ r: rS, c: c2 })] = { v: "이유", t: "s" };

    // 18항목 데이터 (R6~R23)
    let total = 0;
    for (let n = 1; n <= 18; n++) {
      const rowIdx = rDataTop + (n - 1);
      const ai = extractAiItemByNumber(m.result, n);
      const score = ai && ai.score != null ? Number(ai.score) : null;
      const evidence = formatAiEvidenceForMatrix(ai, m.result, n);
      ws[utils.encode_cell({ r: rowIdx, c: c1 })] = score != null
        ? { v: score, t: "n" }
        : { v: "", t: "s" };
      ws[utils.encode_cell({ r: rowIdx, c: c2 })] = { v: evidence || evidencePlaceholder(score, STT_MAX_SCORES[n]), t: "s" };
      if (typeof score === "number") total += score;
    }

    // 종합 리포트 (R24) — 2-col 병합
    const rReport = 23; // R24 (0-indexed)
    const reportText = buildOverallReportForExcel(m.result);
    ws[utils.encode_cell({ r: rReport, c: c1 })] = { v: reportText || "(종합 리포트 없음)", t: "s" };
    ws[utils.encode_cell({ r: rReport, c: c2 })] = { v: "", t: "s" };
    ws["!merges"].push({ s: { r: rReport, c: c1 }, e: { r: rReport, c: c2 } });
    if (!ws["!rows"]) ws["!rows"] = [];
    while (ws["!rows"].length <= rReport) ws["!rows"].push({});
    if (!ws["!rows"][rReport] || !ws["!rows"][rReport].hpt || ws["!rows"][rReport].hpt < 400) {
      ws["!rows"][rReport] = { hpt: 400 };
    }

    // 총점 (R25)
    ws[utils.encode_cell({ r: rTotal, c: c1 })] = { v: total, t: "n" };
    ws[utils.encode_cell({ r: rTotal, c: c2 })] = { v: "", t: "s" };
  });

  // !ref 확장
  const range = utils.decode_range(ws["!ref"] || "A1");
  const newMaxCol = startCol + aiMods.length * 2 - 1;
  if (range.e.c < newMaxCol) range.e.c = newMaxCol;
  ws["!ref"] = utils.encode_range(range);

  // !cols 확장 (기존 값 보존)
  if (!ws["!cols"]) ws["!cols"] = [];
  while (ws["!cols"].length < newMaxCol + 1) ws["!cols"].push({});
  aiMods.forEach((m, i) => {
    const c1 = startCol + i * 2;
    ws["!cols"][c1]     = { wch: 10 };
    ws["!cols"][c1 + 1] = { wch: 55 };
  });
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: { padding: 40, textAlign: 'center', color: 'var(--red)' }

        React.createElement('h2', null, '렌더링 오류 발생'),
        React.createElement('p', { style: { color: 'var(--text-secondary)', fontSize: 13 } }, String(this.state.error)),

        }, '다시 시도')
      );
    }

  }
}

/* ── Custom Bus Edge: shared trunk routing for LR fan-out ────
   All edges from the same source with Position.Right exit horizontally the
   same distance (TRUNK_OFFSET), then bend vertically to target Y, then horizontal
   to target X. This creates the "branching tree / bus" visual that users expect
   for parallel fan-out (e.g. V2 layer1 → 8 Sub Agent fan-out). */
const TRUNK_OFFSET = 45;
const BEND_RADIUS = 10;

function BusEdge(props) {
  const { id, sourceX, sourceY, targetX, targetY, markerEnd, style, label, labelStyle, labelBgStyle, labelBgPadding, labelBgBorderRadius, data } = props;
  /* busIn: 트렁크를 target 옆에 두어 fan-in 수렴(Phase C 같은 2×1, 2×2 수렴)을 한 줄 버스로 그린다.
     기본 (fan-out): 트렁크를 source 옆에 두어 Phase A 확산을 그린다.
     양쪽 모두 arc 모서리로 그려 디자인을 통일 (fan-in 과 fan-out 이 같은 스타일). */
  const busIn = !!(data && data.busIn);
  const trunkX = busIn ? (targetX - TRUNK_OFFSET) : (sourceX + TRUNK_OFFSET);
  const dy = targetY - sourceY;

  let path;
  if (Math.abs(dy) < 1) {
    path = `M ${sourceX},${sourceY} L ${targetX},${targetY}`;
  } else {
    const segRoom = busIn
      ? Math.max(0, trunkX - sourceX) / 2
      : Math.max(0, targetX - trunkX) / 2;
    const r = Math.min(BEND_RADIUS, Math.abs(dy) / 2, TRUNK_OFFSET / 2, segRoom);
    const dir = dy > 0 ? 1 : -1;
    const sweep = dir > 0 ? 1 : 0;
    path = [
      `M ${sourceX},${sourceY}`,
      `L ${trunkX - r},${sourceY}`,
      `A ${r},${r} 0 0 ${sweep} ${trunkX},${sourceY + r * dir}`,
      `L ${trunkX},${targetY - r * dir}`,
      `A ${r},${r} 0 0 ${sweep === 1 ? 0 : 1} ${trunkX + r},${targetY}`,
      `L ${targetX},${targetY}`,
    ].join(' ');
  }

  const midX = (trunkX + targetX) / 2;
  const midY = targetY;

  return (
    <>
      {BaseEdge
        ? <BaseEdge id={id} path={path} markerEnd={markerEnd} style={style} />
        : <path id={id} d={path} className="react-flow__edge-path" style={style} markerEnd={markerEnd} />}
      {label && EdgeLabelRenderer && (
        <EdgeLabelRenderer>
          <div
            style={{
              position: 'absolute',
              transform: `translate(-50%, -50%) translate(${midX}px, ${midY - 12}px)`,
              background: (labelBgStyle && labelBgStyle.fill) || 'var(--bg)',
              padding: labelBgPadding ? `${labelBgPadding[1]}px ${labelBgPadding[0]}px` : '4px 8px',
              borderRadius: labelBgBorderRadius != null ? labelBgBorderRadius : 5,
              fontSize: 11,
              color: (labelStyle && labelStyle.fill) || 'var(--text-secondary)',
              fontWeight: (labelStyle && labelStyle.fontWeight) || 600,
              letterSpacing: '0.01em',
              pointerEvents: 'none',
              whiteSpace: 'nowrap',
              lineHeight: 1.2,
            }}
            className="nodrag nopan"
          >
            {label}
          </div>
        </EdgeLabelRenderer>
      )}
    </>
  );
}

  { id: '__layer1', members: LAYER1_NODES,
    label: 'Layer 1', sublabel: '전처리 · 단일 노드', phaseClass: '' },

  { id: '__layer2_b', members: LAYER2_GROUP_B,

  { id: '__layer3', members: LAYER3_NODES,
    label: 'Layer 3', sublabel: 'Orchestrator V2 · aggregator·override·consistency·grader', phaseClass: 'phase-b2' },
  { id: '__layer4', members: LAYER4_NODES,
    label: 'Layer 4', sublabel: 'Post · Confidence→Tier→Refiner→Report', phaseClass: 'phase-b1' },
];

/* Dagre-based auto-layout: horizontal (LR) flow for pipeline nodes only.
   Phase group bounds are computed after pipeline layout via computeGroupBounds. */
function getLayoutedElements(nodes, edges, direction) {
  direction = direction || 'LR';
  const dagre = window.dagre;
  const g = new dagre.graphlib.Graph();
  g.setDefaultEdgeLabel(function () { return {}; });
  g.setGraph({
    rankdir: direction,
    ranksep: 120,
    nodesep: 32,
    edgesep: 10,
    marginx: 72,
    marginy: 72,
    ranker: 'tight-tree',
  });
  nodes.forEach(function (n) {
    if (n.type === 'phaseGroup') return;
    const def = NODE_DEFS[n.id];
    g.setNode(n.id, { width: (def && def.w) || 170, height: (def && def.h) || 60 });
  });
  edges.forEach(function (e) {
    if (NODE_DEFS[e.source] && NODE_DEFS[e.target]) {
      g.setEdge(e.source, e.target);
    }
  });
  dagre.layout(g);
  return nodes.map(function (n) {
    if (n.type === 'phaseGroup') return n;
    const pos = g.node(n.id);
    if (!pos) return n;
    const def = NODE_DEFS[n.id];
    const w = (def && def.w) || 170;
    const h = (def && def.h) || 60;
    return Object.assign({}, n, { position: { x: pos.x - w / 2, y: pos.y - h / 2 } });
  });
}

function computeGroupBounds(memberIds, nodesWithPositions, padding, labelSpace) {
  if (padding === undefined) padding = 28;
  if (labelSpace === undefined) labelSpace = 18;
  const members = nodesWithPositions.filter(function (n) { return memberIds.indexOf(n.id) !== -1; });
  if (members.length === 0) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  members.forEach(function (n) {
    const def = NODE_DEFS[n.id];
    const w = (def && def.w) || 170;
    const h = (def && def.h) || 60;
    minX = Math.min(minX, n.position.x);
    minY = Math.min(minY, n.position.y);
    maxX = Math.max(maxX, n.position.x + w);
    maxY = Math.max(maxY, n.position.y + h);
  });
  return {
    x: minX - padding,
    y: minY - padding - labelSpace,
    width: (maxX - minX) + padding * 2,
    height: (maxY - minY) + padding * 2 + labelSpace,
  };
}

        <span className={`rag-badge ${badgeClass}`}>{badgeLabel}</span>
        <span className="rag-toggle-title" style={{color}}>{title}</span>
      </div>
      {open && (
        <div>
          {query && (
            <div style={{
              margin: '0 0 8px 12px',
              padding: '8px 10px',
              background: '#fef9e7',
              borderLeft: '3px solid #f59e0b',
              borderRadius: 4,
            }}>
              <div style={{
                fontSize: 9.5,
                fontWeight: 800,
                color: '#92400e',
                letterSpacing: '0.05em',
                marginBottom: 4,
                textTransform: 'uppercase',
              }}>검색어 (RAG retrieval query)</div>
              <div style={{
                fontSize: 11,
                color: '#78350f',
                lineHeight: 1.55,
                wordBreak: 'break-word',
                whiteSpace: 'pre-wrap',
                fontFamily: 'var(--font-mono, ui-monospace, "SF Mono", Menlo, Consolas, monospace)',
                maxHeight: 180,
                overflowY: 'auto',
                background: 'rgba(255,255,255,0.6)',
                padding: '6px 8px',
                borderRadius: 3,
                border: '1px solid rgba(245,158,11,0.2)',
              }}>{query}</div>
            </div>
          )}
          {items.map(renderItem)}
        </div>
      )}
    </div>
  );
}

/* ── RAG Hits — 평가 항목별 탭 분리 표시 ──────────────────────
   한 에이전트가 복수 평가 항목을 맡는 경우 (예: needs 에이전트 = #8+#9),
   백엔드는 항목별로 RAG 를 독립 호출한다. 드로어에서도 항목별 탭으로 분리
   표시해 "어느 항목의 rubric 에 어떤 예시가 매칭됐는지" 추적 가능. */
function RagHitsPerItemSection({ hits, perItemMap, itemNums, multiItem }) {
  const [activeItem, setActiveItem] = useState(
    itemNums && itemNums.length > 0 ? itemNums[0] : null
  );
  const renderBundle = (bundle, queries) => {
    const hasGS = bundle && bundle.fewshot && bundle.fewshot.length > 0;
    const hasRS = bundle && !!bundle.reasoning && bundle.reasoning.stdev !== null && bundle.reasoning.stdev !== undefined;
    const hasBK = bundle && bundle.knowledge && bundle.knowledge.length > 0;
    const rsItems = hasRS ? [bundle.reasoning] : [];
    if (!hasGS && !hasRS && !hasBK) {
      return (
        <div style={{fontSize:11, color:'var(--text-secondary)', padding:'6px 8px'}}>
          RAG 조회 결과 없음
        </div>
      );
    }
    return (
      <>
        {hasGS && (
          <RagDetailsToggle
            badgeClass="gs"
            badgeLabel="GS"
            title={`Golden-set (${bundle.fewshot.length}건)`}
            color="#065f46"
            items={bundle.fewshot}
            query={queries && queries.fewshot}
            renderItem={(d) => {
              const itemNum = d.item_number || (d.example_id && Number(String(d.example_id).split('-')[1])) || null;
              const maxScore = itemNum ? STT_MAX_SCORES[itemNum] : null;
              return (
                <div key={d.example_id} className="rag-detail-card">
                  <div className="rag-detail-header">
                    <span className="rag-detail-id">{d.example_id}</span>
                    {d.score !== undefined && d.score !== null && (
                      <span className={`rag-detail-score ${d.score_bucket || ''}`}>
                        {d.score}{maxScore ? `/${maxScore}` : ''}점
                        {d.score_bucket ? ` · ${d.score_bucket}` : ''}
                      </span>
                    )}
                    <SimilarityBadge
                      value={d.similarity}
                      cosine={d.cosine_score}
                      bm25={d.bm25_score}
                      rrf={d.rrf_score}
                      bm25Rank={d.bm25_rank}
                      knnRank={d.knn_rank}
                    />
                    {itemNum && <span className="rag-detail-intent">item #{itemNum}</span>}
                    {d.intent && d.intent !== '*' && (
                      <span className="rag-detail-intent">{d.intent}</span>
                    )}
                    {d.rater_type && (
                      <span className="rag-detail-intent" title={d.rater_source || ''}>
                        {d.rater_type}
                      </span>
                    )}
                  </div>
                  {d.segment_text && (
                    <div className="rag-detail-quote">
                      <span className="rag-detail-quote-label">발화</span>
                      <span className="rag-detail-quote-text">{d.segment_text}</span>
                    </div>
                  )}
                  {d.rationale && (
                    <div className="rag-detail-rationale">
                      <span className="rag-detail-rationale-label">근거</span>
                      <span className="rag-detail-rationale-text">{d.rationale}</span>
                    </div>
                  )}
                  {d.rationale_tags && d.rationale_tags.length > 0 && (
                    <div className="rag-detail-tags">
                      {d.rationale_tags.map((t, i) => (
                        <span key={i} className="rag-detail-tag">{t}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            }}
          />
        )}
        {hasRS && (() => {
          const rsExampleCount = rsItems.reduce((acc, r) => {
            if (r && Array.isArray(r.examples) && r.examples.length > 0) return acc + r.examples.length;
            if (r && Array.isArray(r.example_ids)) return acc + r.example_ids.length;
            return acc;
          }, 0);
          const rsCountLabel = rsExampleCount > 0
            ? `${rsExampleCount}건`
            : `${rsItems.length}항목`;
          return (
          <RagDetailsToggle
            badgeClass="rs"
            badgeLabel="RS"
            title={`Reasoning (${rsCountLabel})`}
            color="#1e3a8a"
            items={rsItems}
            query={queries && queries.reasoning}
            renderItem={(r) => {
              const maxScore = STT_MAX_SCORES[r.item] || 5;
              const stdevNorm = r.stdev / maxScore;
              const stdevLevel = stdevNorm < 0.2 ? 'low' : stdevNorm < 0.4 ? 'mid' : 'high';
              const stdevLabel = { low: '낮음 · 합의', mid: '보통', high: '높음 · 분분' }[stdevLevel];
              const stdevColor = {
                low:  { bg: '#dcfce7', fg: '#166534', dot: '#10b981' },
                mid:  { bg: '#fef3c7', fg: '#92400e', dot: '#f59e0b' },
                high: { bg: '#fecaca', fg: '#991b1b', dot: '#ef4444' },
              }[stdevLevel];
              const sampleWarning = (r.sample_size != null && r.sample_size < 3);
              const agreement = Math.max(0, 1 - Math.min(stdevNorm, 0.5) / 0.5);
              return (
                <div key={r.item} className="rag-detail-card">
                  <div className="rag-detail-header">
                    <span className="rag-detail-id">항목 #{r.item}</span>
                    <span style={{
                      display:'inline-flex',alignItems:'center',gap:4,
                      fontSize:10,fontWeight:700,
                      background: stdevColor.bg, color: stdevColor.fg,
                      padding:'2px 8px',borderRadius:10,
                    }}
                    title={`stdev ${r.stdev.toFixed(2)} (max ${maxScore}점) → 정규화 ${(stdevNorm * 100).toFixed(0)}% · 합의도 ${agreement.toFixed(2)} (1.0=완벽일치, 0.0=완전혼재) · 임계 20%/40%`}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:stdevColor.dot}}></span>
                      σ̄ {(stdevNorm * 100).toFixed(0)}% · {stdevLabel}
                    </span>
                    <span className="rag-detail-intent" style={sampleWarning ? {background:'#fee2e2',color:'#991b1b'} : {}}
                      title={sampleWarning ? '표본 < 3 — confidence 약화 적용됨' : ''}>
                      n={r.sample_size ?? '?'}
                      {sampleWarning && ' ⚠'}
                    </span>
                  </div>
                  {r.examples && r.examples.length > 0 ? (
                    r.examples.slice(0, 8).map((ex, j) => (
                      <div key={j} className="rag-detail-sub">
                        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                          <span className="rag-detail-id">{ex.example_id}</span>
                          {ex.score !== undefined && ex.score !== null && (
                            <span className="rag-detail-score">
                              {ex.score}{maxScore ? `/${maxScore}` : ''}점
                            </span>
                          )}
                          <SimilarityBadge
                            value={ex.similarity}
                            cosine={ex.cosine_score}
                            bm25={ex.bm25_score}
                            rrf={ex.rrf_score}
                            bm25Rank={ex.bm25_rank}
                            knnRank={ex.knn_rank}
                          />
                          {ex.evaluator_id && (
                            <span className="rag-detail-intent">{ex.evaluator_id}</span>
                          )}
                        </div>
                        {ex.quote_example && (
                          <div className="rag-quote-block" style={{marginTop:4}}>
                            <span className="rag-quote-label">발화</span>
                            {ex.quote_example}
                          </div>
                        )}
                        {ex.rationale && (
                          <div className="rag-detail-rationale-text" style={{marginTop:4}}>
                            <span className="rag-detail-rationale-label">근거</span>
                            {ex.rationale}
                          </div>
                        )}
                        {ex.rationale_tags && ex.rationale_tags.length > 0 && (
                          <div className="rag-detail-tags" style={{marginTop:2}}>
                            {ex.rationale_tags.map((t, k) => (
                              <span key={k} className="rag-detail-tag">{t}</span>
                            ))}
                          </div>
                        )}
                      </div>
                    ))
                  ) : (r.example_ids && r.example_ids.length > 0) ? (
                    <div className="rag-detail-quote-text">{r.example_ids.join(', ')}</div>
                  ) : null}
                </div>
              );
            }}
          />
          );
        })()}
        {hasBK && (
          <RagDetailsToggle
            badgeClass="bk"
            badgeLabel="BK"
            title={`업무지식 (${bundle.knowledge.length}건)`}
            color="#78350f"
            items={bundle.knowledge}
            query={queries && queries.knowledge}
            renderItem={(d) => (
              <div key={d.chunk_id} className="rag-detail-card">
                <div className="rag-detail-header">
                  <span className="rag-detail-id">{d.chunk_id}</span>
                  <SimilarityBadge value={d.score} />
                  {d.source_ref && <span className="rag-detail-intent">{d.source_ref}</span>}
                </div>
                {d.text && <div className="rag-detail-quote-text">{d.text}</div>}
                {d.tags && d.tags.length > 0 && (
                  <div className="rag-detail-tags">
                    {d.tags.map((t, i) => (
                      <span key={i} className="rag-detail-tag">{t}</span>
                    ))}
                  </div>
                )}
              </div>
            )}
          />
        )}
      </>
    );
  };

  // 단일 항목: 탭 없이 바로 렌더링 (기존 동작 유지)
  if (!multiItem || !itemNums || itemNums.length === 0) {
    const onlyItem = itemNums && itemNums.length === 1 ? itemNums[0] : null;
    const bundle = onlyItem != null ? perItemMap[onlyItem] : null;
    // perItem 이 비어있으면 에이전트 집계 bundle 사용 (하위 호환)
    const fallbackBundle = {
      fewshot: hits.fewshot || [],
      reasoning: (hits.reasoning && hits.reasoning[0]) || null,
      knowledge: hits.knowledge || [],
    };
    const fallbackQueries = {
      fewshot: hits.queries && hits.queries.fewshot && hits.queries.fewshot[0],
      reasoning: hits.queries && hits.queries.reasoning && hits.queries.reasoning[0],
      knowledge: hits.queries && hits.queries.knowledge && hits.queries.knowledge[0],
      intent: hits.queries && hits.queries.intent,
    };
    const useBundle = bundle || fallbackBundle;
    const useQueries = (bundle && bundle.queries) || fallbackQueries;
    return (
      <div className="drawer-section">
        <div className="drawer-section-title">RAG Hits</div>
        {useQueries && useQueries.intent && (
          <div style={{
            fontSize:10.5, color:'var(--text-secondary)', marginBottom:6,
            background:'rgba(0,0,0,0.03)', padding:'4px 8px', borderRadius:4,
          }}>
            intent: <b style={{color:'#374151'}}>{useQueries.intent}</b>
          </div>
        )}
        {renderBundle(useBundle, useQueries)}
      </div>
    );
  }

  // 복수 항목: 탭 분리
  const activeBundle = perItemMap[activeItem] || null;
  const activeQueries = activeBundle ? activeBundle.queries : null;
  const countsLabel = (bundle) => {
    if (!bundle) return '';
    const gs = bundle.fewshot ? bundle.fewshot.length : 0;
    const rs = bundle.reasoning ? 1 : 0;
    const bk = bundle.knowledge ? bundle.knowledge.length : 0;
    const parts = [];
    if (gs) parts.push(`GS ${gs}`);
    if (rs) parts.push(`RS`);
    if (bk) parts.push(`BK ${bk}`);
    return parts.length ? ` · ${parts.join(' / ')}` : '';
  };
  return (
    <div className="drawer-section">
      <div className="drawer-section-title">RAG Hits — 평가 항목별</div>
      <div style={{
        display:'flex', gap:4, flexWrap:'wrap', marginBottom:8,
        borderBottom:'1px solid var(--border-subtle, #e5e7eb)',
        paddingBottom:6,
      }}>
        {itemNums.map(n => {
          const isActive = n === activeItem;
          const bundle = perItemMap[n];
          const itemName = ITEM_NAMES[n] || `항목 ${n}`;
          return (
            <button
              key={n}
              type="button"
              onClick={() => setActiveItem(n)}
              style={{
                border:'1px solid',
                borderColor: isActive ? '#1e40af' : 'var(--border-subtle, #e5e7eb)',
                background: isActive ? '#1e40af' : 'rgba(0,0,0,0.02)',
                color: isActive ? '#fff' : '#374151',
                padding:'5px 10px',
                borderRadius:14,
                fontSize:11,
                fontWeight: isActive ? 700 : 500,
                cursor:'pointer',
                whiteSpace:'nowrap',
                transition:'background 0.15s ease, color 0.15s ease',
              }}
              title={`#${n} ${itemName}${countsLabel(bundle)}`}
            >
              #{n} {itemName}
              <span style={{
                fontSize:9.5, opacity:0.75, marginLeft:4,
                color: isActive ? 'rgba(255,255,255,0.85)' : 'var(--text-secondary, #6b7280)',
              }}>
                {countsLabel(bundle).replace(/^\s·\s/, '')}
              </span>
            </button>
          );
        })}
      </div>
      {activeQueries && activeQueries.intent && (
        <div style={{
          fontSize:10.5, color:'var(--text-secondary)', marginBottom:6,
          background:'rgba(0,0,0,0.03)', padding:'4px 8px', borderRadius:4,
        }}>
          intent: <b style={{color:'#374151'}}>{activeQueries.intent}</b>
        </div>
      )}
      {activeBundle ? renderBundle(activeBundle, activeQueries) : (
        <div style={{fontSize:11, color:'var(--text-secondary)', padding:'6px 8px'}}>
          해당 항목의 RAG 조회 결과 없음
        </div>
      )}
    </div>
  );
}
