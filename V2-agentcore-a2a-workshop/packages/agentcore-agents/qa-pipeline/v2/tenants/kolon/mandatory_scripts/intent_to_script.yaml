#
# V2 QA Pipeline — 필수 안내 스크립트 매핑 (kolon tenant)
#
# 코오롱몰(자사: 코오롱스포츠 / 헨리코튼 / 넥스 / 왁 / 골든베어 / 시리즈 / 럭키슈에뜨,
# 입점사: 기타 제휴 브랜드) 고객센터 상담용 필수 안내 스크립트.
#
# intent_key 는 Layer1 이 emit 하는 한국어 라벨과 정확히 일치해야 함:
#   상품문의 / 환불취소 / 주문배송 / 변경해지 / 장애문의 / 결제문의 /
#   가입상담 / 본인확인 / 일반문의
#
# 포맷:
#   <intent_key>:
#     name: 한국어 표기
#     description: 상담 맥락 설명
#     scripts:
#       - id: MAND-<intent>-<NN>
#         text: 필수 안내 문구 샘플
#         required: true|false
#         match_phrases: ["..."]       # transcript 매칭 대상 (OR)
#         penalty_if_missed:
#           item: "16"
#           from: 5
#           to: 3|0
#
# 출처: 코오롱몰 CS 실상담 전사 9건 + kolon-cs-manual v1.0

일반문의:
  name: "일반 문의"
  description: "특정 주문/상품과 무관한 일반 정보 문의 (운영시간, FAQ 등)"
  scripts:
    - id: MAND-GEN-01
      text: "상담 시작 인사 및 상담사 소개"
      required: true
      match_phrases: ["코오롱 고객센터", "반갑습니다", "무엇을 도와"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-GEN-02
      text: "추가 문의 확인"
      required: true
      match_phrases: ["다른 문의", "더 궁금", "추가 문의", "더 도움"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-GEN-03
      text: "상담 종료 인사 (상담사 재고지)"
      required: false
      match_phrases: ["감사합니다", "상담사", "이었습니다"]

상품문의:
  name: "상품 / 브랜드 문의"
  description: "상품 상세, 사이즈, 색상, 재고, 브랜드 정책 문의"
  scripts:
    - id: MAND-PRD-01
      text: "상품 정보 정확 확인 (상품명 / 사이즈 / 색상)"
      required: true
      match_phrases: ["상품", "사이즈", "색상", "품번", "확인"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-PRD-02
      text: "고객 니즈 확인 (용도 / 선호 핏)"
      required: true
      match_phrases: ["어떤", "원하시는", "필요하신", "용도"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-PRD-03
      text: "사이즈 추천 불가 / 실측 안내 (상세페이지 확인 권고)"
      required: false
      match_phrases: ["실측", "상세페이지", "추천은", "어려"]

환불취소:
  name: "환불 / 취소 / 반품 / 교환"
  description: "교환 / 반품 / 주문 취소 / 부분 반품 등 금전 / 상품 처리 상담"
  scripts:
    - id: MAND-EXC-01
      text: "회수 기사 방문 일정 안내 (영업일 2~3일 이내)"
      required: true
      match_phrases: ["회수", "기사", "방문", "영업일", "이 삼 일", "삼 일 이내", "이틀에서 삼 일"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-EXC-02
      text: "반송장 보관 안내 (환불 완료 시까지)"
      required: true
      match_phrases: ["반송장", "보관", "버리지"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-EXC-03
      text: "1회 무상 교환 / 택배비 안내 (자사 상품 기준)"
      required: true
      match_phrases: ["무상", "일 회", "1회", "택배비", "자사", "이천 오백", "오천 원"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-EXC-04
      text: "텍 제거 / 외부 착용 / 세탁 여부 확인"
      required: true
      match_phrases: ["텍", "외부 착용", "세탁"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-EXC-05
      text: "재고 품절 가능성 사전 고지 (극소량 재고 시)"
      required: false
      match_phrases: ["극소량", "품절", "자동으로 환불", "자동 환불"]
    - id: MAND-EXC-06
      text: "미방문 시 재연락 안내"
      required: false
      match_phrases: ["미방문", "재 연락", "다시 연락"]

주문배송:
  name: "주문 / 배송 문의"
  description: "출고 지연, 배송 조회, 배송지 변경, 부분 취소 등"
  scripts:
    - id: MAND-ORD-01
      text: "주문번호 / 상품 확인"
      required: true
      match_phrases: ["주문", "주문서", "주문번호", "확인"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-ORD-02
      text: "배송 예정일 / 출고 일정 안내"
      required: true
      match_phrases: ["영업일", "출고", "배송", "이 삼 일"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-ORD-03
      text: "회수 주소 동일 여부 확인"
      required: false
      match_phrases: ["주소", "동일", "기존"]

변경해지:
  name: "주문 / 정보 변경 · 취소"
  description: "배송지 변경, 결제수단 변경, 주문 취소 등 계약/주문 수정"
  scripts:
    - id: MAND-CHG-01
      text: "변경 / 취소 사유 확인"
      required: true
      match_phrases: ["사유", "이유", "어떻게 되", "말씀"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-CHG-02
      text: "변경 후 확인 / 완료 고지"
      required: true
      match_phrases: ["확인되었", "변경되었", "처리되었", "완료"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-CHG-03
      text: "포인트 / 마일리지 복구 안내 (취소 시)"
      required: false
      match_phrases: ["포인트", "마일리지", "복구"]

본인확인:
  name: "본인 확인"
  description: "성함 + 연락처 2-요소 본인 확인 절차"
  scripts:
    - id: MAND-IDV-01
      text: "성함 + 휴대폰 번호 요청"
      required: true
      match_phrases: ["성함", "연락처", "휴대폰", "번호"]
      penalty_if_missed: { item: "16", from: 5, to: 0 }
    - id: MAND-IDV-02
      text: "본인 여부 재확인"
      required: true
      match_phrases: ["본인 맞", "본인이 맞"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-IDV-03
      text: "정보 확인 감사 멘트"
      required: false
      match_phrases: ["소중한 정보", "확인 감사"]

결제문의:
  name: "결제 / 청구 문의"
  description: "결제 수단, 포인트 / 마일리지 사용, 환불 금액 등"
  scripts:
    - id: MAND-BIL-01
      text: "결제 금액 / 수단 확인"
      required: true
      match_phrases: ["원", "금액", "결제", "카드"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-BIL-02
      text: "환불 예정일 / 환급 방법 안내"
      required: true
      match_phrases: ["환불", "환급", "영업일", "처리"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }

장애문의:
  name: "시스템 / 기능 장애"
  description: "홈페이지 접속 불가, 결제 오류, 앱 오류 등"
  scripts:
    - id: MAND-IT-01
      text: "장애 증상 상세 확인"
      required: true
      match_phrases: ["어떤", "언제부터", "증상", "에러"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-IT-02
      text: "처리 안내 / 후속 연락"
      required: true
      match_phrases: ["처리", "연락", "안내"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }

가입상담:
  name: "회원 가입 / 멤버십"
  description: "신규 회원가입, 멤버십 등급, 혜택 안내"
  scripts:
    - id: MAND-REG-01
      text: "가입 경로 / 멤버십 혜택 안내"
      required: true
      match_phrases: ["가입", "멤버십", "혜택", "등급"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
    - id: MAND-REG-02
      text: "필요 정보 / 절차 안내"
      required: true
      match_phrases: ["절차", "필요", "정보", "안내"]
      penalty_if_missed: { item: "16", from: 5, to: 3 }
